<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PriorProof Rater Packet</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #60646c;
      --line: #d9d9d2;
      --accent: #0f766e;
      --accent-2: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 247, 244, 0.96);
    }
    h1 { margin: 0; font-size: 18px; font-weight: 650; }
    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.choice {
      width: 100%;
      min-height: 42px;
      font-weight: 650;
    }
    button.choice.selected { background: var(--accent-2); border-color: var(--accent-2); color: white; }
    main { padding: 16px; max-width: 1600px; margin: 0 auto; }
    .meta { color: var(--muted); font-size: 13px; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; }
    .side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
      overflow: hidden;
    }
    .side-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    .side-title { min-width: 0; font-weight: 650; overflow-wrap: anywhere; }
    .content { padding: 12px; display: grid; gap: 12px; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0; }
    pre {
      margin: 0;
      padding: 10px;
      overflow: auto;
      max-height: 340px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfbf9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .statement, .argument { line-height: 1.45; overflow-wrap: anywhere; }
    .nav { display: flex; gap: 8px; align-items: center; }
    .status { min-width: 110px; text-align: center; }
    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <script id="packet" type="application/json">{"name": "topology_rater_packet", "prompt": "Which proof uses the less standard mathematical route to its result?", "pair_count": 100, "pairs": [{"pair_id": "study_001", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Inducing.isCompact_preimage_iff", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Inducing f \u2192 \u2200 {K : Set Y}, K \u2286 Set.range f \u2192 (IsCompact (f \u207b\u00b9' K) \u2194 IsCompact K)", "human_argument": "Let f : X \u2192 Y be inducing and let K be a subset of Y contained in the image of f. For an inducing map, compactness of a subset of Y can be tested on its preimage in X, so compactness of K is equivalent to compactness of the preimage of f of K. Moreover, because K is contained in the image of f we have f of the preimage of K equals K, so no information is lost passing to the preimage. Hence K is compact precisely when its preimage is compact.", "lean_source": "lemma Topology.IsInducing.isCompact_preimage_iff {f : X \u2192 Y} (hf : IsInducing f) {K : Set Y}\n    (Kf : K \u2286 range f) : IsCompact (f \u207b\u00b9' K) \u2194 IsCompact K := by\n  rw [hf.isCompact_iff, image_preimage_eq_of_subset Kf]\n\n/-- The preimage of a compact set in the image of an inducing map is compact. -/"}, "right": {"name": "RegularSpace.of_lift'_closure", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X], (\u2200 (x : X), Filter.lift' (nhds x) closure = nhds x) \u2192 RegularSpace X", "human_argument": "A space X is regular precisely when for each x and every neighborhood U of x there is a neighborhood V of x with closure(V) \u2286 U; this is equivalent to the requirement that taking closures of members of the neighborhood filter at x yields the same filter. The hypothesis says exactly that for every x the filter obtained by applying closure to the neighborhoods of x equals the neighborhood filter itself. Hence X is regular.", "lean_source": "theorem RegularSpace.of_lift'_closure (h : \u2200 x : X, (\ud835\udcdd x).lift' closure = \ud835\udcdd x) : RegularSpace X :=\n  Iff.mpr ((regularSpace_TFAE X).out 0 5) h"}}, {"pair_id": "study_002", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [h : LindelofSpace X], IsLindelof Set.univ", "human_argument": "The proof simply invokes the defining Lindelof-space witness for the whole space. There is no real construction: the theorem packages the class assumption into the statement that the universal set is Lindelof.", "lean_source": "theorem isLindelof_univ [h : LindelofSpace X] : IsLindelof (univ : Set X) :=\n  h.isLindelof_univ"}, "right": {"name": "IsLindelof.image_of_continuousOn", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 ContinuousOn f s \u2192 IsLindelof (f '' s)", "human_argument": "The proof starts with a Lindelof set in the domain and a map that is continuous on that set. It pulls an open cover of the image back along the map, uses the Lindelof hypothesis to choose a countable subcover in the domain, and then pushes that countable subcover forward to cover the image.", "lean_source": "theorem IsLindelof.image_of_continuousOn {f : X \u2192 Y} (hs : IsLindelof s) (hf : ContinuousOn f s) :\n    IsLindelof (f '' s) := by\n  intro l lne _ ls\n  have : NeBot (l.comap f \u2293 \ud835\udcdf s) :=\n    comap_inf_principal_neBot_of_image_mem lne (le_principal_iff.1 ls)\n  obtain \u27e8x, hxs, hx\u27e9 : \u2203 x \u2208 s, ClusterPt x (l.comap f \u2293 \ud835\udcdf s) := @hs _ this _ inf_le_right\n  haveI := hx.neBot\n  use f x, mem_image_of_mem f hxs\n  have : Tendsto f (\ud835\udcdd x \u2293 (comap f l \u2293 \ud835\udcdf s)) (\ud835\udcdd (f x) \u2293 l) := by\n    convert! (hf x hxs).inf (@tendsto_comap _ _ f l) using 1\n    rw [nhdsWithin]\n    ac_rfl\n  exact this.neBot\n\n/-- A continuous image of a Lindel\u00f6f set is a Lindel\u00f6f set within the codomain. -/"}}, {"pair_id": "study_003", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isCompact_closure_singleton", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R0Space X] {x : X}, IsCompact (closure {x})", "human_argument": "Let {U_i} be an open cover of cl{x}. Since x \u2208 cl{x}, some U_i contains x. For any y \u2208 cl{x}, the R0 hypothesis makes the specialization relation symmetric, so from y \u2208 cl{x} we get that x specializes to y; but if x specializes to y and U is open with x \u2208 U, then y \u2208 U. Applying this to U_i shows every y \u2208 cl{x} lies in U_i, hence {U_i} already covers cl{x}. Thus every open cover has a finite subcover (a singleton), so cl{x} is compact.", "lean_source": "theorem isCompact_closure_singleton : IsCompact (closure {x}) := by\n  refine isCompact_of_finite_subcover fun U hUo hxU \u21a6 ?_\n  obtain \u27e8i, hi\u27e9 : \u2203 i, x \u2208 U i := mem_iUnion.1 <| hxU <| subset_closure rfl\n  refine \u27e8{i}, fun y hy \u21a6 ?_\u27e9\n  rw [\u2190 specializes_iff_mem_closure, specializes_comm] at hy\n  simpa using hy.mem_open (hUo i) hi"}, "right": {"name": "ProperSpace.of_isCompact_closedBall_of_le", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] (R : \u211d),\n  (\u2200 (x : \u03b1) (r : \u211d), R \u2264 r \u2192 IsCompact (Metric.closedBall x r)) \u2192 ProperSpace \u03b1", "human_argument": "Let x and r be arbitrary and put s = max(r,R); then s \u2265 R, so by hypothesis the closed ball B(x,s) is compact. The ball B(x,r) is contained in B(x,s) and is closed, hence a closed subset of a compact set. Therefore B(x,r) is compact for all x,r, so every closed ball is compact and \u03b1 is a proper space.", "lean_source": "theorem ProperSpace.of_isCompact_closedBall_of_le (R : \u211d)\n    (h : \u2200 x : \u03b1, \u2200 r, R \u2264 r \u2192 IsCompact (closedBall x r)) : ProperSpace \u03b1 :=\n  \u27e8fun x r => IsCompact.of_isClosed_subset (h x (max r R) (le_max_right _ _)) isClosed_closedBall\n    (closedBall_subset_closedBall <| le_max_left _ _)\u27e9\n\n/-- If there exists a sequence of compact closed balls with the same center\nsuch that the radii tend to infinity, then the space is proper. -/"}}, {"pair_id": "study_004", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "separatedNhds_of_isCompact_isCompact", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] {s t : Set X},\n  IsCompact s \u2192 IsCompact t \u2192 Disjoint s t \u2192 SeparatedNhds s t", "human_argument": "Let X be Hausdorff and suppose s and t are compact and disjoint. The diagonal \u0394 in X\u00d7X is closed in a Hausdorff space, so its complement U := (X\u00d7X)\\\u0394 is open, and disjointness of s and t means s\u00d7t \u2286 U. By the tube lemma (or the generalized tube lemma), since s\u00d7t is compact and contained in the open set U, there exist neighbourhoods S \u2287 s and T \u2287 t with S\u00d7T \u2286 U. Hence S and T are disjoint from the diagonal and so provide the desired separated neighbourhoods for s and t.", "lean_source": "theorem SeparatedNhds.of_isCompact_isCompact [T2Space X] {s t : Set X} (hs : IsCompact s)\n    (ht : IsCompact t) (hst : Disjoint s t) : SeparatedNhds s t := by\n  simp only [SeparatedNhds, prod_subset_compl_diagonal_iff_disjoint.symm] at hst \u22a2\n  exact generalized_tube_lemma hs ht isClosed_diagonal.isOpen_compl hst\n\n/-- In a `R1Space X`, for disjoint closed sets `s t` such that `closure s\u1d9c` is compact,\nthere are neighbourhoods that separate `s` and `t`. -/"}, "right": {"name": "IsHereditarilyLindelof.isLindelof_subset", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsHereditarilyLindelof s \u2192 t \u2286 s \u2192 IsLindelof t", "human_argument": "If s is hereditarily Lindel\u00f6f then by definition every subset of s is Lindel\u00f6f. Since t \u2286 s, t is one of those subsets. Hence t is Lindel\u00f6f.", "lean_source": "lemma IsHereditarilyLindelof.isLindelof_subset (hs : IsHereditarilyLindelof s) (ht : t \u2286 s) :\n    IsLindelof t := hs t ht"}}, {"pair_id": "study_005", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.closedBall_compl_subset_of_mem_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] {s : Set \u03b1},\n  s \u2208 Filter.cocompact \u03b1 \u2192 \u2200 (c : \u03b1), \u2203 r, (Metric.closedBall c r)\u1d9c \u2286 s", "human_argument": "The proof uses the definition of the cocompact filter and the fact that a closed ball is compact in the available metric context. If a set is eventually outside every compact set, then it is eventually outside the chosen closed ball.", "lean_source": "theorem closedBall_compl_subset_of_mem_cocompact {s : Set \u03b1} (hs : s \u2208 cocompact \u03b1) (c : \u03b1) :\n    \u2203 (r : \u211d), (Metric.closedBall c r)\u1d9c \u2286 s :=\n  IsCobounded.closedBall_compl_subset (cobounded_le_cocompact hs) c"}, "right": {"name": "Metric.cobounded_eq_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] [inst_1 : ProperSpace \u03b1], Bornology.cobounded \u03b1 = Filter.cocompact \u03b1", "human_argument": "The proof proves equality of the cobounded and cocompact filters in a metric setting. One direction turns bounded complements into compact containment data, and the other direction uses metric balls or closed balls to convert compact complements back into boundedness statements.", "lean_source": "theorem Metric.cobounded_eq_cocompact [ProperSpace \u03b1] : cobounded \u03b1 = cocompact \u03b1 := by\n  nontriviality \u03b1; inhabit \u03b1\n  exact cobounded_le_cocompact.antisymm <| (hasBasis_cobounded_compl_closedBall default).ge_iff.2\n    fun _ _ \u21a6 (isCompact_closedBall _ _).compl_mem_cocompact"}}, {"pair_id": "study_006", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.elim_nhds_subcover_nhdsSet", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {U : X \u2192 Set X}, (\u2200 x \u2208 s, U x \u2208 nhds x) \u2192 \u2203 t, (\u2200 x \u2208 t, x \u2208 s) \u2227 \u22c3 x \u2208 t, U x \u2208 nhdsSet s", "human_argument": "The proof starts with compactness and an open-neighborhood assignment around the compact set. Compactness extracts finitely many of those neighborhoods, and the finite subcover is repackaged as a neighborhood-set cover.", "lean_source": "lemma IsCompact.elim_nhds_subcover_nhdsSet (hs : IsCompact s) {U : X \u2192 Set X}\n    (hU : \u2200 x \u2208 s, U x \u2208 \ud835\udcdd x) : \u2203 t : Finset X, (\u2200 x \u2208 t, x \u2208 s) \u2227 (\u22c3 x \u2208 t, U x) \u2208 \ud835\udcdd\u02e2 s := by\n  let \u27e8t, ht\u27e9 := hs.elim_nhds_subcover_nhdsSet' (fun x _ => U x) hU\n  classical\n  exact \u27e8t.image (\u2191), fun x hx =>\n    let \u27e8y, _, hyx\u27e9 := Finset.mem_image.1 hx\n    hyx \u25b8 y.2,\n    by rwa [Finset.set_biUnion_finset_image]\u27e9"}, "right": {"name": "exists_compact_closed_between", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : LocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K U : Set X},\n  IsCompact K \u2192 IsOpen U \u2192 K \u2286 U \u2192 \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U", "human_argument": "The proof uses local compactness to thicken each point of a compact set inside the given open set by a compact neighborhood. A finite compact subcover is chosen, then combined and closed so that it still sits inside the open set while the original compact set lies in its interior.", "lean_source": "theorem exists_compact_closed_between [LocallyCompactSpace X] [RegularSpace X]\n    {K U : Set X} (hK : IsCompact K) (hU : IsOpen U) (h_KU : K \u2286 U) :\n    \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U :=\n  let \u27e8L, L_comp, KL, LU\u27e9 := exists_compact_between hK hU h_KU\n  \u27e8closure L, L_comp.closure, isClosed_closure, KL.trans <| interior_mono subset_closure,\n    L_comp.closure_subset_of_isOpen hU LU\u27e9\n\n/-- In a (possibly non-Hausdorff) locally compact regular space, for every compact set `K`,\n`\ud835\udcdd\u02e2 K` has a basis consisting of closed compact sets. -/"}}, {"pair_id": "study_007", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsHereditarilyLindelof.isLindelof_subset", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsHereditarilyLindelof s \u2192 t \u2286 s \u2192 IsLindelof t", "human_argument": "If s is hereditarily Lindel\u00f6f then by definition every subset of s is Lindel\u00f6f. Since t \u2286 s, t is one of those subsets. Hence t is Lindel\u00f6f.", "lean_source": "lemma IsHereditarilyLindelof.isLindelof_subset (hs : IsHereditarilyLindelof s) (ht : t \u2286 s) :\n    IsLindelof t := hs t ht"}, "right": {"name": "Tendsto.isLindelof_insert_range_of_coLindelof", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y} {y : Y},\n  Filter.Tendsto f (Filter.coLindelof X) (nhds y) \u2192 Continuous f \u2192 IsLindelof (insert y (Set.range f))", "human_argument": "The proof studies the range of a sequence or net together with a limiting point. It uses the convergence behavior to control the tail of the range and combines that with co-Lindelof information to show the inserted range remains Lindelof.", "lean_source": "theorem Tendsto.isLindelof_insert_range_of_coLindelof {f : X \u2192 Y} {y}\n    (hf : Tendsto f (coLindelof X) (\ud835\udcdd y)) (hfc : Continuous f) :\n    IsLindelof (insert y (range f)) := by\n  intro l hne _ hle\n  by_cases hy : ClusterPt y l\n  \u00b7 exact \u27e8y, Or.inl rfl, hy\u27e9\n  simp only [clusterPt_iff_nonempty, not_forall, \u2190 not_disjoint_iff_nonempty_inter, not_not] at hy\n  rcases hy with \u27e8s, hsy, t, htl, hd\u27e9\n  rcases mem_coLindelof.1 (hf hsy) with \u27e8K, hKc, hKs\u27e9\n  have : f '' K \u2208 l := by\n    filter_upwards [htl, le_principal_iff.1 hle] with y hyt hyf\n    rcases hyf with (rfl | \u27e8x, rfl\u27e9)\n    exacts [(hd.le_bot \u27e8mem_of_mem_nhds hsy, hyt\u27e9).elim,\n      mem_image_of_mem _ (not_not.1 fun hxK => hd.le_bot \u27e8hKs hxK, hyt\u27e9)]\n  rcases hKc.image hfc (le_principal_iff.2 this) with \u27e8y, hy, hyl\u27e9\n  exact \u27e8y, Or.inr <| image_subset_range _ _ hy, hyl\u27e9\n\n/-- `Filter.coclosedLindelof` is the filter generated by complements to closed Lindelof sets. -/"}}, {"pair_id": "study_008", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "DilationEquiv.toHomeomorph_symm", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : PseudoEMetricSpace X] [inst_1 : PseudoEMetricSpace Y] (e : X \u2243\u1d48 Y),\n  Homeomorph.symm (DilationEquiv.toHomeomorph e) = DilationEquiv.toHomeomorph (DilationEquiv.symm e)", "human_argument": "The proof is structural: a dilation equivalence already gives a homeomorphism, and the inverse homeomorphism is obtained by applying the same construction to the inverse equivalence.", "lean_source": "lemma toHomeomorph_symm (e : X \u2243\u1d48 Y) : e.symm.toHomeomorph = e.toHomeomorph.symm :=\n  rfl\n\n@[simp]"}, "right": {"name": "DilationEquiv.map_cobounded", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} {F : Type u_3} [inst : PseudoMetricSpace X] [inst_1 : PseudoMetricSpace Y]\n  [inst_2 : DilationEquivClass F X Y] (e : F), Filter.map (\u21d1e) (Bornology.cobounded X) = Bornology.cobounded Y", "human_argument": "The proof shows that a dilation equivalence preserves the cobounded filter. It uses the metric scaling control to send bounded sets to bounded sets and then lifts that boundedness preservation to a statement about the filter at infinity.", "lean_source": "lemma map_cobounded (e : F) : map e (cobounded X) = cobounded Y := by\n  rw [\u2190 Dilation.comap_cobounded e, map_comap_of_surjective (EquivLike.surjective e)]\n\nend PseudoMetricSpace\n\nend DilationEquiv"}}, {"pair_id": "study_009", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "exists_mem_nhdsSet_isCompact_mapsTo", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y]\n  [inst_2 : LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X} {U : Set Y},\n  Continuous f \u2192 IsCompact K \u2192 IsOpen U \u2192 Set.MapsTo f K U \u2192 \u2203 L \u2208 nhdsSet K, IsCompact L \u2227 Set.MapsTo f L U", "human_argument": "For each x \u2208 K, continuity of f and openness of U together with local compactness give a neighborhood V_x of x and a compact set C_x with V_x \u2286 C_x and f(C_x) \u2286 U. The family {V_x : x \u2208 K} covers K, so by compactness of K finitely many V_{x_i} (i = 1,...,n) already cover K. Let L = \u22c3_{i=1}^n C_{x_i}; then L is compact (finite union of compact sets), contains a neighborhood of K (since \u22c3 V_{x_i} \u2286 L), and f(L) \u2286 U (each C_{x_i} maps into U). Hence L is the required compact neighborhood of K with f(L) \u2286 U.", "lean_source": "lemma exists_mem_nhdsSet_isCompact_mapsTo [LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X}\n    {U : Set Y} (hf : Continuous f) (hK : IsCompact K) (hU : IsOpen U) (hKU : MapsTo f K U) :\n    \u2203 L \u2208 \ud835\udcdd\u02e2 K, IsCompact L \u2227 MapsTo f L U := by\n  choose! V hxV hVc hVU using fun x (hx : x \u2208 K) \u21a6\n    exists_mem_nhds_isCompact_mapsTo hf (hU.mem_nhds (hKU hx))\n  rcases hK.elim_nhds_subcover_nhdsSet hxV with \u27e8s, hsK, hKs\u27e9\n  exact \u27e8_, hKs, s.isCompact_biUnion fun x hx \u21a6 hVc x (hsK x hx), mapsTo_iUnion\u2082.2 fun x hx \u21a6\n    hVU x (hsK x hx)\u27e9\n\n/-- In a locally compact space, for every containment `K \u2286 U` of a compact set `K` in an open\n  set `U`, there is a compact neighborhood `L` such that `K \u2286 L \u2286 U`: equivalently, there is a\n  compact `L` such that `K \u2286 interior L` and `L \u2286 U`.\n  See also `exists_compact_closed_between`, in which one guarantees additionally that `L` is closed\n  if the space is regular. -/"}, "right": {"name": "Metric.tendsto_dist_right_atTop_iff", "statement": "\u2200 {\u03b1 : Type u} {\u03b2 : Type v} [inst : PseudoMetricSpace \u03b1] (c : \u03b1) {f : \u03b2 \u2192 \u03b1} {l : Filter \u03b2},\n  Filter.Tendsto (fun x => dist (f x) c) l Filter.atTop \u2194 Filter.Tendsto f l (Bornology.cobounded \u03b1)", "human_argument": "The distance values dist(f(x),c) tend to infinity (eventually for large radii) iff for every R there is a set in the filter on \u03b2 on which dist(f(x),c) > R. But the set {x \u2208 \u03b1 | dist(x,c) > R} is exactly the complement of the closed ball of radius R (a bounded set), so the preimages of the rays (R,\u221e) are precisely complements of bounded subsets of \u03b1. Hence f is eventually outside every bounded set, i.e. f tends to the cobounded bornology on \u03b1, and the two notions are equivalent.", "lean_source": "theorem tendsto_dist_right_atTop_iff (c : \u03b1) {f : \u03b2 \u2192 \u03b1} {l : Filter \u03b2} :\n    Tendsto (fun x \u21a6 dist (f x) c) l atTop \u2194 Tendsto f l (cobounded \u03b1) := by\n  rw [\u2190 comap_dist_right_atTop c, tendsto_comap_iff, Function.comp_def]\n\n@[simp]"}}, {"pair_id": "study_010", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "exists_mem_nhdsSet_isCompact_mapsTo", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y]\n  [inst_2 : LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X} {U : Set Y},\n  Continuous f \u2192 IsCompact K \u2192 IsOpen U \u2192 Set.MapsTo f K U \u2192 \u2203 L \u2208 nhdsSet K, IsCompact L \u2227 Set.MapsTo f L U", "human_argument": "For each x \u2208 K, continuity of f and openness of U together with local compactness give a neighborhood V_x of x and a compact set C_x with V_x \u2286 C_x and f(C_x) \u2286 U. The family {V_x : x \u2208 K} covers K, so by compactness of K finitely many V_{x_i} (i = 1,...,n) already cover K. Let L = \u22c3_{i=1}^n C_{x_i}; then L is compact (finite union of compact sets), contains a neighborhood of K (since \u22c3 V_{x_i} \u2286 L), and f(L) \u2286 U (each C_{x_i} maps into U). Hence L is the required compact neighborhood of K with f(L) \u2286 U.", "lean_source": "lemma exists_mem_nhdsSet_isCompact_mapsTo [LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X}\n    {U : Set Y} (hf : Continuous f) (hK : IsCompact K) (hU : IsOpen U) (hKU : MapsTo f K U) :\n    \u2203 L \u2208 \ud835\udcdd\u02e2 K, IsCompact L \u2227 MapsTo f L U := by\n  choose! V hxV hVc hVU using fun x (hx : x \u2208 K) \u21a6\n    exists_mem_nhds_isCompact_mapsTo hf (hU.mem_nhds (hKU hx))\n  rcases hK.elim_nhds_subcover_nhdsSet hxV with \u27e8s, hsK, hKs\u27e9\n  exact \u27e8_, hKs, s.isCompact_biUnion fun x hx \u21a6 hVc x (hsK x hx), mapsTo_iUnion\u2082.2 fun x hx \u21a6\n    hVU x (hsK x hx)\u27e9\n\n/-- In a locally compact space, for every containment `K \u2286 U` of a compact set `K` in an open\n  set `U`, there is a compact neighborhood `L` such that `K \u2286 L \u2286 U`: equivalently, there is a\n  compact `L` such that `K \u2286 interior L` and `L \u2286 U`.\n  See also `exists_compact_closed_between`, in which one guarantees additionally that `L` is closed\n  if the space is regular. -/"}, "right": {"name": "Embedding.isLindelof_iff", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  Embedding f \u2192 (IsLindelof s \u2194 IsLindelof (f '' s))", "human_argument": "The proof uses that an embedding identifies the source with its image topologically. Lindelofness is transported across this identification, so covers on one side correspond to covers on the other.", "lean_source": "theorem Topology.IsInducing.isLindelof_iff {f : X \u2192 Y} (hf : IsInducing f) :\n    IsLindelof s \u2194 IsLindelof (f '' s) := by\n  refine \u27e8fun hs => hs.image hf.continuous, fun hs F F_ne_bot _ F_le => ?_\u27e9\n  obtain \u27e8_, \u27e8x, x_in : x \u2208 s, rfl\u27e9, hx : ClusterPt (f x) (map f F)\u27e9 :=\n    hs ((map_mono F_le).trans_eq map_principal)\n  exact \u27e8x, x_in, hf.mapClusterPt_iff.1 hx\u27e9\n\n/-- If `f : X \u2192 Y` is an embedding, the image `f '' s` of a set `s` is Lindel\u00f6f\nif and only if `s` is Lindel\u00f6f. -/"}}, {"pair_id": "study_011", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "r0Space_iff", "statement": "\u2200 (X : Type u) [inst : TopologicalSpace X], R0Space X \u2194 Symmetric Specializes", "human_argument": "The proof unfolds the R0 separation condition into the specialization relation. It shows that topologically indistinguishable points have the expected closure behavior, and conversely that the closure behavior recovers the R0 condition.", "lean_source": "@[mk_iff]"}, "right": {"name": "SeparationQuotient.t2Space_iff", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X], T2Space (SeparationQuotient X) \u2194 R1Space X", "human_argument": "The proof relates Hausdorffness of the separation quotient to the original separation relation. It reasons through the quotient map, showing that distinct quotient classes can be separated exactly when the original space has the required separation behavior modulo indistinguishability.", "lean_source": "theorem SeparationQuotient.t2Space_iff : T2Space (SeparationQuotient X) \u2194 R1Space X := by\n  simp only [t2Space_iff_disjoint_nhds, Pairwise, surjective_mk.forall\u2082, ne_eq, mk_eq_mk,\n    r1Space_iff_inseparable_or_disjoint_nhds, \u2190 disjoint_comap_iff surjective_mk, comap_mk_nhds_mk,\n    \u2190 or_iff_not_imp_left]"}}, {"pair_id": "study_012", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "exists_mem_nhds_isCompact_isClosed", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] [inst_2 : WeaklyLocallyCompactSpace X] (x : X),\n  \u2203 K \u2208 nhds x, IsCompact K \u2227 IsClosed K", "human_argument": "By the cited lemma, the neighborhoods of x admit a neighborhood basis consisting of sets that are both compact and closed. Choosing one element K of this basis gives K \u2208 the neighborhoods of x and K is compact and closed. Hence there exists a neighborhood K of x with the required properties.", "lean_source": "theorem exists_mem_nhds_isCompact_isClosed (x : X) : \u2203 K \u2208 \ud835\udcdd x, IsCompact K \u2227 IsClosed K :=\n  (isCompact_isClosed_basis_nhds x).ex_mem\n\n-- see Note [lower instance priority]\n/-- A weakly locally compact R\u2081 space is locally compact. -/"}, "right": {"name": "IsLindelof.image_of_continuousOn", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 ContinuousOn f s \u2192 IsLindelof (f '' s)", "human_argument": "The proof starts with a Lindelof set in the domain and a map that is continuous on that set. It pulls an open cover of the image back along the map, uses the Lindelof hypothesis to choose a countable subcover in the domain, and then pushes that countable subcover forward to cover the image.", "lean_source": "theorem IsLindelof.image_of_continuousOn {f : X \u2192 Y} (hs : IsLindelof s) (hf : ContinuousOn f s) :\n    IsLindelof (f '' s) := by\n  intro l lne _ ls\n  have : NeBot (l.comap f \u2293 \ud835\udcdf s) :=\n    comap_inf_principal_neBot_of_image_mem lne (le_principal_iff.1 ls)\n  obtain \u27e8x, hxs, hx\u27e9 : \u2203 x \u2208 s, ClusterPt x (l.comap f \u2293 \ud835\udcdf s) := @hs _ this _ inf_le_right\n  haveI := hx.neBot\n  use f x, mem_image_of_mem f hxs\n  have : Tendsto f (\ud835\udcdd x \u2293 (comap f l \u2293 \ud835\udcdf s)) (\ud835\udcdd (f x) \u2293 l) := by\n    convert! (hf x hxs).inf (@tendsto_comap _ _ f l) using 1\n    rw [nhdsWithin]\n    ac_rfl\n  exact this.neBot\n\n/-- A continuous image of a Lindel\u00f6f set is a Lindel\u00f6f set within the codomain. -/"}}, {"pair_id": "study_013", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "AntilipschitzWith.isBounded_of_image2_right", "statement": "\u2200 {\u03b1 : Type u_1} {\u03b2 : Type u_2} {\u03b3 : Type u_3} [inst : PseudoMetricSpace \u03b1] [inst_1 : PseudoMetricSpace \u03b2]\n  [inst_2 : PseudoMetricSpace \u03b3] {f : \u03b1 \u2192 \u03b2 \u2192 \u03b3} {K\u2082 : NNReal},\n  (\u2200 (a : \u03b1), AntilipschitzWith K\u2082 (f a)) \u2192\n    \u2200 {s : Set \u03b1} {t : Set \u03b2}, Bornology.IsBounded (Set.image2 f s t) \u2192 Bornology.IsBounded s \u2228 Bornology.IsBounded t", "human_argument": "Let g: \u03b2 \u2192 \u03b1 \u2192 \u03b3 be the flipped function g(b,a) = f(a,b). For each b the map a \u21a6 g(b,a) is antilipschitz with the same constant K\u2082, and image2 g t s = image2 f s t, so image2 g t s is bounded. Applying the corresponding result with the antilipschitz hypothesis on the first argument to g yields that either t or s is bounded. Hence either s or t is bounded, as required.", "lean_source": "theorem isBounded_of_image2_right {f : \u03b1 \u2192 \u03b2 \u2192 \u03b3} {K\u2082 : \u211d\u22650} (hf : \u2200 a, AntilipschitzWith K\u2082 (f a))\n    {s : Set \u03b1} {t : Set \u03b2} (hst : IsBounded (Set.image2 f s t)) : IsBounded s \u2228 IsBounded t :=\n  Or.symm <| isBounded_of_image2_left (flip f) hf <| image2_swap f s t \u25b8 hst\n\nend AntilipschitzWith"}, "right": {"name": "exists_mem_nhds_isCompact_isClosed", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] [inst_2 : WeaklyLocallyCompactSpace X] (x : X),\n  \u2203 K \u2208 nhds x, IsCompact K \u2227 IsClosed K", "human_argument": "By the cited lemma, the neighborhoods of x admit a neighborhood basis consisting of sets that are both compact and closed. Choosing one element K of this basis gives K \u2208 the neighborhoods of x and K is compact and closed. Hence there exists a neighborhood K of x with the required properties.", "lean_source": "theorem exists_mem_nhds_isCompact_isClosed (x : X) : \u2203 K \u2208 \ud835\udcdd x, IsCompact K \u2227 IsClosed K :=\n  (isCompact_isClosed_basis_nhds x).ex_mem\n\n-- see Note [lower instance priority]\n/-- A weakly locally compact R\u2081 space is locally compact. -/"}}, {"pair_id": "study_014", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Inducing.r0Space", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : R0Space X] [inst_2 : TopologicalSpace Y]\n  {f : Y \u2192 X}, Inducing f \u2192 R0Space Y", "human_argument": "Let f : Y \u2192 X be inducing and suppose X is R0. If a specializes to b in Y, then by the inducing property f(a) specializes to f(b) in X; since X is R0 the specialization relation there is symmetric, so f(b) specializes to f(a). Applying the inducing equivalence again yields that b specializes to a in Y, so specialization on Y is symmetric and Y is R0.", "lean_source": "theorem Topology.IsInducing.r0Space [TopologicalSpace Y] {f : Y \u2192 X} (hf : IsInducing f) :\n    R0Space Y where\n  specializes_symm.symm a b := by\n    simpa only [\u2190 hf.specializes_iff] using Specializes.symm"}, "right": {"name": "Function.LeftInverse.isClosed_range", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : T2Space X]\n  {f : X \u2192 Y} {g : Y \u2192 X}, Function.LeftInverse f g \u2192 Continuous f \u2192 Continuous g \u2192 IsClosed (Set.range g)", "human_argument": "Let f : X \u2192 Y and g : Y \u2192 X satisfy f \u2218 g = id_Y, and assume f and g are continuous and X is Hausdorff. If x \u2208 range g then x = g(y) for some y, hence g(f(x)) = g(f(g(y))) = g(y) = x, so g \u2218 f = id on range g. Both g \u2218 f and the identity map are continuous X \u2192 X, and since X is Hausdorff any two continuous maps into X that agree on a set agree on its closure; thus g \u2218 f = id on closure(range g). Therefore every x in closure(range g) equals g(f x) and so lies in range g, whence closure(range g) \u2286 range g and range g is closed.", "lean_source": "theorem Function.LeftInverse.isClosed_range [T2Space X] {f : X \u2192 Y} {g : Y \u2192 X}\n    (h : Function.LeftInverse f g) (hf : Continuous f) (hg : Continuous g) : IsClosed (range g) :=\n  have : EqOn (g \u2218 f) id (closure <| range g) :=\n    h.rightInvOn_range.eqOn.closure (hg.comp hf) continuous_id\n  isClosed_of_closure_subset fun x hx => \u27e8f x, this hx\u27e9"}}, {"pair_id": "study_015", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.isBounded_iff_subset_ball", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] {s : Set \u03b1} (c : \u03b1), Bornology.IsBounded s \u2194 \u2203 r, s \u2286 Metric.ball c r", "human_argument": "If s is bounded then the set of distances {d(c,x) : x \u2208 s} is bounded above, so we can choose r larger than that bound and then every x \u2208 s satisfies d(c,x) < r, i.e. s \u2286 ball(c,r). Conversely, if s \u2286 ball(c,r) for some r then the ball ball(c,r) is bounded, hence any subset s of it is bounded. Therefore s is bounded if and only if there exists r with s contained in the ball of radius r about c.", "lean_source": "theorem isBounded_iff_subset_ball (c : \u03b1) : IsBounded s \u2194 \u2203 r, s \u2286 ball c r :=\n  \u27e8(IsBounded.subset_ball \u00b7 c), fun \u27e8_r, hr\u27e9 \u21a6 isBounded_ball.subset hr\u27e9"}, "right": {"name": "Subtype.isSigmaCompact_iff", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {p : X \u2192 Prop} {s : Set { a // p a }},\n  IsSigmaCompact s \u2194 IsSigmaCompact (Subtype.val '' s)", "human_argument": "Let i : s \u2192 X be the natural inclusion (sending a subtype element to its underlying point); this map is a topological embedding, hence a homeomorphism onto its image, which is exactly the set of underlying points of s. Homeomorphisms preserve compactness, and therefore they preserve countable unions of compact sets. Consequently s is a countable union of compact subspaces if and only if its image in X is, so s is \u03c3-compact exactly when the image of s in X is \u03c3-compact.", "lean_source": "lemma Subtype.isSigmaCompact_iff {p : X \u2192 Prop} {s : Set { a // p a }} :\n    IsSigmaCompact s \u2194 IsSigmaCompact ((\u2191) '' s : Set X) :=\n  IsEmbedding.subtypeVal.isSigmaCompact_iff\n\n/-- A \u03c3-compact space is a space that is the union of a countable collection of compact subspaces.\n  Note that a locally compact separable T\u2082 space need not be \u03c3-compact.\n  The sequence can be extracted using `compactCovering`. -/"}}, {"pair_id": "study_016", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "R1Space.inf", "statement": "\u2200 {X : Type u_3} {t\u2081 t\u2082 : TopologicalSpace X}, R1Space X \u2192 R1Space X \u2192 R1Space X", "human_argument": "Let t\u2081 \u2293 t\u2082 denote the infimum (greatest lower bound) of the two topologies t\u2081 and t\u2082. The two hypotheses assert that each member of the family {t\u2081, t\u2082} satisfies the R1 separation property. Since the R1 property is preserved under arbitrary infima of topologies, the infimum topology t\u2081 \u2293 t\u2082 is R1 as well.", "lean_source": "protected theorem R1Space.inf {X : Type*} {t\u2081 t\u2082 : TopologicalSpace X}\n    (h\u2081 : @R1Space X t\u2081) (h\u2082 : @R1Space X t\u2082) : @R1Space X (t\u2081 \u2293 t\u2082) := by\n  rw [inf_eq_iInf]\n  apply R1Space.iInf\n  simp [*]"}, "right": {"name": "IsCompact.le_nhds_of_unique_clusterPt", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {l : Filter X} {y : X}, s \u2208 l \u2192 (\u2200 x \u2208 s, ClusterPt x l \u2192 x = y) \u2192 l \u2264 nhds y", "human_argument": "Compactness gives that any filter containing s is finer than the neighborhood filter of the set of its cluster points lying in s. By hypothesis that every cluster point of the filter in s equals y, that set of cluster points is {y}. The neighborhood filter of {y} coincides with the neighborhood filter of the point y. Hence the filter is finer than the neighborhoods of y, i.e. it converges to y.", "lean_source": "lemma IsCompact.le_nhds_of_unique_clusterPt (hs : IsCompact s) {l : Filter X} {y : X}\n    (hmem : s \u2208 l) (h : \u2200 x \u2208 s, ClusterPt x l \u2192 x = y) : l \u2264 \ud835\udcdd y := by\n  rw [\u2190 nhdsSet_singleton]\n  exact hs.le_nhdsSet_of_clusterPt hmem h\n\n/-- If values of `f : Y \u2192 X` belong to a compact set `s` eventually along a filter `l`\nand `s'` is the set of `MapClusterPt` for `f` along `l` in `s`,\nthen `f` tends to `\ud835\udcdd\u02e2 s'` along `l`. -/"}}, {"pair_id": "study_017", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.image", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 Continuous f \u2192 IsLindelof (f '' s)", "human_argument": "Let {U_i}_{i\u2208I} be an open cover of f[s] in Y. By continuity each f^{-1}(U_i) is open in X, and these preimages cover s because if x\u2208s then f(x)\u2208f[s] is in some U_i, hence x\u2208f^{-1}(U_i). Since s is Lindel\u00f6f there is a countable subcollection f^{-1}(U_{i_n}) that still covers s, and therefore the corresponding U_{i_n} form a countable subcover of f[s]: if y\u2208f[s] then y=f(x) for some x\u2208s, so x lies in some f^{-1}(U_{i_n}) and thus y\u2208U_{i_n}. Hence f[s] is Lindel\u00f6f.", "lean_source": "theorem IsLindelof.image {f : X \u2192 Y} (hs : IsLindelof s) (hf : Continuous f) :\n    IsLindelof (f '' s) := hs.image_of_continuousOn hf.continuousOn\n\n/-- A filter with the countable intersection property that is finer than the principal filter on\na Lindel\u00f6f set `s` contains any open set that contains all cluster points of `s`. -/"}, "right": {"name": "IsLindelof.adherence_nhdset", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X} {f : Filter X} [inst_1 : CountableInterFilter f],\n  IsLindelof s \u2192 f \u2264 Filter.principal s \u2192 IsOpen t \u2192 (\u2200 x \u2208 s, ClusterPt x f \u2192 x \u2208 t) \u2192 t \u2208 f", "human_argument": "Assume for contradiction that t \u2209 f, and set g = f \u2293 \ud835\udcdf(t\u1d9c); then g is nontrivial and still refines the principal filter of s. By the Lindel\u00f6f property of s together with the countable-intersection property of f, there exists x \u2208 s which is a cluster point of f and for which the neighborhood filter within t\u1d9c at x is nontrivial. By the hypothesis every such cluster point in s lies in t, so x \u2208 t; hence t \u2229 t\u1d9c is a neighborhood of x inside t\u1d9c, forcing that neighborhood filter to be trivial, contradicting the nontriviality of g. Thus t \u2208 f.", "lean_source": "theorem IsLindelof.adherence_nhdset {f : Filter X} [CountableInterFilter f] (hs : IsLindelof s)\n    (hf\u2082 : f \u2264 \ud835\udcdf s) (ht\u2081 : IsOpen t) (ht\u2082 : \u2200 x \u2208 s, ClusterPt x f \u2192 x \u2208 t) : t \u2208 f :=\n  (eq_or_neBot _).casesOn mem_of_eq_bot fun _ \u21a6\n    let \u27e8x, hx, hfx\u27e9 := @hs (f \u2293 \ud835\udcdf t\u1d9c) _ _ <| inf_le_of_left_le hf\u2082\n    have : x \u2208 t := ht\u2082 x hx hfx.of_inf_left\n    have : t\u1d9c \u2229 t \u2208 \ud835\udcdd[t\u1d9c] x := inter_mem_nhdsWithin _ (ht\u2081.mem_nhds this)\n    have A : \ud835\udcdd[t\u1d9c] x = \u22a5 := empty_mem_iff_bot.1 <| compl_inter_self t \u25b8 this\n    have : \ud835\udcdd[t\u1d9c] x \u2260 \u22a5 := hfx.of_inf_right.ne\n    absurd A this\n\n/-- For every open cover of a Lindel\u00f6f set, there exists a countable subcover. -/"}}, {"pair_id": "study_018", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "coLindelof_le_cofinite", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X], Filter.coLindelof X \u2264 Filter.cofinite", "human_argument": "Let s be a cofinite subset of X. Then X \\ s is finite, hence Lindel\u00f6f, so by definition the complement of a Lindel\u00f6f set belongs to the co-Lindel\u00f6f filter; that is, (X \\ (X \\ s)) = s lies in the co-Lindel\u00f6f filter. Therefore every cofinite set is co-Lindel\u00f6f, so the cofinite filter is contained in the co-Lindel\u00f6f filter.", "lean_source": "theorem coLindelof_le_cofinite : coLindelof X \u2264 cofinite := fun s hs =>\n  compl_compl s \u25b8 hs.isLindelof.compl_mem_coLindelof"}, "right": {"name": "specializes_iff_not_disjoint", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] {x y : X}, x \u2933 y \u2194 \u00acDisjoint (nhds x) (nhds y)", "human_argument": "Assume X is a T1 topological space. By definition x specializes to y means y lies in the closure of {x}, equivalently every neighborhood of y contains x. If x specializes to y then every neighborhood V of y contains x, so for any neighborhood U of x we have U \u2229 V \u2287 {x} \u2260 \u2205; hence the neighborhood filters of x and y are not disjoint. Conversely, if the neighborhood filters are not disjoint then every neighborhood V of y meets every neighborhood U of x; intersecting over all neighborhoods U of x (which in a T1 space equals {x}) shows V meets {x}, so x \u2208 V, and thus y is in the closure of {x}, i.e. x specializes to y.", "lean_source": "theorem specializes_iff_not_disjoint : x \u2933 y \u2194 \u00acDisjoint (\ud835\udcdd x) (\ud835\udcdd y) :=\n  disjoint_nhds_nhds_iff_not_specializes.not_left.symm"}}, {"pair_id": "study_019", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "hasBasis_coLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X], Filter.HasBasis (Filter.coLindelof X) IsLindelof compl", "human_argument": "Take as candidate basis the collection of complements of Lindel\u00f6f subsets of X. If A and B are Lindel\u00f6f then A \u222a B is Lindel\u00f6f, and the complement of A \u222a B is contained in both the complement of A and the complement of B, so intersections of two basis elements contain another basis element. The empty set is Lindel\u00f6f, so its complement is the whole space and hence the basis contains a top element. Thus these complements satisfy the axioms of a filter basis and so form a basis for the co-Lindelof filter.", "lean_source": "theorem hasBasis_coLindelof : (coLindelof X).HasBasis IsLindelof compl :=\n  hasBasis_biInf_principal'\n    (fun s hs t ht =>\n      \u27e8s \u222a t, hs.union ht, compl_subset_compl.2 subset_union_left,\n        compl_subset_compl.2 subset_union_right\u27e9)\n    \u27e8\u2205, isLindelof_empty\u27e9"}, "right": {"name": "IsCompact.isSigmaCompact", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {s : Set X}, IsCompact s \u2192 IsSigmaCompact s", "human_argument": "Let s be a compact subset of X. Define a sequence (s_n)_{n\u2208\u2115} by s_n = s for every n; each s_n is compact because s is. The countable union \u22c3_{n\u2208\u2115} s_n equals s, so s is a countable union of compact sets and hence \u03c3-compact.", "lean_source": "lemma IsCompact.isSigmaCompact {s : Set X} (hs : IsCompact s) : IsSigmaCompact s :=\n  \u27e8fun _ => s, fun _ => hs, iUnion_const _\u27e9\n\n/-- The empty set is \u03c3-compact. -/\n@[simp]"}}, {"pair_id": "study_020", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsCompact s \u2192 IsLindelof s", "human_argument": "The proof turns an arbitrary open cover of a compact set into a finite subcover. Since every finite subcover is countable, compactness immediately implies the Lindelof property.", "lean_source": "theorem IsCompact.isLindelof (hs : IsCompact s) :\n    IsLindelof s := by tauto\n\n/-- A \u03c3-compact set `s` is Lindel\u00f6f -/"}, "right": {"name": "isSigmaCompact_iUnion", "statement": "\u2200 {X : Type u_1} {\u03b9 : Type u_3} [inst : TopologicalSpace X] [inst_1 : Countable \u03b9] (s : \u03b9 \u2192 Set X),\n  (\u2200 (i : \u03b9), IsSigmaCompact (s i)) \u2192 IsSigmaCompact (\u22c3 i, s i)", "human_argument": "The proof handles a countable union of sigma-compact sets. For each member it chooses a countable compact cover, then flattens the two layers of countability into one countable family of compact sets covering the whole union.", "lean_source": "lemma isSigmaCompact_iUnion [Countable \u03b9] (s : \u03b9 \u2192 Set X)\n    (hcomp : \u2200 i, IsSigmaCompact (s i)) : IsSigmaCompact (\u22c3 i, s i) := by\n  -- Choose a decomposition s_i = \u22c3 K_i,j for each i.\n  choose K hcomp hcov using fun i \u21a6 hcomp i\n  -- Then, we have a countable union of countable unions of compact sets, i.e. countably many.\n  have := calc\n    \u22c3 i, s i\n    _ = \u22c3 i, \u22c3 n, (K i n) := by simp_rw [hcov]\n    _ = \u22c3 (i) (n : \u2115), (K.uncurry \u27e8i, n\u27e9) := by rw [Function.uncurry_def]\n    _ = \u22c3 x, K.uncurry x := by rw [\u2190 iUnion_prod']\n  rw [this]\n  exact isSigmaCompact_iUnion_of_isCompact K.uncurry fun x \u21a6 (hcomp x.1 x.2)\n\n/-- Countable unions of \u03c3-compact sets are \u03c3-compact. -/"}}, {"pair_id": "study_021", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Embedding.isLindelof_iff", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  Embedding f \u2192 (IsLindelof s \u2194 IsLindelof (f '' s))", "human_argument": "The proof uses that an embedding identifies the source with its image topologically. Lindelofness is transported across this identification, so covers on one side correspond to covers on the other.", "lean_source": "theorem Topology.IsInducing.isLindelof_iff {f : X \u2192 Y} (hf : IsInducing f) :\n    IsLindelof s \u2194 IsLindelof (f '' s) := by\n  refine \u27e8fun hs => hs.image hf.continuous, fun hs F F_ne_bot _ F_le => ?_\u27e9\n  obtain \u27e8_, \u27e8x, x_in : x \u2208 s, rfl\u27e9, hx : ClusterPt (f x) (map f F)\u27e9 :=\n    hs ((map_mono F_le).trans_eq map_principal)\n  exact \u27e8x, x_in, hf.mapClusterPt_iff.1 hx\u27e9\n\n/-- If `f : X \u2192 Y` is an embedding, the image `f '' s` of a set `s` is Lindel\u00f6f\nif and only if `s` is Lindel\u00f6f. -/"}, "right": {"name": "exists_mem_nhdsSet_isCompact_mapsTo", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y]\n  [inst_2 : LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X} {U : Set Y},\n  Continuous f \u2192 IsCompact K \u2192 IsOpen U \u2192 Set.MapsTo f K U \u2192 \u2203 L \u2208 nhdsSet K, IsCompact L \u2227 Set.MapsTo f L U", "human_argument": "For each x \u2208 K, continuity of f and openness of U together with local compactness give a neighborhood V_x of x and a compact set C_x with V_x \u2286 C_x and f(C_x) \u2286 U. The family {V_x : x \u2208 K} covers K, so by compactness of K finitely many V_{x_i} (i = 1,...,n) already cover K. Let L = \u22c3_{i=1}^n C_{x_i}; then L is compact (finite union of compact sets), contains a neighborhood of K (since \u22c3 V_{x_i} \u2286 L), and f(L) \u2286 U (each C_{x_i} maps into U). Hence L is the required compact neighborhood of K with f(L) \u2286 U.", "lean_source": "lemma exists_mem_nhdsSet_isCompact_mapsTo [LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X}\n    {U : Set Y} (hf : Continuous f) (hK : IsCompact K) (hU : IsOpen U) (hKU : MapsTo f K U) :\n    \u2203 L \u2208 \ud835\udcdd\u02e2 K, IsCompact L \u2227 MapsTo f L U := by\n  choose! V hxV hVc hVU using fun x (hx : x \u2208 K) \u21a6\n    exists_mem_nhds_isCompact_mapsTo hf (hU.mem_nhds (hKU hx))\n  rcases hK.elim_nhds_subcover_nhdsSet hxV with \u27e8s, hsK, hKs\u27e9\n  exact \u27e8_, hKs, s.isCompact_biUnion fun x hx \u21a6 hVc x (hsK x hx), mapsTo_iUnion\u2082.2 fun x hx \u21a6\n    hVU x (hsK x hx)\u27e9\n\n/-- In a locally compact space, for every containment `K \u2286 U` of a compact set `K` in an open\n  set `U`, there is a compact neighborhood `L` such that `K \u2286 L \u2286 U`: equivalently, there is a\n  compact `L` such that `K \u2286 interior L` and `L \u2286 U`.\n  See also `exists_compact_closed_between`, in which one guarantees additionally that `L` is closed\n  if the space is regular. -/"}}, {"pair_id": "study_022", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isClosedMap_fst_of_compactSpace", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : CompactSpace Y],\n  IsClosedMap Prod.fst", "human_argument": "Let C \u2286 X\u00d7Y be closed and fix x \u2208 X with x \u2209 \u03c0_X(C), so {x}\u00d7Y is disjoint from C. Since C is closed, its complement is an open set containing the compact slice {x}\u00d7Y; by the tube lemma there is a neighborhood U of x in X with U\u00d7Y contained in that complement. Hence U\u2229\u03c0_X(C)=\u2205, so every point outside \u03c0_X(C) has an open neighborhood missing \u03c0_X(C). Therefore the projection \u03c0_X(C) is closed, i.e. the first projection is a closed map.", "lean_source": "theorem isClosedMap_fst_of_compactSpace [CompactSpace Y] :\n    IsClosedMap (Prod.fst : X \u00d7 Y \u2192 X) :=\n  isProperMap_fst_of_compactSpace.isClosedMap\n\n/-- If `X` is a compact topological space, then `Prod.snd : X \u00d7 Y \u2192 Y` is a closed map. -/"}, "right": {"name": "IsCompact.nonempty_iInter_of_directed_nonempty_isCompact_isClosed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {\u03b9 : Type v} [h\u03b9 : Nonempty \u03b9] (t : \u03b9 \u2192 Set X),\n  Directed (fun x x_1 => x \u2287 x_1) t \u2192\n    (\u2200 (i : \u03b9), Set.Nonempty (t i)) \u2192\n      (\u2200 (i : \u03b9), IsCompact (t i)) \u2192 (\u2200 (i : \u03b9), IsClosed (t i)) \u2192 Set.Nonempty (\u22c2 i, t i)", "human_argument": "Pick any index i0. Since \u22c2_i t_i \u2286 t_{i0}, it suffices to show t_{i0} \u2229 \u22c2_i t_i \u2260 \u2205. If this intersection were empty, then by compactness of t_{i0} and the fact that (t_i) is a directed family of closed sets, there would be some i with t_{i0} \u2229 t_i = \u2205. But directedness (with respect to \u2287) gives a j with t_j \u2286 t_{i0} \u2229 t_i, contradicting that each t_j is nonempty; hence \u22c2_i t_i is nonempty.", "lean_source": "theorem IsCompact.nonempty_iInter_of_directed_nonempty_isCompact_isClosed\n    {\u03b9 : Type v} [h\u03b9 : Nonempty \u03b9] (t : \u03b9 \u2192 Set X) (htd : Directed (\u00b7 \u2287 \u00b7) t)\n    (htn : \u2200 i, (t i).Nonempty) (htc : \u2200 i, IsCompact (t i)) (htcl : \u2200 i, IsClosed (t i)) :\n    (\u22c2 i, t i).Nonempty := by\n  let i\u2080 := h\u03b9.some\n  suffices (t i\u2080 \u2229 \u22c2 i, t i).Nonempty by\n    rwa [inter_eq_right.mpr (iInter_subset _ i\u2080)] at this\n  simp only [nonempty_iff_ne_empty] at htn \u22a2\n  apply mt ((htc i\u2080).elim_directed_family_closed t htcl)\n  push Not\n  simp only [\u2190 nonempty_iff_ne_empty] at htn \u22a2\n  refine \u27e8htd, fun i => ?_\u27e9\n  rcases htd i\u2080 i with \u27e8j, hji\u2080, hji\u27e9\n  exact (htn j).mono (subset_inter hji\u2080 hji)\n\n/-- Cantor's intersection theorem for `sInter`:\nthe intersection of a directed family of nonempty compact closed sets is nonempty. -/"}}, {"pair_id": "study_023", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_iff_isLindelof_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsLindelof s \u2194 IsLindelof Set.univ", "human_argument": "The subspace s of X is canonically identified with the whole underlying set of the subtype consisting of points of s, via the inclusion map whose image is exactly s. Lindel\u00f6fness is preserved under this identification, because covering properties of s as a subspace coincide with those of the corresponding universal subset of the subtype. Concretely, the image of the whole subtype is s, so s is Lindel\u00f6f if and only if the universal set in the subtype topology is Lindel\u00f6f.", "lean_source": "theorem isLindelof_iff_isLindelof_univ : IsLindelof s \u2194 IsLindelof (univ : Set s) := by\n  rw [Subtype.isLindelof_iff, image_univ, Subtype.range_coe]"}, "right": {"name": "Metric.cobounded_le_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1], Bornology.cobounded \u03b1 \u2264 Filter.cocompact \u03b1", "human_argument": "The cocompact filter has a basis given by complements of compact subsets. In a pseudometric space every compact set is bounded, so any compact subset is in particular bounded. Hence the complement of any compact set is one of the complements of bounded sets that generate the cobounded filter. Therefore every basic cocompact neighbourhood belongs to the cobounded filter, which yields the inequality cobounded \u2264 cocompact.", "lean_source": "theorem cobounded_le_cocompact : cobounded \u03b1 \u2264 cocompact \u03b1 :=\n  hasBasis_cocompact.ge_iff.2 fun _s hs \u21a6 hs.isBounded"}}, {"pair_id": "study_024", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "separatedNhds_of_finset_finset", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] (s t : Finset X), Disjoint s t \u2192 SeparatedNhds \u2191s \u2191t", "human_argument": "Let s and t be disjoint finite subsets of a Hausdorff space X. Finite subsets are compact, so s and t are compact disjoint sets. In a Hausdorff space any two disjoint compact sets can be separated by disjoint open neighborhoods. Hence there exist disjoint open sets U and V with s \u2286 U and t \u2286 V, i.e. the neighborhoods of s and t are separated.", "lean_source": "theorem SeparatedNhds.of_finset_finset [T2Space X] (s t : Finset X) (h : Disjoint s t) :\n    SeparatedNhds (s : Set X) t :=\n  .of_isCompact_isCompact s.finite_toSet.isCompact t.finite_toSet.isCompact <| mod_cast h"}, "right": {"name": "IsLindelof.inter_left", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsLindelof t \u2192 IsClosed s \u2192 IsLindelof (s \u2229 t)", "human_argument": "Since s is closed in X, the intersection s \u2229 t is a closed subset of the subspace t (and s \u2229 t = t \u2229 s). Any open cover of s \u2229 t by sets open in the subspace t extends to an open cover of t, and because t is Lindel\u00f6f this cover has a countable subcover which still covers s \u2229 t. Hence s \u2229 t is Lindel\u00f6f.", "lean_source": "theorem IsLindelof.inter_left (ht : IsLindelof t) (hs : IsClosed s) : IsLindelof (s \u2229 t) :=\n  inter_comm t s \u25b8 ht.inter_right hs\n\n/-- The set difference of a Lindel\u00f6f set and an open set is a Lindel\u00f6f set. -/"}}, {"pair_id": "study_025", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "T25Space.of_injective_continuous", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : T25Space Y]\n  {f : X \u2192 Y}, Function.Injective f \u2192 Continuous f \u2192 T25Space X", "human_argument": "Let f : X \u2192 Y be injective and continuous, and assume Y is completely Hausdorff. For distinct points x \u2260 y in X we have f(x) \u2260 f(y), so there exist disjoint closed neighborhoods C and D of f(x) and f(y) in Y. Their inverse images f^{-1}(C) and f^{-1}(D) are closed, disjoint, and contain x and y respectively, because inverse images of closed sets under a continuous map are closed and contain the corresponding points. Hence distinct points in X can be separated by disjoint closed neighborhoods, so X is completely Hausdorff.", "lean_source": "theorem T25Space.of_injective_continuous [TopologicalSpace Y] [T25Space Y] {f : X \u2192 Y}\n    (hinj : Injective f) (hcont : Continuous f) : T25Space X where\n  t2_5 x y hne := (tendsto_lift'_closure_nhds hcont x).disjoint (t2_5 <| hinj.ne hne)\n    (tendsto_lift'_closure_nhds hcont y)"}, "right": {"name": "exists_compact_closed_between", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : LocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K U : Set X},\n  IsCompact K \u2192 IsOpen U \u2192 K \u2286 U \u2192 \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U", "human_argument": "The proof uses local compactness to thicken each point of a compact set inside the given open set by a compact neighborhood. A finite compact subcover is chosen, then combined and closed so that it still sits inside the open set while the original compact set lies in its interior.", "lean_source": "theorem exists_compact_closed_between [LocallyCompactSpace X] [RegularSpace X]\n    {K U : Set X} (hK : IsCompact K) (hU : IsOpen U) (h_KU : K \u2286 U) :\n    \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U :=\n  let \u27e8L, L_comp, KL, LU\u27e9 := exists_compact_between hK hU h_KU\n  \u27e8closure L, L_comp.closure, isClosed_closure, KL.trans <| interior_mono subset_closure,\n    L_comp.closure_subset_of_isOpen hU LU\u27e9\n\n/-- In a (possibly non-Hausdorff) locally compact regular space, for every compact set `K`,\n`\ud835\udcdd\u02e2 K` has a basis consisting of closed compact sets. -/"}}, {"pair_id": "study_026", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsClosed.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : LindelofSpace X], IsClosed s \u2192 IsLindelof s", "human_argument": "The proof extends an open cover of a closed subset to a cover of the ambient Lindelof set by adding the open complement. After taking a countable subcover, it removes the complement piece and obtains a countable cover of the closed subset.", "lean_source": "theorem IsClosed.isLindelof [LindelofSpace X] (h : IsClosed s) : IsLindelof s :=\n  isLindelof_univ.of_isClosed_subset h (subset_univ _)\n\n/-- A compact set `s` is Lindel\u00f6f. -/"}, "right": {"name": "IsCompact.closure", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : WeaklyLocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K : Set X}, IsCompact K \u2192 IsCompact (closure K)", "human_argument": "The proof uses the Hausdorff separation fact that compact sets are closed, or equivalently that the closure of a compact set does not add new noncompact behavior. Once the closure is controlled by the compact set, compactness transfers to the closure.", "lean_source": "protected theorem IsCompact.closure {K : Set X} (hK : IsCompact K) : IsCompact (closure K) := by\n  refine isCompact_of_finite_subcover fun U hUo hKU \u21a6 ?_\n  rcases hK.elim_finite_subcover U hUo (subset_closure.trans hKU) with \u27e8t, ht\u27e9\n  exact \u27e8t, hK.closure_subset_of_isOpen (isOpen_biUnion fun _ _ \u21a6 hUo _) ht\u27e9"}}, {"pair_id": "study_027", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "tendsto_nhds_of_unique_mapClusterPt", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : CompactSpace X] {l : Filter Y} {y : X} {f : Y \u2192 X},\n  (\u2200 (x : X), MapClusterPt x l f \u2192 x = y) \u2192 Filter.Tendsto f l (nhds y)", "human_argument": "Consider the image filter of l under f on the compact space X. Compactness guarantees this filter has at least one cluster point, and by hypothesis any cluster point must equal y, so y is the unique cluster point of the image filter. In a compact space a filter with a unique cluster point converges to that point, hence the image filter is finer than the neighborhoods of y. Therefore f tends to y along l.", "lean_source": "lemma tendsto_nhds_of_unique_mapClusterPt [CompactSpace X] {Y} {l : Filter Y} {y : X} {f : Y \u2192 X}\n    (h : \u2200 x, MapClusterPt x l f \u2192 x = y) :\n    Tendsto f l (\ud835\udcdd y) :=\n  le_nhds_of_unique_clusterPt h"}, "right": {"name": "Inducing.r0Space", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : R0Space X] [inst_2 : TopologicalSpace Y]\n  {f : Y \u2192 X}, Inducing f \u2192 R0Space Y", "human_argument": "Let f : Y \u2192 X be inducing and suppose X is R0. If a specializes to b in Y, then by the inducing property f(a) specializes to f(b) in X; since X is R0 the specialization relation there is symmetric, so f(b) specializes to f(a). Applying the inducing equivalence again yields that b specializes to a in Y, so specialization on Y is symmetric and Y is R0.", "lean_source": "theorem Topology.IsInducing.r0Space [TopologicalSpace Y] {f : Y \u2192 X} (hf : IsInducing f) :\n    R0Space Y where\n  specializes_symm.symm a b := by\n    simpa only [\u2190 hf.specializes_iff] using Specializes.symm"}}, {"pair_id": "study_028", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Inducing.isSigmaCompact_iff", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y} {s : Set X},\n  Inducing f \u2192 (IsSigmaCompact s \u2194 IsSigmaCompact (f '' s))", "human_argument": "The proof proves both directions of a sigma-compactness equivalence. It transports countable compact covers across an inducing map, converting compact pieces in one space into compact preimages or images in the other and reassembling the countable union.", "lean_source": "lemma Topology.IsInducing.isSigmaCompact_iff {f : X \u2192 Y} {s : Set X}\n    (hf : IsInducing f) : IsSigmaCompact s \u2194 IsSigmaCompact (f '' s) := by\n  constructor\n  \u00b7 exact fun h \u21a6 h.image hf.continuous\n  \u00b7 rintro \u27e8L, hcomp, hcov\u27e9\n    -- Suppose f(s) is \u03c3-compact; we want to show s is \u03c3-compact.\n    -- Write f(s) as a union of compact sets L n, so s = \u22c3 K n with K n := f\u207b\u00b9(L n) \u2229 s.\n    -- Since f is inducing, each K n is compact iff L n is.\n    refine \u27e8fun n \u21a6 f \u207b\u00b9' (L n) \u2229 s, ?_, ?_\u27e9\n    \u00b7 intro n\n      have : f '' (f \u207b\u00b9' (L n) \u2229 s) = L n := by\n        rw [image_preimage_inter, inter_eq_left.mpr]\n        exact (subset_iUnion _ n).trans hcov.le\n      apply hf.isCompact_iff.mpr (this.symm \u25b8 (hcomp n))\n    \u00b7 calc \u22c3 n, f \u207b\u00b9' L n \u2229 s\n        _ = f \u207b\u00b9' (\u22c3 n, L n) \u2229 s := by rw [preimage_iUnion, iUnion_inter]\n        _ = f \u207b\u00b9' (f '' s) \u2229 s := by rw [hcov]\n        _ = s := inter_eq_right.mpr (subset_preimage_image _ _)\n\n/-- If `f : X \u2192 Y` is an embedding, the image `f '' s` of a set `s` is \u03c3-compact\nif and only `s` is \u03c3-compact. -/"}, "right": {"name": "Inducing.isCompact_preimage'", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Inducing f \u2192 \u2200 {K : Set Y}, IsCompact K \u2192 K \u2286 Set.range f \u2192 IsCompact (f \u207b\u00b9' K)", "human_argument": "The proof uses an inducing map to identify the topology on the source with the topology pulled back from the target. Under that identification, compactness of a target set transfers to compactness of the corresponding preimage.", "lean_source": "lemma Topology.IsInducing.isCompact_preimage' (hf : IsInducing f) {K : Set Y}\n    (hK : IsCompact K) (Kf : K \u2286 range f) : IsCompact (f \u207b\u00b9' K) :=\n  (hf.isCompact_preimage_iff Kf).2 hK\n\n/-- The preimage of a compact set under a closed embedding is a compact set. -/"}}, {"pair_id": "study_029", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "le_nhds_of_unique_clusterPt", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [inst_1 : CompactSpace X] {l : Filter X} {y : X},\n  (\u2200 (x : X), ClusterPt x l \u2192 x = y) \u2192 l \u2264 nhds y", "human_argument": "Let X be compact and let l be a filter with the property that any cluster point of l equals y. Compactness of X implies that l has at least one cluster point. By the uniqueness assumption this cluster point must be y. Hence every neighborhood of y belongs to l, i.e. l \u2264 the neighborhoods filter at y.", "lean_source": "lemma le_nhds_of_unique_clusterPt [CompactSpace X] {l : Filter X} {y : X}\n    (h : \u2200 x, ClusterPt x l \u2192 x = y) : l \u2264 \ud835\udcdd y :=\n  isCompact_univ.le_nhds_of_unique_clusterPt univ_mem fun x _ \u21a6 h x\n\n/-- If `y` is a unique `MapClusterPt` for `f` along `l`\nand the codomain of `f` is a compact space,\nthen `f` tends to `\ud835\udcdd y` along `l`. -/"}, "right": {"name": "IsLindelof.image", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 Continuous f \u2192 IsLindelof (f '' s)", "human_argument": "Let {U_i}_{i\u2208I} be an open cover of f[s] in Y. By continuity each f^{-1}(U_i) is open in X, and these preimages cover s because if x\u2208s then f(x)\u2208f[s] is in some U_i, hence x\u2208f^{-1}(U_i). Since s is Lindel\u00f6f there is a countable subcollection f^{-1}(U_{i_n}) that still covers s, and therefore the corresponding U_{i_n} form a countable subcover of f[s]: if y\u2208f[s] then y=f(x) for some x\u2208s, so x lies in some f^{-1}(U_{i_n}) and thus y\u2208U_{i_n}. Hence f[s] is Lindel\u00f6f.", "lean_source": "theorem IsLindelof.image {f : X \u2192 Y} (hs : IsLindelof s) (hf : Continuous f) :\n    IsLindelof (f '' s) := hs.image_of_continuousOn hf.continuousOn\n\n/-- A filter with the countable intersection property that is finer than the principal filter on\na Lindel\u00f6f set `s` contains any open set that contains all cluster points of `s`. -/"}}, {"pair_id": "study_030", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "ClosedEmbedding.nonLindelofSpace", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : NonLindelofSpace X]\n  {f : X \u2192 Y}, ClosedEmbedding f \u2192 NonLindelofSpace Y", "human_argument": "Let X be non-Lindel\u00f6f, so the co\u2011Lindel\u00f6f filter on X is nontrivial. A closed embedding f : X \u2192 Y pushes this co\u2011Lindel\u00f6f filter forward to a filter on Y, and because f is a closed embedding this pushforward is contained in the co\u2011Lindel\u00f6f filter on Y. Since the pushforward is nontrivial, the co\u2011Lindel\u00f6f filter of Y is also nontrivial. Hence Y is non\u2011Lindel\u00f6f.", "lean_source": "protected theorem Topology.IsClosedEmbedding.nonLindelofSpace [NonLindelofSpace X] {f : X \u2192 Y}\n    (hf : IsClosedEmbedding f) : NonLindelofSpace Y :=\n  nonLindelofSpace_of_neBot hf.tendsto_coLindelof.neBot"}, "right": {"name": "Metric.isCobounded_iff_closedBall_compl_subset", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] {s : Set \u03b1} (c : \u03b1),\n  Bornology.IsCobounded s \u2194 \u2203 r, (Metric.closedBall c r)\u1d9c \u2286 s", "human_argument": "By definition, s is cobounded exactly when its complement is bounded. A subset is bounded iff it is contained in some closed ball around the fixed point c, so the complement of s is bounded iff there exists r such that the complement of s is contained in the closed ball of radius r about c. Passing to complements in that inclusion gives that the complement of that closed ball is contained in s, which is the claimed equivalence.", "lean_source": "theorem isCobounded_iff_closedBall_compl_subset {s : Set \u03b1} (c : \u03b1) :\n    IsCobounded s \u2194 \u2203 (r : \u211d), (Metric.closedBall c r)\u1d9c \u2286 s := by\n  rw [\u2190 isBounded_compl_iff, isBounded_iff_subset_closedBall c]\n  apply exists_congr\n  intro r\n  rw [compl_subset_comm]"}}, {"pair_id": "study_031", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.tendsto_dist_right_cobounded_atTop", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] (c : \u03b1),\n  Filter.Tendsto (fun x => dist x c) (Bornology.cobounded \u03b1) Filter.atTop", "human_argument": "Fix c. For any R \u2265 0, the set {x | dist(x,c) \u2265 R} contains the complement of the closed ball of radius R around c, hence is a cobounded set. Thus for every R the property dist(x,c) \u2265 R holds eventually along the cobounded filter, which means the map x \u21a6 dist(x,c) tends to infinity with respect to the cobounded filter.", "lean_source": "theorem tendsto_dist_right_cobounded_atTop (c : \u03b1) : Tendsto (dist \u00b7 c) (cobounded \u03b1) atTop :=\n  tendsto_iff_comap.2 (comap_dist_right_atTop c).ge"}, "right": {"name": "IsCompact.isSigmaCompact", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {s : Set X}, IsCompact s \u2192 IsSigmaCompact s", "human_argument": "Let s be a compact subset of X. Define a sequence (s_n)_{n\u2208\u2115} by s_n = s for every n; each s_n is compact because s is. The countable union \u22c3_{n\u2208\u2115} s_n equals s, so s is a countable union of compact sets and hence \u03c3-compact.", "lean_source": "lemma IsCompact.isSigmaCompact {s : Set X} (hs : IsCompact s) : IsSigmaCompact s :=\n  \u27e8fun _ => s, fun _ => hs, iUnion_const _\u27e9\n\n/-- The empty set is \u03c3-compact. -/\n@[simp]"}}, {"pair_id": "study_032", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "HereditarilyLindelof_LindelofSets", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [inst_1 : HereditarilyLindelofSpace X] (s : Set X), IsLindelof s", "human_argument": "Let X be hereditarily Lindel\u00f6f and let s \u2286 X. By hypothesis the whole space (the universal subset) carries the hereditary Lindel\u00f6f property, so every subset of the universe is Lindel\u00f6f. In particular, since s \u2286 univ, s is Lindel\u00f6f.", "lean_source": "theorem HereditarilyLindelofSpace.isLindelof [HereditarilyLindelofSpace X] (s : Set X) :\n    IsLindelof s := by\n  apply HereditarilyLindelofSpace.isHereditarilyLindelof_univ\n  exact subset_univ s\n\n@[deprecated (since := \"2026-01-12\")]"}, "right": {"name": "LocallyCompactSpace.of_hasBasis", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {\u03b9 : X \u2192 Type u_4} {p : (x : X) \u2192 \u03b9 x \u2192 Prop} {s : (x : X) \u2192 \u03b9 x \u2192 Set X},\n  (\u2200 (x : X), Filter.HasBasis (nhds x) (p x) (s x)) \u2192\n    (\u2200 (x : X) (i : \u03b9 x), p x i \u2192 IsCompact (s x i)) \u2192 LocallyCompactSpace X", "human_argument": "Assume that for each x the neighborhoods of x have a basis consisting of the sets s(x,i) with i satisfying p(x,i), and that every such s(x,i) with p(x,i) holds is compact. Fix x and let t be any neighborhood of x. By the basis property there is some i with p(x,i) such that s(x,i) \u2286 t and therefore s(x,i) is itself a neighborhood of x. By the second hypothesis s(x,i) is compact, so we have a compact neighborhood of x contained in t. Since x and its neighborhood t were arbitrary, X is locally compact.", "lean_source": "theorem LocallyCompactSpace.of_hasBasis {\u03b9 : X \u2192 Type*} {p : \u2200 x, \u03b9 x \u2192 Prop}\n    {s : \u2200 x, \u03b9 x \u2192 Set X} (h : \u2200 x, (\ud835\udcdd x).HasBasis (p x) (s x))\n    (hc : \u2200 x i, p x i \u2192 IsCompact (s x i)) : LocallyCompactSpace X :=\n  \u27e8fun x _t ht =>\n    let \u27e8i, hp, ht\u27e9 := (h x).mem_iff.1 ht\n    \u27e8s x i, (h x).mem_of_mem hp, ht, hc x i hp\u27e9\u27e9"}}, {"pair_id": "study_033", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "R1Space.sInf", "statement": "\u2200 {X : Type u_3} {T : Set (TopologicalSpace X)}, (\u2200 t \u2208 T, R1Space X) \u2192 R1Space X", "human_argument": "Let \u03c4 be the infimum (greatest lower bound) of the family T of topologies on X. Fix x,y \u2208 X and consider two cases. If some t \u2208 T has disjoint neighborhoods of x and y, then those neighborhoods remain disjoint in \u03c4 because the neighborhood filter for \u03c4 is contained in the neighborhood filter for t. Otherwise, for every t the neighborhoods of x and y are not disjoint, so by the R1 property in each t we have that x specializes to y in every t, and this specialization relation is preserved when passing to the infimum topology; hence \u03c4 satisfies the R1 condition.", "lean_source": "protected theorem R1Space.sInf {X : Type*} {T : Set (TopologicalSpace X)}\n    (hT : \u2200 t \u2208 T, @R1Space X t) : @R1Space X (sInf T) := by\n  let _ := sInf T\n  refine \u27e8fun x y \u21a6 ?_\u27e9\n  simp only [Specializes, nhds_sInf]\n  by_cases! hTd : \u2203 t \u2208 T, Disjoint (@nhds X t x) (@nhds X t y)\n  \u00b7 rcases hTd with \u27e8t, htT, htd\u27e9\n    exact .inr <| htd.mono (iInf\u2082_le t htT) (iInf\u2082_le t htT)\n  \u00b7 exact .inl <| iInf\u2082_mono fun t ht \u21a6 ((hT t ht).1 x y).resolve_right (hTd t ht)"}, "right": {"name": "SeparatedNhds.of_isCompact_isClosed", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : RegularSpace X] {s t : Set X},\n  IsCompact s \u2192 IsClosed t \u2192 Disjoint s t \u2192 SeparatedNhds s t", "human_argument": "Let X be regular, s be compact and t be closed with s \u2229 t = \u2205. For each x in s regularity gives disjoint open neighborhoods U_x of x and V_x containing t so that the closure of U_x is disjoint from V_x. The family {U_x : x \u2208 s} covers s, so by compactness choose a finite subcover U_1,\u2026,U_n and put U = \u22c3_{i=1}^n U_i and V = \u22c2_{i=1}^n V_i. Then U is an open neighborhood of s and V is an open neighborhood of t, and since each closure U_i is disjoint from V_i (hence from V), the closure of U is disjoint from V, so U and V are separated neighborhoods of s and t.", "lean_source": "lemma SeparatedNhds.of_isCompact_isClosed {s t : Set X}\n    (hs : IsCompact s) (ht : IsClosed t) (hst : Disjoint s t) : SeparatedNhds s t := by\n  simpa only [separatedNhds_iff_disjoint, hs.disjoint_nhdsSet_left, disjoint_nhds_nhdsSet,\n    ht.closure_eq, disjoint_left] using hst\n\nend\n\n/-- This technique to witness `HasSeparatingCover` in regular Lindel\u00f6f topological spaces\nwill be used to prove regular Lindel\u00f6f spaces are normal. -/"}}, {"pair_id": "study_034", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.of_coe", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : LindelofSpace \u2191s], IsLindelof s", "human_argument": "The assumption is that the subspace s, with the subspace topology, is a Lindel\u00f6f space. The equivalence between the predicate \"s is Lindel\u00f6f\" and the statement \"the subspace is a Lindel\u00f6f space\" identifies these two notions. Hence from the assumed Lindel\u00f6f property of the subspace we conclude that s is Lindel\u00f6f.", "lean_source": "lemma IsLindelof.of_coe [LindelofSpace s] : IsLindelof s := isLindelof_iff_lindelofSpace.mpr \u2039_\u203a"}, "right": {"name": "exists_isOpen_singleton_of_isOpen_finite", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T0Space X] {s : Set X},\n  Set.Finite s \u2192 Set.Nonempty s \u2192 IsOpen s \u2192 \u2203 x \u2208 s, IsOpen {x}", "human_argument": "Replace the finite set s by the corresponding finset and argue by strong induction on its size. If s has a nonempty proper subset t that is open, apply the induction hypothesis to t to obtain a point x\u2208t (hence x\u2208s) with {x} open. If no such proper nonempty open subset exists, then s is a minimal nonempty open set; in a T0 space any minimal nonempty open set is a singleton, so s = {x} and {x} is open. Thus in all cases there is x\u2208s with {x} open.", "lean_source": "theorem exists_isOpen_singleton_of_isOpen_finite [T0Space X] {s : Set X} (hfin : s.Finite)\n    (hne : s.Nonempty) (ho : IsOpen s) : \u2203 x \u2208 s, IsOpen ({x} : Set X) := by\n  lift s to Finset X using hfin\n  induction s using Finset.strongInductionOn\n  rename_i s ihs\n  rcases em (\u2203 t, t \u2282 s \u2227 t.Nonempty \u2227 IsOpen (t : Set X)) with (\u27e8t, hts, htne, hto\u27e9 | ht)\n  \u00b7 rcases ihs t hts htne hto with \u27e8x, hxt, hxo\u27e9\n    exact \u27e8x, hts.1 hxt, hxo\u27e9\n  \u00b7 -- Porting note: was `rcases minimal_nonempty_open_eq_singleton ho hne _ with \u27e8x, hx\u27e9`\n    --               https://github.com/leanprover-community/batteries/issues/116\n    rsuffices \u27e8x, hx\u27e9 : \u2203 x, (s : Set X) = {x}\n    \u00b7 exact \u27e8x, hx.symm \u25b8 rfl, hx \u25b8 ho\u27e9\n    refine minimal_nonempty_open_eq_singleton ho hne ?_\n    refine fun t hts htne hto => of_not_not fun hts' => ht ?_\n    lift t to Finset X using s.finite_toSet.subset hts\n    exact \u27e8t, ssubset_iff_subset_ne.2 \u27e8hts, mt Finset.coe_inj.2 hts'\u27e9, htne, h
