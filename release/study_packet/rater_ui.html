  exact generalized_tube_lemma hs ht isClosed_diagonal.isOpen_compl hst\n\n/-- In a `R1Space X`, for disjoint closed sets `s t` such that `closure s\u1d9c` is compact,\nthere are neighbourhoods that separate `s` and `t`. -/"}}, {"pair_id": "study_069", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isOpen_inter_eq_singleton_of_mem_discrete", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {s : Set X} [inst_1 : DiscreteTopology \u2191s] {x : X},\n  x \u2208 s \u2192 \u2203 U, IsOpen U \u2227 U \u2229 s = {x}", "human_argument": "Let s be discrete and x \u2208 s. By discreteness there is a set U with U \u2229 s = \u2205 and such that U \u222a {x} is a neighbourhood of x. Hence there exists an open set t with x \u2208 t \u2286 U \u222a {x}. Then t \u2229 s \u2286 (U \u222a {x}) \u2229 s = {x}, and because x \u2208 t \u2229 s we get t \u2229 s = {x}; thus t is the required open set.", "lean_source": "theorem isOpen_inter_eq_singleton_of_mem_discrete {s : Set X} (hs : IsDiscrete s) {x : X}\n    (hx : x \u2208 s) : \u2203 U : Set X, IsOpen U \u2227 U \u2229 s = {x} := by\n  obtain \u27e8U, hU_nhds, hU_inter\u27e9 := nhds_inter_eq_singleton_of_mem_discrete hs hx\n  obtain \u27e8t, ht_sub, ht_open, ht_x\u27e9 := mem_nhds_iff.mp hU_nhds\n  grind\n\n/-- For point `x` in a discrete subset `s` of a topological space, there is a set `U`\nsuch that\n1. `U` is a punctured neighborhood of `x` (i.e. `U \u222a {x}` is a neighbourhood of `x`),\n2. `U` is disjoint from `s`.\n-/"}, "right": {"name": "isClosedMap_fst_of_compactSpace", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : CompactSpace Y],\n  IsClosedMap Prod.fst", "human_argument": "Let C \u2286 X\u00d7Y be closed and fix x \u2208 X with x \u2209 \u03c0_X(C), so {x}\u00d7Y is disjoint from C. Since C is closed, its complement is an open set containing the compact slice {x}\u00d7Y; by the tube lemma there is a neighborhood U of x in X with U\u00d7Y contained in that complement. Hence U\u2229\u03c0_X(C)=\u2205, so every point outside \u03c0_X(C) has an open neighborhood missing \u03c0_X(C). Therefore the projection \u03c0_X(C) is closed, i.e. the first projection is a closed map.", "lean_source": "theorem isClosedMap_fst_of_compactSpace [CompactSpace Y] :\n    IsClosedMap (Prod.fst : X \u00d7 Y \u2192 X) :=\n  isProperMap_fst_of_compactSpace.isClosedMap\n\n/-- If `X` is a compact topological space, then `Prod.snd : X \u00d7 Y \u2192 Y` is a closed map. -/"}}, {"pair_id": "study_070", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isSigmaCompact_sUnion", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] (S : Set (Set X)),\n  Set.Countable S \u2192 (\u2200 (s : \u2191S), IsSigmaCompact \u2191s) \u2192 IsSigmaCompact (\u22c3\u2080 S)", "human_argument": "Since S is countable we may view it as a countable indexed family (i.e. pick a countable index set I with S = {s_i : i \u2208 I}). The union \u22c3\u2080S then equals the indexed union \u22c3_{i\u2208I} s_i, and by hypothesis each s_i is \u03c3-compact. Finally, a countable indexed union of \u03c3-compact sets is \u03c3-compact, hence \u22c3\u2080S is \u03c3-compact.", "lean_source": "lemma isSigmaCompact_sUnion (S : Set (Set X)) (hc : Set.Countable S)\n    (hcomp : \u2200 s : S, IsSigmaCompact s (X := X)) : IsSigmaCompact (\u22c3\u2080 S) := by\n  have : Countable S := countable_coe_iff.mpr hc\n  apply sUnion_eq_iUnion.symm \u25b8 isSigmaCompact_iUnion _ hcomp\n\n/-- Countable unions of \u03c3-compact sets are \u03c3-compact. -/"}, "right": {"name": "Metric.hasBasis_cobounded_compl_closedBall", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] (c : \u03b1),\n  Filter.HasBasis (Bornology.cobounded \u03b1) (fun x => True) fun r => (Metric.closedBall c r)\u1d9c", "human_argument": "Fix a point c. A set is cobounded precisely when its complement is bounded. In a pseudometric space a subset is bounded exactly when it is contained in some closed ball centered at c, so any cobounded set is the complement of some closed ball about c. Conversely, complements of closed balls are cobounded because closed balls are bounded. Hence the complements of the closed balls centered at c, as the radius varies, form a basis for the cobounded bornology.", "lean_source": "theorem hasBasis_cobounded_compl_closedBall (c : \u03b1) :\n    (cobounded \u03b1).HasBasis (fun _ \u21a6 True) (fun r \u21a6 (closedBall c r)\u1d9c) :=\n  \u27e8compl_surjective.forall.2 fun _ \u21a6 (isBounded_iff_subset_closedBall c).trans <| by simp\u27e9"}}, {"pair_id": "study_071", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "RegularSpace.of_hasBasis", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {\u03b9 : X \u2192 Sort u_3} {p : (a : X) \u2192 \u03b9 a \u2192 Prop} {s : (a : X) \u2192 \u03b9 a \u2192 Set X},\n  (\u2200 (a : X), Filter.HasBasis (nhds a) (p a) (s a)) \u2192 (\u2200 (a : X) (i : \u03b9 a), p a i \u2192 IsClosed (s a i)) \u2192 RegularSpace X", "human_argument": "The proof shows regularity from a basis criterion: around each point and open neighborhood, it chooses a basis element whose closure stays inside the neighborhood. That local closed-neighborhood refinement is exactly what regularity needs.", "lean_source": "theorem RegularSpace.of_hasBasis {\u03b9 : X \u2192 Sort*} {p : \u2200 a, \u03b9 a \u2192 Prop} {s : \u2200 a, \u03b9 a \u2192 Set X}\n    (h\u2081 : \u2200 a, (\ud835\udcdd a).HasBasis (p a) (s a)) (h\u2082 : \u2200 a i, p a i \u2192 IsClosed (s a i)) :\n    RegularSpace X :=\n  .of_lift'_closure fun a => (h\u2081 a).lift'_closure_eq_self (h\u2082 a)"}, "right": {"name": "connectedComponent_eq_iInter_isClopen", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] [inst_2 : CompactSpace X] (x : X),\n  connectedComponent x = \u22c2 s, \u2191s", "human_argument": "The proof identifies the connected component of a point as the intersection of all clopen sets containing it. One inclusion uses that connected components cannot cross a clopen separation; the other uses compact Hausdorff zero-dimensional separation machinery to cut away every point outside the component by a clopen set.", "lean_source": "theorem connectedComponent_eq_iInter_isClopen [T2Space X] [CompactSpace X] (x : X) :\n    connectedComponent x = \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, s := by\n  apply Subset.antisymm connectedComponent_subset_iInter_isClopen\n  -- Reduce to showing that the clopen intersection is connected.\n  refine IsPreconnected.subset_connectedComponent ?_ (mem_iInter.2 fun s => s.2.2)\n  -- We do this by showing that any disjoint cover by two closed sets implies\n  -- that one of these closed sets must contain our whole thing.\n  -- To reduce to the case where the cover is disjoint on all of `X` we need that `s` is closed\n  have hs : @IsClosed X _ (\u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, s) :=\n    isClosed_iInter fun s => s.2.1.1\n  rw [isPreconnected_iff_subset_of_fully_disjoint_closed hs]\n  intro a b ha hb hab ab_disj\n  -- Since our space is normal, we get two larger disjoint open sets containing the disjoint\n  -- closed sets. If we can show that our intersection is a subset of any of these we can then\n  -- \"descend\" this to show that it is a subset of either a or b.\n  rcases normal_separation ha hb ab_disj with \u27e8u, v, hu, hv, hau, hbv, huv\u27e9\n  obtain \u27e8s, H\u27e9 : \u2203 s : Set X, IsClopen s \u2227 x \u2208 s \u2227 s \u2286 u \u222a v := by\n    /- Now we find a clopen set `s` around `x`, contained in `u \u222a v`. We utilize the fact that\n    `X \\ u \u222a v` will be compact, so there must be some finite intersection of clopen neighbourhoods\n    of `X` disjoint to it, but a finite intersection of clopen sets is clopen,\n    so we let this be our `s`. -/\n    have H1 := (hu.union hv).isClosed_compl.isCompact.inter_iInter_nonempty\n      (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s) fun s => s.2.1.1\n    rw [\u2190 not_disjoint_iff_nonempty_inter, imp_not_comm, not_forall] at H1\n    obtain \u27e8si, H2\u27e9 :=\n      H1 (disjoint_compl_left_iff_subset.2 <| hab.trans <| union_subset_union hau hbv)\n    refine \u27e8\u22c2 U \u2208 si, Subtype.val U, ?_, ?_, ?_\u27e9\n    \u00b7 exact isClopen_biInter_finset fun s _ => s.2.1\n    \u00b7 exact mem_iInter\u2082.2 fun s _ => s.2.2\n    \u00b7 rwa [\u2190 disjoint_compl_left_iff_subset, disjoint_iff_inter_eq_empty,\n        \u2190 not_nonempty_iff_eq_empty]\n  -- So, we get a disjoint decomposition `s = s \u2229 u \u222a s \u2229 v` of clopen sets. The intersection of all\n  -- clopen neighbourhoods will then lie in whichever of u or v x lies in and hence will be a subset\n  -- of either a or b.\n  \u00b7 have H1 := isClopen_inter_of_disjoint_cover_clopen H.1 H.2.2 hu hv huv\n    rw [union_comm] at H\n    have H2 := isClopen_inter_of_disjoint_cover_clopen H.1 H.2.2 hv hu huv.symm\n    by_cases hxu : x \u2208 u <;> [left; right]\n    -- The x \u2208 u case.\n    \u00b7 suffices \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, \u2191s \u2286 u\n        from Disjoint.left_le_of_le_sup_right hab (huv.mono this hbv)\n      \u00b7 apply Subset.trans _ s.inter_subset_right\n        exact iInter_subset (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s.1)\n          \u27e8s \u2229 u, H1, mem_inter H.2.1 hxu\u27e9\n    -- If x \u2209 u, we get x \u2208 v since x \u2208 u \u222a v. The rest is then like the x \u2208 u case.\n    \u00b7 have h1 : x \u2208 v :=\n        (hab.trans (union_subset_union hau hbv) (mem_iInter.2 fun i => i.2.2)).resolve_left hxu\n      suffices \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, \u2191s \u2286 v\n        from (huv.symm.mono this hau).left_le_of_le_sup_left hab\n      \u00b7 refine Subset.trans ?_ s.inter_subset_right\n        exact iInter_subset (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s.1)\n          \u27e8s \u2229 v, H2, mem_inter H.2.1 h1\u27e9\n\n/-- `ConnectedComponents X` is Hausdorff when `X` is Hausdorff and compact -/\n@[stacks 0900 \"The Stacks entry proves profiniteness.\"]"}}, {"pair_id": "study_072", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.nonempty_iInter_of_directed_nonempty_isCompact_isClosed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {\u03b9 : Type v} [h\u03b9 : Nonempty \u03b9] (t : \u03b9 \u2192 Set X),\n  Directed (fun x x_1 => x \u2287 x_1) t \u2192\n    (\u2200 (i : \u03b9), Set.Nonempty (t i)) \u2192\n      (\u2200 (i : \u03b9), IsCompact (t i)) \u2192 (\u2200 (i : \u03b9), IsClosed (t i)) \u2192 Set.Nonempty (\u22c2 i, t i)", "human_argument": "Pick any index i0. Since \u22c2_i t_i \u2286 t_{i0}, it suffices to show t_{i0} \u2229 \u22c2_i t_i \u2260 \u2205. If this intersection were empty, then by compactness of t_{i0} and the fact that (t_i) is a directed family of closed sets, there would be some i with t_{i0} \u2229 t_i = \u2205. But directedness (with respect to \u2287) gives a j with t_j \u2286 t_{i0} \u2229 t_i, contradicting that each t_j is nonempty; hence \u22c2_i t_i is nonempty.", "lean_source": "theorem IsCompact.nonempty_iInter_of_directed_nonempty_isCompact_isClosed\n    {\u03b9 : Type v} [h\u03b9 : Nonempty \u03b9] (t : \u03b9 \u2192 Set X) (htd : Directed (\u00b7 \u2287 \u00b7) t)\n    (htn : \u2200 i, (t i).Nonempty) (htc : \u2200 i, IsCompact (t i)) (htcl : \u2200 i, IsClosed (t i)) :\n    (\u22c2 i, t i).Nonempty := by\n  let i\u2080 := h\u03b9.some\n  suffices (t i\u2080 \u2229 \u22c2 i, t i).Nonempty by\n    rwa [inter_eq_right.mpr (iInter_subset _ i\u2080)] at this\n  simp only [nonempty_iff_ne_empty] at htn \u22a2\n  apply mt ((htc i\u2080).elim_directed_family_closed t htcl)\n  push Not\n  simp only [\u2190 nonempty_iff_ne_empty] at htn \u22a2\n  refine \u27e8htd, fun i => ?_\u27e9\n  rcases htd i\u2080 i with \u27e8j, hji\u2080, hji\u27e9\n  exact (htn j).mono (subset_inter hji\u2080 hji)\n\n/-- Cantor's intersection theorem for `sInter`:\nthe intersection of a directed family of nonempty compact closed sets is nonempty. -/"}, "right": {"name": "isSigmaCompact_univ_iff", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X], IsSigmaCompact Set.univ \u2194 SigmaCompactSpace X", "human_argument": "The statement is just the unpacking of the definition: a space X is declared \u03c3-compact exactly when its whole underlying set is \u03c3-compact. Hence if the whole space is \u03c3-compact then X is \u03c3-compact, and conversely a \u03c3-compact space comes equipped with the witness that the whole set is \u03c3-compact, so the universal set is \u03c3-compact. Thus the two assertions are equivalent.", "lean_source": "lemma isSigmaCompact_univ_iff : IsSigmaCompact (univ : Set X) \u2194 SigmaCompactSpace X :=\n  \u27e8fun h => \u27e8h\u27e9, fun h => h.1\u27e9\n\n/-- In a \u03c3-compact space, `univ` is \u03c3-compact. -/"}}, {"pair_id": "study_073", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_range", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : LindelofSpace X]\n  {f : X \u2192 Y}, Continuous f \u2192 IsLindelof (Set.range f)", "human_argument": "Write range f as f[univ]. Given any open cover {U_i} of range f, the preimages {f^{-1}(U_i)} are open in X and cover X because f(X) \u2286 \u22c3_i U_i. By Lindel\u00f6fness of X there is a countable subfamily f^{-1}(U_n) covering X, and the corresponding countable subfamily U_n then covers range f. Therefore range f is Lindel\u00f6f.", "lean_source": "theorem isLindelof_range [LindelofSpace X] {f : X \u2192 Y} (hf : Continuous f) :\n    IsLindelof (range f) := by rw [\u2190 image_univ]; exact isLindelof_univ.image hf"}, "right": {"name": "isLindelof_iff_countable_subfamily_closed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsLindelof s \u2194\n    \u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X),\n      (\u2200 (i : \u03b9), IsClosed (t i)) \u2192 s \u2229 \u22c2 i, t i = \u2205 \u2192 \u2203 u, Set.Countable u \u2227 s \u2229 \u22c2 i \u2208 u, t i = \u2205", "human_argument": "If s is Lindel\u00f6f and (t_i) is a family of closed sets with s \u2229 \u22c2_i t_i = \u2205, then the complements u_i := X \\ t_i are an open cover of s, so by Lindel\u00f6f there is a countable subcover u_i for i in some countable J; taking complements back yields s \u2229 \u22c2_{i\u2208J} t_i = \u2205. Conversely, if every family of closed sets whose intersection misses s has a countable subfamily with the same property, then for any open cover (u_i) of s the closed complements t_i := X \\ u_i satisfy s \u2229 \u22c2_i t_i = \u2205, so some countable subcollection of the u_i already covers s. This establishes the equivalence.", "lean_source": "theorem isLindelof_iff_countable_subfamily_closed :\n    IsLindelof s \u2194 \u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X),\n    (\u2200 i, IsClosed (t i)) \u2192 (s \u2229 \u22c2 i, t i) = \u2205\n    \u2192 \u2203 u : Set \u03b9, u.Countable \u2227 (s \u2229 \u22c2 i \u2208 u, t i) = \u2205 :=\n  \u27e8fun hs \u21a6 hs.elim_countable_subfamily_closed, isLindelof_of_countable_subfamily_closed\u27e9\n\n/-- The empty set is a Lindelof set. -/\n@[simp]"}}, {"pair_id": "study_074", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.ultrafilter_le_nhds'", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 (f : Ultrafilter X), s \u2208 f \u2192 \u2203 x \u2208 s, \u2191f \u2264 nhds x", "human_argument": "This is the usual ultrafilter characterization of compactness: s is compact exactly when every ultrafilter f that contains s converges to some point of s. One checks that \"f converges to x\" is exactly the statement that the ultrafilter (viewed as a filter) is finer than the neighborhood filter at x, and the hypothesis s \u2208 f is just the plain membership of s in the ultrafilter. Thus the equivalence is obtained by unpacking these definitions and rewriting the convergence/membership conditions, yielding the stated iff.", "lean_source": "theorem isCompact_iff_ultrafilter_le_nhds' :\n    IsCompact s \u2194 \u2200 f : Ultrafilter X, s \u2208 f \u2192 \u2203 x \u2208 s, \u2191f \u2264 \ud835\udcdd x := by\n  simp only [isCompact_iff_ultrafilter_le_nhds, le_principal_iff, Ultrafilter.mem_coe]"}, "right": {"name": "Dilation.tendsto_cobounded", "statement": "\u2200 {\u03b1 : Type u_1} {\u03b2 : Type u_2} {F : Type u_4} [inst : PseudoMetricSpace \u03b1] [inst_1 : PseudoMetricSpace \u03b2]\n  [inst_2 : DilationClass F \u03b1 \u03b2] (f : F), Filter.Tendsto (\u21d1f) (Bornology.cobounded \u03b1) (Bornology.cobounded \u03b2)", "human_argument": "By assumption f is a dilation, hence it is antilipschitz: there is a positive constant C with C\u00b7dist(x,y) \u2264 dist(f x,f y) for all x,y. This inequality prevents an unbounded set in \u03b1 from being mapped into a bounded set in \u03b2, equivalently it implies that preimages of bounded sets are bounded, so f sends complements of bounded sets to complements of bounded sets. Therefore f maps the cobounded filter on \u03b1 to the cobounded filter on \u03b2, i.e. Tendsto f (cobounded \u03b1) (cobounded \u03b2).", "lean_source": "lemma tendsto_cobounded : Filter.Tendsto f (cobounded \u03b1) (cobounded \u03b2) :=\n  (Dilation.antilipschitz f).tendsto_cobounded\n\n@[simp]"}}, {"pair_id": "study_075", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [h : LindelofSpace X], IsLindelof Set.univ", "human_argument": "The proof simply invokes the defining Lindelof-space witness for the whole space. There is no real construction: the theorem packages the class assumption into the statement that the universal set is Lindelof.", "lean_source": "theorem isLindelof_univ [h : LindelofSpace X] : IsLindelof (univ : Set X) :=\n  h.isLindelof_univ"}, "right": {"name": "IsLindelof.image_of_continuousOn", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 ContinuousOn f s \u2192 IsLindelof (f '' s)", "human_argument": "The proof starts with a Lindelof set in the domain and a map that is continuous on that set. It pulls an open cover of the image back along the map, uses the Lindelof hypothesis to choose a countable subcover in the domain, and then pushes that countable subcover forward to cover the image.", "lean_source": "theorem IsLindelof.image_of_continuousOn {f : X \u2192 Y} (hs : IsLindelof s) (hf : ContinuousOn f s) :\n    IsLindelof (f '' s) := by\n  intro l lne _ ls\n  have : NeBot (l.comap f \u2293 \ud835\udcdf s) :=\n    comap_inf_principal_neBot_of_image_mem lne (le_principal_iff.1 ls)\n  obtain \u27e8x, hxs, hx\u27e9 : \u2203 x \u2208 s, ClusterPt x (l.comap f \u2293 \ud835\udcdf s) := @hs _ this _ inf_le_right\n  haveI := hx.neBot\n  use f x, mem_image_of_mem f hxs\n  have : Tendsto f (\ud835\udcdd x \u2293 (comap f l \u2293 \ud835\udcdf s)) (\ud835\udcdd (f x) \u2293 l) := by\n    convert! (hf x hxs).inf (@tendsto_comap _ _ f l) using 1\n    rw [nhdsWithin]\n    ac_rfl\n  exact this.neBot\n\n/-- A continuous image of a Lindel\u00f6f set is a Lindel\u00f6f set within the codomain. -/"}}, {"pair_id": "study_076", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Infinite.exists_accPt_cofinite_inf_principal_of_subset_isCompact", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s K : Set X},\n  Set.Infinite s \u2192 IsCompact K \u2192 s \u2286 K \u2192 \u2203 x \u2208 K, AccPt x (Filter.cofinite \u2293 Filter.principal s)", "human_argument": "The proof turns an infinite subset of a compact set into a cofinite filter on that subset. It then uses compactness to extract a cluster point and checks that the filter really sees infinitely many points from the subset, giving an accumulation point.", "lean_source": "lemma Set.Infinite.exists_accPt_cofinite_inf_principal_of_subset_isCompact\n    {K : Set X} (hs : s.Infinite) (hK : IsCompact K) (hsub : s \u2286 K) :\n    \u2203 x \u2208 K, AccPt x (cofinite \u2293 \ud835\udcdf s) :=\n  (@hK _ hs.cofinite_inf_principal_neBot (inf_le_right.trans <| principal_mono.2 hsub)).imp\n    fun x hx \u21a6 by rwa [accPt_iff_clusterPt, inf_comm, inf_right_comm,\n      (finite_singleton _).cofinite_inf_principal_compl]"}, "right": {"name": "IsCompact.exists_clusterPt", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {f : Filter X} [inst_1 : Filter.NeBot f], f \u2264 Filter.principal s \u2192 \u2203 x \u2208 s, ClusterPt x f", "human_argument": "The proof applies compactness to a filter that is forced to live inside the compact set. Compactness gives a cluster point, and the principal-set bound shows that the cluster point lies in the original set.", "lean_source": "lemma IsCompact.exists_clusterPt (hs : IsCompact s) {f : Filter X} [NeBot f] (hf : f \u2264 \ud835\udcdf s) :\n    \u2203 x \u2208 s, ClusterPt x f := hs hf"}}, {"pair_id": "study_077", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.ne_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : NonLindelofSpace X], IsLindelof s \u2192 s \u2260 Set.univ", "human_argument": "Let X be a non\u2011Lindel\u00f6f topological space and s \u2286 X a Lindel\u00f6f subset. If s = X, then the whole space X would be Lindel\u00f6f, contradicting the hypothesis that X is non\u2011Lindel\u00f6f. Hence s \u2260 X.", "lean_source": "theorem IsLindelof.ne_univ [NonLindelofSpace X] (hs : IsLindelof s) : s \u2260 univ := fun h \u21a6\n  nonLindelof_univ X (h \u25b8 hs)"}, "right": {"name": "exists_compact_closed_between", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : LocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K U : Set X},\n  IsCompact K \u2192 IsOpen U \u2192 K \u2286 U \u2192 \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U", "human_argument": "The proof uses local compactness to thicken each point of a compact set inside the given open set by a compact neighborhood. A finite compact subcover is chosen, then combined and closed so that it still sits inside the open set while the original compact set lies in its interior.", "lean_source": "theorem exists_compact_closed_between [LocallyCompactSpace X] [RegularSpace X]\n    {K U : Set X} (hK : IsCompact K) (hU : IsOpen U) (h_KU : K \u2286 U) :\n    \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U :=\n  let \u27e8L, L_comp, KL, LU\u27e9 := exists_compact_between hK hU h_KU\n  \u27e8closure L, L_comp.closure, isClosed_closure, KL.trans <| interior_mono subset_closure,\n    L_comp.closure_subset_of_isOpen hU LU\u27e9\n\n/-- In a (possibly non-Hausdorff) locally compact regular space, for every compact set `K`,\n`\ud835\udcdd\u02e2 K` has a basis consisting of closed compact sets. -/"}}, {"pair_id": "study_078", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Filter.comap_coLindelof_le", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Continuous f \u2192 Filter.comap f (Filter.coLindelof Y) \u2264 Filter.coLindelof X", "human_argument": "Use the basis of the co-Lindelof filter by complements of Lindelof subsets. To prove the filter inequality, take a Lindelof subset t of the domain. Its image under the continuous map is Lindelof in the codomain. Since every point of t maps into that image, the complement of the inverse image of this image is contained in the complement of t. This gives the required comparison of basic neighborhoods, and therefore the comap of the co-Lindelof filter on the codomain is below the co-Lindelof filter on the domain.", "lean_source": "theorem Filter.comap_coLindelof_le {f : X \u2192 Y} (hf : Continuous f) :\n    (Filter.coLindelof Y).comap f \u2264 Filter.coLindelof X := by\n  rw [(hasBasis_coLindelof.comap f).le_basis_iff hasBasis_coLindelof]\n  intro t ht\n  refine \u27e8f '' t, ht.image hf, ?_\u27e9\n  simpa using t.subset_preimage_image f"}, "right": {"name": "Inducing.r0Space", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : R0Space X] [inst_2 : TopologicalSpace Y]\n  {f : Y \u2192 X}, Inducing f \u2192 R0Space Y", "human_argument": "Let f : Y \u2192 X be inducing and suppose X is R0. If a specializes to b in Y, then by the inducing property f(a) specializes to f(b) in X; since X is R0 the specialization relation there is symmetric, so f(b) specializes to f(a). Applying the inducing equivalence again yields that b specializes to a in Y, so specialization on Y is symmetric and Y is R0.", "lean_source": "theorem Topology.IsInducing.r0Space [TopologicalSpace Y] {f : Y \u2192 X} (hf : IsInducing f) :\n    R0Space Y where\n  specializes_symm.symm a b := by\n    simpa only [\u2190 hf.specializes_iff] using Specializes.symm"}}, {"pair_id": "study_079", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "nonLindelofSpace_of_neBot", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X], Filter.NeBot (Filter.coLindelof X) \u2192 NonLindelofSpace X", "human_argument": "Assume the co-Lindelof filter is nontrivial and, toward a contradiction, that X is Lindel\u00f6f. By definition of the co-Lindelof filter, if X is Lindel\u00f6f then the complement of the whole space \u2014 i.e. the empty set \u2014 belongs to that filter. But no nontrivial filter can contain the empty set, so this contradicts the assumed nontriviality. Hence X is not Lindel\u00f6f.", "lean_source": "theorem nonLindelofSpace_of_neBot (_ : NeBot (Filter.coLindelof X)) : NonLindelofSpace X :=\n  \u27e8fun h' => (Filter.nonempty_of_mem h'.compl_mem_coLindelof).ne_empty compl_univ\u27e9"}, "right": {"name": "r0Space_iff", "statement": "\u2200 (X : Type u) [inst : TopologicalSpace X], R0Space X \u2194 Symmetric Specializes", "human_argument": "The proof unfolds the R0 separation condition into the specialization relation. It shows that topologically indistinguishable points have the expected closure behavior, and conversely that the closure behavior recovers the R0 condition.", "lean_source": "@[mk_iff]"}}, {"pair_id": "study_080", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "SeparatedNhds.of_finset_finset", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] (s t : Finset X), Disjoint s t \u2192 SeparatedNhds \u2191s \u2191t", "human_argument": "View s and t as subsets of X; since they are finite they are compact. In a Hausdorff space any two disjoint compact sets can be separated by disjoint open neighborhoods. Applying that fact to the compact sets s and t (using their disjointness) yields open sets U,V with s \u2286 U, t \u2286 V and U \u2229 V = \u2205. Hence s and t admit separated neighborhoods.", "lean_source": "theorem SeparatedNhds.of_finset_finset [T2Space X] (s t : Finset X) (h : Disjoint s t) :\n    SeparatedNhds (s : Set X) t :=\n  .of_isCompact_isCompact s.finite_toSet.isCompact t.finite_toSet.isCompact <| mod_cast h"}, "right": {"name": "dense_iInter_of_isOpen_nat", "statement": "\u2200 {\u03b1 : Type u_1} [inst : TopologicalSpace \u03b1] [inst_1 : BaireSpace \u03b1] {f : \u2115 \u2192 Set \u03b1},\n  (\u2200 (n : \u2115), IsOpen (f n)) \u2192 (\u2200 (n : \u2115), Dense (f n)) \u2192 Dense (\u22c2 n, f n)", "human_argument": "Let X be a Baire space and let (f_n) be a sequence of open dense subsets. By the Baire property of X, a countable intersection of open dense sets is dense, so \u22c2_n f_n is dense in X. Equivalently, for every nonempty open U we have U \u2229 \u22c2_n f_n \u2260 \u2205, hence the closure of \u22c2_n f_n is all of X.", "lean_source": "theorem dense_iInter_of_isOpen_nat {f : \u2115 \u2192 Set X} (ho : \u2200 n, IsOpen (f n))\n    (hd : \u2200 n, Dense (f n)) : Dense (\u22c2 n, f n) :=\n  BaireSpace.baire_property f ho hd\n\n/-- A dense G\u03b4 subset of a Baire space is Baire. -/"}}, {"pair_id": "study_081", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsSigmaCompact.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsSigmaCompact s \u2192 IsLindelof s", "human_argument": "Write s as a countable union s = \u22c3_{n} K_n of compact sets. Each compact K_n is Lindel\u00f6f. Since a countable union of Lindel\u00f6f subspaces is Lindel\u00f6f, s is Lindel\u00f6f.", "lean_source": "theorem IsSigmaCompact.isLindelof (hs : IsSigmaCompact s) :\n    IsLindelof s := by\n  rw [IsSigmaCompact] at hs\n  rcases hs with \u27e8K, \u27e8hc, huniv\u27e9\u27e9\n  rw [\u2190 huniv]\n  have hl : \u2200 n, IsLindelof (K n) := fun n \u21a6 IsCompact.isLindelof (hc n)\n  exact isLindelof_iUnion hl\n\n/-- A compact space `X` is Lindel\u00f6f. -/"}, "right": {"name": "exists_isOpen_superset_and_isCompact_closure", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] [inst_2 : WeaklyLocallyCompactSpace X] {K : Set X},\n  IsCompact K \u2192 \u2203 V, IsOpen V \u2227 K \u2286 V \u2227 IsCompact (closure V)", "human_argument": "By weak local compactness (together with the R\u2081 hypothesis) there is a compact set K' with K \u2286 interior(K'). Take V := interior(K'). Then V is open and contains K. Since closure(V) \u2286 K' and K' is compact, closure(V) is compact.", "lean_source": "theorem exists_isOpen_superset_and_isCompact_closure {K : Set X} (hK : IsCompact K) :\n    \u2203 V, IsOpen V \u2227 K \u2286 V \u2227 IsCompact (closure V) := by\n  rcases exists_compact_superset hK with \u27e8K', hK', hKK'\u27e9\n  exact \u27e8interior K', isOpen_interior, hKK', hK'.closure_of_subset interior_subset\u27e9\n\n/-- In a weakly locally compact R\u2081 space,\nevery point has an open neighborhood with compact closure. -/"}}, {"pair_id": "study_082", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.ne_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : NonLindelofSpace X], IsLindelof s \u2192 s \u2260 Set.univ", "human_argument": "Let X be a non\u2011Lindel\u00f6f topological space and s \u2286 X a Lindel\u00f6f subset. If s = X, then the whole space X would be Lindel\u00f6f, contradicting the hypothesis that X is non\u2011Lindel\u00f6f. Hence s \u2260 X.", "lean_source": "theorem IsLindelof.ne_univ [NonLindelofSpace X] (hs : IsLindelof s) : s \u2260 univ := fun h \u21a6\n  nonLindelof_univ X (h \u25b8 hs)"}, "right": {"name": "SigmaCompactSpace_iff_exists_compact_covering", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X],\n  SigmaCompactSpace X \u2194 \u2203 K, (\u2200 (n : \u2115), IsCompact (K n)) \u2227 \u22c3 n, K n = Set.univ", "human_argument": "By definition, X is \u03c3-compact exactly when the whole space is a \u03c3-compact set. Unwinding the definition of \"is \u03c3-compact\" for a set A, it means there exists a sequence K : \u2115 \u2192 Set X of compact subsets whose union equals A. Applying this to A = X (or A = univ) yields the desired equivalence: X is \u03c3-compact iff there exists K with each K n compact and \u22c3\u2099 K n = univ.", "lean_source": "lemma SigmaCompactSpace_iff_exists_compact_covering :\n    SigmaCompactSpace X \u2194 \u2203 K : \u2115 \u2192 Set X, (\u2200 n, IsCompact (K n)) \u2227 \u22c3 n, K n = univ := by\n  rw [\u2190 isSigmaCompact_univ_iff, IsSigmaCompact]"}}, {"pair_id": "study_083", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.inter_iInter_nonempty", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} {\u03b9 : Type v},\n  IsLindelof s \u2192\n    \u2200 (t : \u03b9 \u2192 Set X),\n      (\u2200 (i : \u03b9), IsClosed (t i)) \u2192\n        (\u2200 (u : Set \u03b9), Set.Countable u \u2227 Set.Nonempty (s \u2229 \u22c2 i \u2208 u, t i)) \u2192 Set.Nonempty (s \u2229 \u22c2 i, t i)", "human_argument": "Assume for contradiction that s \u2229 \u22c2_{i} t_i = \u2205. Then the complements X \\ t_i form an open cover of s (each t_i is closed), so by the Lindel\u00f6f property there is a countable subfamily indexed by some countable set u with s \u2286 \u22c3_{i\u2208u} (X \\ t_i). Equivalently s \u2229 \u22c2_{i\u2208u} t_i = \u2205, contradicting the hypothesis that every countable u yields s \u2229 \u22c2_{i\u2208u} t_i nonempty. Hence s \u2229 \u22c2_{i} t_i is nonempty.", "lean_source": "theorem IsLindelof.inter_iInter_nonempty {\u03b9 : Type v} (hs : IsLindelof s) (t : \u03b9 \u2192 Set X)\n    (htc : \u2200 i, IsClosed (t i)) (hst : \u2200 u : Set \u03b9, u.Countable \u2227 (s \u2229 \u22c2 i \u2208 u, t i).Nonempty) :\n    (s \u2229 \u22c2 i, t i).Nonempty := by\n  contrapose! hst\n  rcases hs.elim_countable_subfamily_closed t htc hst with \u27e8u, \u27e8_, husub\u27e9\u27e9\n  exact \u27e8u, fun _ \u21a6 husub\u27e9\n\n/-- For every open cover of a Lindel\u00f6f set, there exists a countable subcover. -/"}, "right": {"name": "RegularSpace.of_exists_mem_nhds_isClosed_subset", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X],\n  (\u2200 (x : X), \u2200 s \u2208 nhds x, \u2203 t \u2208 nhds x, IsClosed t \u2227 t \u2286 s) \u2192 RegularSpace X", "human_argument": "One standard characterization of regularity is: X is regular precisely when for every point x and every neighborhood U of x there exists a closed neighborhood C of x with C \u2286 U (equivalently there is an open V with x \u2208 V and closure(V) \u2286 U). The hypothesis asserts exactly the existence of such closed neighborhoods for every x and every neighborhood s. Hence X satisfies that characterization and is regular.", "lean_source": "theorem RegularSpace.of_exists_mem_nhds_isClosed_subset\n    (h : \u2200 (x : X), \u2200 s \u2208 \ud835\udcdd x, \u2203 t \u2208 \ud835\udcdd x, IsClosed t \u2227 t \u2286 s) : RegularSpace X :=\n  Iff.mpr ((regularSpace_TFAE X).out 0 3) h\n\n/-- A weakly locally compact R\u2081 space is regular. -/"}}, {"pair_id": "study_084", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsCompact s \u2192 IsLindelof s", "human_argument": "The proof turns an arbitrary open cover of a compact set into a finite subcover. Since every finite subcover is countable, compactness immediately implies the Lindelof property.", "lean_source": "theorem IsCompact.isLindelof (hs : IsCompact s) :\n    IsLindelof s := by tauto\n\n/-- A \u03c3-compact set `s` is Lindel\u00f6f -/"}, "right": {"name": "isSigmaCompact_iUnion", "statement": "\u2200 {X : Type u_1} {\u03b9 : Type u_3} [inst : TopologicalSpace X] [inst_1 : Countable \u03b9] (s : \u03b9 \u2192 Set X),\n  (\u2200 (i : \u03b9), IsSigmaCompact (s i)) \u2192 IsSigmaCompact (\u22c3 i, s i)", "human_argument": "The proof handles a countable union of sigma-compact sets. For each member it chooses a countable compact cover, then flattens the two layers of countability into one countable family of compact sets covering the whole union.", "lean_source": "lemma isSigmaCompact_iUnion [Countable \u03b9] (s : \u03b9 \u2192 Set X)\n    (hcomp : \u2200 i, IsSigmaCompact (s i)) : IsSigmaCompact (\u22c3 i, s i) := by\n  -- Choose a decomposition s_i = \u22c3 K_i,j for each i.\n  choose K hcomp hcov using fun i \u21a6 hcomp i\n  -- Then, we have a countable union of countable unions of compact sets, i.e. countably many.\n  have := calc\n    \u22c3 i, s i\n    _ = \u22c3 i, \u22c3 n, (K i n) := by simp_rw [hcov]\n    _ = \u22c3 (i) (n : \u2115), (K.uncurry \u27e8i, n\u27e9) := by rw [Function.uncurry_def]\n    _ = \u22c3 x, K.uncurry x := by rw [\u2190 iUnion_prod']\n  rw [this]\n  exact isSigmaCompact_iUnion_of_isCompact K.uncurry fun x \u21a6 (hcomp x.1 x.2)\n\n/-- Countable unions of \u03c3-compact sets are \u03c3-compact. -/"}}, {"pair_id": "study_085", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.closure", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : WeaklyLocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K : Set X}, IsCompact K \u2192 IsCompact (closure K)", "human_argument": "The proof uses the Hausdorff separation fact that compact sets are closed, or equivalently that the closure of a compact set does not add new noncompact behavior. Once the closure is controlled by the compact set, compactness transfers to the closure.", "lean_source": "protected theorem IsCompact.closure {K : Set X} (hK : IsCompact K) : IsCompact (closure K) := by\n  refine isCompact_of_finite_subcover fun U hUo hKU \u21a6 ?_\n  rcases hK.elim_finite_subcover U hUo (subset_closure.trans hKU) with \u27e8t, ht\u27e9\n  exact \u27e8t, hK.closure_subset_of_isOpen (isOpen_biUnion fun _ _ \u21a6 hUo _) ht\u27e9"}, "right": {"name": "IsClosed.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : LindelofSpace X], IsClosed s \u2192 IsLindelof s", "human_argument": "The proof extends an open cover of a closed subset to a cover of the ambient Lindelof set by adding the open complement. After taking a countable subcover, it removes the complement piece and obtains a countable cover of the closed subset.", "lean_source": "theorem IsClosed.isLindelof [LindelofSpace X] (h : IsClosed s) : IsLindelof s :=\n  isLindelof_univ.of_isClosed_subset h (subset_univ _)\n\n/-- A compact set `s` is Lindel\u00f6f. -/"}}, {"pair_id": "study_086", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "connectedComponent_eq_iInter_isClopen", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] [inst_2 : CompactSpace X] (x : X),\n  connectedComponent x = \u22c2 s, \u2191s", "human_argument": "The proof identifies the connected component of a point as the intersection of all clopen sets containing it. One inclusion uses that connected components cannot cross a clopen separation; the other uses compact Hausdorff zero-dimensional separation machinery to cut away every point outside the component by a clopen set.", "lean_source": "theorem connectedComponent_eq_iInter_isClopen [T2Space X] [CompactSpace X] (x : X) :\n    connectedComponent x = \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, s := by\n  apply Subset.antisymm connectedComponent_subset_iInter_isClopen\n  -- Reduce to showing that the clopen intersection is connected.\n  refine IsPreconnected.subset_connectedComponent ?_ (mem_iInter.2 fun s => s.2.2)\n  -- We do this by showing that any disjoint cover by two closed sets implies\n  -- that one of these closed sets must contain our whole thing.\n  -- To reduce to the case where the cover is disjoint on all of `X` we need that `s` is closed\n  have hs : @IsClosed X _ (\u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, s) :=\n    isClosed_iInter fun s => s.2.1.1\n  rw [isPreconnected_iff_subset_of_fully_disjoint_closed hs]\n  intro a b ha hb hab ab_disj\n  -- Since our space is normal, we get two larger disjoint open sets containing the disjoint\n  -- closed sets. If we can show that our intersection is a subset of any of these we can then\n  -- \"descend\" this to show that it is a subset of either a or b.\n  rcases normal_separation ha hb ab_disj with \u27e8u, v, hu, hv, hau, hbv, huv\u27e9\n  obtain \u27e8s, H\u27e9 : \u2203 s : Set X, IsClopen s \u2227 x \u2208 s \u2227 s \u2286 u \u222a v := by\n    /- Now we find a clopen set `s` around `x`, contained in `u \u222a v`. We utilize the fact that\n    `X \\ u \u222a v` will be compact, so there must be some finite intersection of clopen neighbourhoods\n    of `X` disjoint to it, but a finite intersection of clopen sets is clopen,\n    so we let this be our `s`. -/\n    have H1 := (hu.union hv).isClosed_compl.isCompact.inter_iInter_nonempty\n      (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s) fun s => s.2.1.1\n    rw [\u2190 not_disjoint_iff_nonempty_inter, imp_not_comm, not_forall] at H1\n    obtain \u27e8si, H2\u27e9 :=\n      H1 (disjoint_compl_left_iff_subset.2 <| hab.trans <| union_subset_union hau hbv)\n    refine \u27e8\u22c2 U \u2208 si, Subtype.val U, ?_, ?_, ?_\u27e9\n    \u00b7 exact isClopen_biInter_finset fun s _ => s.2.1\n    \u00b7 exact mem_iInter\u2082.2 fun s _ => s.2.2\n    \u00b7 rwa [\u2190 disjoint_compl_left_iff_subset, disjoint_iff_inter_eq_empty,\n        \u2190 not_nonempty_iff_eq_empty]\n  -- So, we get a disjoint decomposition `s = s \u2229 u \u222a s \u2229 v` of clopen sets. The intersection of all\n  -- clopen neighbourhoods will then lie in whichever of u or v x lies in and hence will be a subset\n  -- of either a or b.\n  \u00b7 have H1 := isClopen_inter_of_disjoint_cover_clopen H.1 H.2.2 hu hv huv\n    rw [union_comm] at H\n    have H2 := isClopen_inter_of_disjoint_cover_clopen H.1 H.2.2 hv hu huv.symm\n    by_cases hxu : x \u2208 u <;> [left; right]\n    -- The x \u2208 u case.\n    \u00b7 suffices \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, \u2191s \u2286 u\n        from Disjoint.left_le_of_le_sup_right hab (huv.mono this hbv)\n      \u00b7 apply Subset.trans _ s.inter_subset_right\n        exact iInter_subset (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s.1)\n          \u27e8s \u2229 u, H1, mem_inter H.2.1 hxu\u27e9\n    -- If x \u2209 u, we get x \u2208 v since x \u2208 u \u222a v. The rest is then like the x \u2208 u case.\n    \u00b7 have h1 : x \u2208 v :=\n        (hab.trans (union_subset_union hau hbv) (mem_iInter.2 fun i => i.2.2)).resolve_left hxu\n      suffices \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, \u2191s \u2286 v\n        from (huv.symm.mono this hau).left_le_of_le_sup_left hab\n      \u00b7 refine Subset.trans ?_ s.inter_subset_right\n        exact iInter_subset (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s.1)\n          \u27e8s \u2229 v, H2, mem_inter H.2.1 h1\u27e9\n\n/-- `ConnectedComponents X` is Hausdorff when `X` is Hausdorff and compact -/\n@[stacks 0900 \"The Stacks entry proves profiniteness.\"]"}, "right": {"name": "RegularSpace.of_hasBasis", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {\u03b9 : X \u2192 Sort u_3} {p : (a : X) \u2192 \u03b9 a \u2192 Prop} {s : (a : X) \u2192 \u03b9 a \u2192 Set X},\n  (\u2200 (a : X), Filter.HasBasis (nhds a) (p a) (s a)) \u2192 (\u2200 (a : X) (i : \u03b9 a), p a i \u2192 IsClosed (s a i)) \u2192 RegularSpace X", "human_argument": "The proof shows regularity from a basis criterion: around each point and open neighborhood, it chooses a basis element whose closure stays inside the neighborhood. That local closed-neighborhood refinement is exactly what regularity needs.", "lean_source": "theorem RegularSpace.of_hasBasis {\u03b9 : X \u2192 Sort*} {p : \u2200 a, \u03b9 a \u2192 Prop} {s : \u2200 a, \u03b9 a \u2192 Set X}\n    (h\u2081 : \u2200 a, (\ud835\udcdd a).HasBasis (p a) (s a)) (h\u2082 : \u2200 a i, p a i \u2192 IsClosed (s a i)) :\n    RegularSpace X :=\n  .of_lift'_closure fun a => (h\u2081 a).lift'_closure_eq_self (h\u2082 a)"}}, {"pair_id": "study_087", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "hasBasis_coLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X], Filter.HasBasis (Filter.coLindelof X) IsLindelof compl", "human_argument": "Take as candidate basis the collection of complements of Lindel\u00f6f subsets of X. If A and B are Lindel\u00f6f then A \u222a B is Lindel\u00f6f, and the complement of A \u222a B is contained in both the complement of A and the complement of B, so intersections of two basis elements contain another basis element. The empty set is Lindel\u00f6f, so its complement is the whole space and hence the basis contains a top element. Thus these complements satisfy the axioms of a filter basis and so form a basis for the co-Lindelof filter.", "lean_source": "theorem hasBasis_coLindelof : (coLindelof X).HasBasis IsLindelof compl :=\n  hasBasis_biInf_principal'\n    (fun s hs t ht =>\n      \u27e8s \u222a t, hs.union ht, compl_subset_compl.2 subset_union_left,\n        compl_subset_compl.2 subset_union_right\u27e9)\n    \u27e8\u2205, isLindelof_empty\u27e9"}, "right": {"name": "IsHereditarilyLindelof.isLindelof_subset", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsHereditarilyLindelof s \u2192 t \u2286 s \u2192 IsLindelof t", "human_argument": "If s is hereditarily Lindel\u00f6f then by definition every subset of s is Lindel\u00f6f. Since t \u2286 s, t is one of those subsets. Hence t is Lindel\u00f6f.", "lean_source": "lemma IsHereditarilyLindelof.isLindelof_subset (hs : IsHereditarilyLindelof s) (ht : t \u2286 s) :\n    IsLindelof t := hs t ht"}}, {"pair_id": "study_088", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Finite.isLindelof_biUnion", "statement": "\u2200 {X : Type u} {\u03b9 : Type u_1} [inst : TopologicalSpace X] {s : Set \u03b9} {f : \u03b9 \u2192 Set X},\n  Set.Finite s \u2192 (\u2200 i \u2208 s, IsLindelof (f i)) \u2192 IsLindelof (\u22c3 i \u2208 s, f i)", "human_argument": "If s is finite then it is in particular countable, so the statement follows from the lemma that a countable union of Lindel\u00f6f subspaces is Lindel\u00f6f. Concretely, given an open cover of \u22c3_{i\u2208s} f i, for each i\u2208s choose a countable subcover of f i; the union of finitely many countable sets is countable, hence these choices yield a countable subcover of the whole union. Therefore \u22c3_{i\u2208s} f i is Lindel\u00f6f.", "lean_source": "theorem Set.Finite.isLindelof_biUnion {s : Set \u03b9} {f : \u03b9 \u2192 Set X} (hs : s.Finite)\n    (hf : \u2200 i \u2208 s, IsLindelof (f i)) : IsLindelof (\u22c3 i \u2208 s, f i) :=\n  Set.Countable.isLindelof_biUnion (countable hs) hf"}, "right": {"name": "Inducing.isCompact_preimage'", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Inducing f \u2192 \u2200 {K : Set Y}, IsCompact K \u2192 K \u2286 Set.range f \u2192 IsCompact (f \u207b\u00b9' K)", "human_argument": "The proof uses an inducing map to identify the topology on the source with the topology pulled back from the target. Under that identification, compactness of a target set transfers to compactness of the corresponding preimage.", "lean_source": "lemma Topology.IsInducing.isCompact_preimage' (hf : IsInducing f) {K : Set Y}\n    (hK : IsCompact K) (Kf : K \u2286 range f) : IsCompact (f \u207b\u00b9' K) :=\n  (hf.isCompact_preimage_iff Kf).2 hK\n\n/-- The preimage of a compact set under a closed embedding is a compact set. -/"}}, {"pair_id": "study_089", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "r1Space_iff_specializes_or_disjoint_nhds", "statement": "\u2200 (X : Type u_3) [inst : TopologicalSpace X], R1Space X \u2194 \u2200 (x y : X), x \u2933 y \u2228 Disjoint (nhds x) (nhds y)", "human_argument": "First observe that x specializes to y precisely when every neighborhood of x meets every neighborhood of y; equivalently, the neighborhood filters of x and y are not disjoint. Hence the disjunction \"x specializes to y or the neighborhood filters are disjoint\" says: for any two points either every neighborhood of one meets every neighborhood of the other, or there exist disjoint neighborhoods of the two points. \n\nIf the space is R1, then any point not specializing to another is not in the other's closure, so one can find an open neighborhood of one disjoint from that closure and hence disjoint from some neighborhood of the other; this gives the required disjoint-neighborhood alternative. Conversely, if the stated dichotomy holds then whenever two points cannot be separated by disjoint neighborhoods neither neighborhood filter is disjoint, so they specialize to each other; thus specialization classes are closed, which is exactly the R1 condition.", "lean_source": "@[mk_iff r1Space_iff_specializes_or_disjoint_nhds]"}, "right": {"name": "Metric.mem_cocompact_of_closedBall_compl_subset", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] {s : Set \u03b1} [inst_1 : ProperSpace \u03b1] (c : \u03b1),\n  (\u2203 r, (Metric.closedBall c r)\u1d9c \u2286 s) \u2192 s \u2208 Filter.cocompact \u03b1", "human_argument": "Assume r is such that (closed ball B(c,r))\u1d9c \u2286 s. In a proper metric space every closed bounded set (in particular the closed ball B(c,r)) is compact, so K := B(c,r) is compact. By definition the cocompact filter consists of those sets which contain the complement of some compact set, and s contains K\u1d9c by assumption. Hence s lies in the cocompact filter.", "lean_source": "theorem mem_cocompact_of_closedBall_compl_subset [ProperSpace \u03b1] (c : \u03b1)\n    (h : \u2203 r, (closedBall c r)\u1d9c \u2286 s) : s \u2208 cocompact \u03b1 := by\n  rcases h with \u27e8r, h\u27e9\n  rw [Filter.mem_cocompact]\n  exact \u27e8closedBall c r, isCompact_closedBall c r, h\u27e9"}}, {"pair_id": "study_090", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Infinite.exists_accPt_cofinite_inf_principal", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : CompactSpace X],\n  Set.Infinite s \u2192 \u2203 x, AccPt x (Filter.cofinite \u2293 Filter.principal s)", "human_argument": "Let X be compact and s an infinite subset. Since the whole space is compact and s \u2286 X, we may apply the general fact that any infinite subset of a compact set has an accumulation point for the filter given by the meet of the cofinite filter and the principal filter of s. Hence there exists x which is an accumulation point of the filter cofinite \u2227 principal(s).", "lean_source": "lemma Set.Infinite.exists_accPt_cofinite_inf_principal [CompactSpace X] (hs : s.Infinite) :\n    \u2203 x, AccPt x (cofinite \u2293 \ud835\udcdf s) := by\n  simpa only [mem_univ, true_and]\n    using hs.exists_accPt_cofinite_inf_principal_of_subset_isCompact isCompact_univ s.subset_univ"}, "right": {"name": "IsometryEquiv.toDilationEquiv_apply", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : PseudoEMetricSpace X] [inst_1 : PseudoEMetricSpace Y] (e : X \u2243\u1d62 Y) (x : X),\n  (IsometryEquiv.toDilationEquiv e) x = e x", "human_argument": "Let e be an isometric equivalence from X to Y. By construction the dilation equivalence associated to e uses the same underlying map as e, so it agrees with e on points. Hence for every x in X, applying the associated dilation equivalence to x gives e(x).", "lean_source": "lemma _root_.IsometryEquiv.toDilationEquiv_apply (e : X \u2243\u1d62 Y) (x : X) :\n    e.toDilationEquiv x = e x :=\n  rfl\n\n@[simp]"}}, {"pair_id": "study_091", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Finite.isLindelof_sUnion", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {S : Set (Set X)}, Set.Finite S \u2192 (\u2200 s \u2208 S, IsLindelof s) \u2192 IsLindelof (\u22c3\u2080 S)", "human_argument": "Write the union of the family as an indexed union: \u22c3\u2080 S = \u22c3_{s\u2208S} s. A finite indexed union of Lindel\u00f6f subspaces is Lindel\u00f6f, so since S is finite and each s\u2208S is Lindel\u00f6f, the indexed union \u22c3_{s\u2208S} s is Lindel\u00f6f. Therefore \u22c3\u2080 S is Lindel\u00f6f.", "lean_source": "theorem Set.Finite.isLindelof_sUnion {S : Set (Set X)} (hf : S.Finite)\n    (hc : \u2200 s \u2208 S, IsLindelof s) : IsLindelof (\u22c3\u2080 S) := by\n  rw [sUnion_eq_biUnion]; exact hf.isLindelof_biUnion hc"}, "right": {"name": "ClosedEmbedding.isLindelof_preimage", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  ClosedEmbedding f \u2192 \u2200 {K : Set Y}, IsLindelof K \u2192 IsLindelof (f \u207b\u00b9' K)", "human_argument": "Let f : X \u2192 Y be a closed embedding, so f induces the subspace topology on its image and range(f) is closed in Y. If K \u2286 Y is Lindel\u00f6f then K \u2229 range(f) is Lindel\u00f6f as an intersection of a Lindel\u00f6f set with a closed set. Since f induces a homeomorphism onto its image, Lindel\u00f6fness of f\u207b\u00b9(K) is equivalent to Lindel\u00f6fness of f(f\u207b\u00b9(K)), and f(f\u207b\u00b9(K)) = K \u2229 range(f). Hence f\u207b\u00b9(K) is Lindel\u00f6f.", "lean_source": "theorem Topology.IsInducing.isLindelof_preimage {f : X \u2192 Y} (hf : IsInducing f)\n    (hf' : IsClosed (range f)) {K : Set Y} (hK : IsLindelof K) : IsLindelof (f \u207b\u00b9' K) := by\n  replace hK := hK.inter_right hf'\n  rwa [hf.isLindelof_iff, image_preimage_eq_inter_range]\n\n/-- The preimage of a Lindel\u00f6f set under a closed embedding is a Lindel\u00f6f set. -/"}}, {"pair_id": "study_092", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "RegularSpace.of_hasBasis", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {\u03b9 : X \u2192 Sort u_3} {p : (a : X) \u2192 \u03b9 a \u2192 Prop} {s : (a : X) \u2192 \u03b9 a \u2192 Set X},\n  (\u2200 (a : X), Filter.HasBasis (nhds a) (p a) (s a)) \u2192 (\u2200 (a : X) (i : \u03b9 a), p a i \u2192 IsClosed (s a i)) \u2192 RegularSpace X", "human_argument": "The proof shows regularity from a basis criterion: around each point and open neighborhood, it chooses a basis element whose closure stays inside the neighborhood. That local closed-neighborhood refinement is exactly what regularity needs.", "lean_source": "theorem RegularSpace.of_hasBasis {\u03b9 : X \u2192 Sort*} {p : \u2200 a, \u03b9 a \u2192 Prop} {s : \u2200 a, \u03b9 a \u2192 Set X}\n    (h\u2081 : \u2200 a, (\ud835\udcdd a).HasBasis (p a) (s a)) (h\u2082 : \u2200 a i, p a i \u2192 IsClosed (s a i)) :\n    RegularSpace X :=\n  .of_lift'_closure fun a => (h\u2081 a).lift'_closure_eq_self (h\u2082 a)"}, "right": {"name": "le_nhds_of_unique_clusterPt", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [inst_1 : CompactSpace X] {l : Filter X} {y : X},\n  (\u2200 (x : X), ClusterPt x l \u2192 x = y) \u2192 l \u2264 nhds y", "human_argument": "Let X be compact and let l be a filter with the property that any cluster point of l equals y. Compactness of X implies that l has at least one cluster point. By the uniqueness assumption this cluster point must be y. Hence every neighborhood of y belongs to l, i.e. l \u2264 the neighborhoods filter at y.", "lean_source": "lemma le_nhds_of_unique_clusterPt [CompactSpace X] {l : Filter X} {y : X}\n    (h : \u2200 x, ClusterPt x l \u2192 x = y) : l \u2264 \ud835\udcdd y :=\n  isCompact_univ.le_nhds_of_unique_clusterPt univ_mem fun x _ \u21a6 h x\n\n/-- If `y` is a unique `MapClusterPt` for `f` along `l`\nand the codomain of `f` is a compact space,\nthen `f` tends to `\ud835\udcdd y` along `l`. -/"}}, {"pair_id": "study_093", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Embedding.isLindelof_iff", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  Embedding f \u2192 (IsLindelof s \u2194 IsLindelof (f '' s))", "human_argument": "The proof uses that an embedding identifies the source with its image topologically. Lindelofness is transported across this identification, so covers on one side correspond to covers on the other.", "lean_source": "theorem Topology.IsInducing.isLindelof_iff {f : X \u2192 Y} (hf : IsInducing f) :\n    IsLindelof s \u2194 IsLindelof (f '' s) := by\n  refine \u27e8fun hs => hs.image hf.continuous, fun hs F F_ne_bot _ F_le => ?_\u27e9\n  obtain \u27e8_, \u27e8x, x_in : x \u2208 s, rfl\u27e9, hx : ClusterPt (f x) (map f F)\u27e9 :=\n    hs ((map_mono F_le).trans_eq map_principal)\n  exact \u27e8x, x_in, hf.mapClusterPt_iff.1 hx\u27e9\n\n/-- If `f : X \u2192 Y` is an embedding, the image `f '' s` of a set `s` is Lindel\u00f6f\nif and only if `s` is Lindel\u00f6f. -/"}, "right": {"name": "exists_mem_nhdsSet_isCompact_mapsTo", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y]\n  [inst_2 : LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X} {U : Set Y},\n  Continuous f \u2192 IsCompact K \u2192 IsOpen U \u2192 Set.MapsTo f K U \u2192 \u2203 L \u2208 nhdsSet K, IsCompact L \u2227 Set.MapsTo f L U", "human_argument": "For each x \u2208 K, continuity of f and openness of U together with local compactness give a neighborhood V_x of x and a compact set C_x with V_x \u2286 C_x and f(C_x) \u2286 U. The family {V_x : x \u2208 K} covers K, so by compactness of K finitely many V_{x_i} (i = 1,...,n) already cover K. Let L = \u22c3_{i=1}^n C_{x_i}; then L is compact (finite union of compact sets), contains a neighborhood of K (since \u22c3 V_{x_i} \u2286 L), and f(L) \u2286 U (each C_{x_i} maps into U). Hence L is the required compact neighborhood of K with f(L) \u2286 U.", "lean_source": "lemma exists_mem_nhdsSet_isCompact_mapsTo [LocallyCompactPair X Y] {f : X \u2192 Y} {K : Set X}\n    {U : Set Y} (hf : Continuous f) (hK : IsCompact K) (hU : IsOpen U) (hKU : MapsTo f K U) :\n    \u2203 L \u2208 \ud835\udcdd\u02e2 K, IsCompact L \u2227 MapsTo f L U := by\n  choose! V hxV hVc hVU using fun x (hx : x \u2208 K) \u21a6\n    exists_mem_nhds_isCompact_mapsTo hf (hU.mem_nhds (hKU hx))\n  rcases hK.elim_nhds_subcover_nhdsSet hxV with \u27e8s, hsK, hKs\u27e9\n  exact \u27e8_, hKs, s.isCompact_biUnion fun x hx \u21a6 hVc x (hsK x hx), mapsTo_iUnion\u2082.2 fun x hx \u21a6\n    hVU x (hsK x hx)\u27e9\n\n/-- In a locally compact space, for every containment `K \u2286 U` of a compact set `K` in an open\n  set `U`, there is a compact neighborhood `L` such that `K \u2286 L \u2286 U`: equivalently, there is a\n  compact `L` such that `K \u2286 interior L` and `L \u2286 U`.\n  See also `exists_compact_closed_between`, in which one guarantees additionally that `L` is closed\n  if the space is regular. -/"}}, {"pair_id": "study_094", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Pi.isCompact_closure_iff", "statement": "\u2200 {\u03b9 : Type u_4} {\u03c0 : \u03b9 \u2192 Type u_5} [inst : (i : \u03b9) \u2192 TopologicalSpace (\u03c0 i)] [inst_1 : \u2200 (i : \u03b9), T2Space (\u03c0 i)]\n  {s : Set ((i : \u03b9) \u2192 \u03c0 i)}, IsCompact (closure s) \u2194 \u2200 (i : \u03b9), IsCompact (closure (Function.eval i '' s))", "human_argument": "Closure(s) is compact exactly when there exists a compact superset of s, so it suffices to characterize when s sits inside some compact subset of the product. In a product of Hausdorff spaces, s is contained in a product \u220f K_i of compact sets K_i if and only if for each i the projection of s to the i-th factor is contained in K_i, i.e. the image of s under the i-th projection is a subset of K_i. Hence if closure(s) is compact then each projection closure is contained in some compact K_i and so is compact; conversely, if every projection closure is compact then taking K_i = closure(projection_i(s)) gives a product \u220f K_i which is compact and contains s, so closure(s) is compact.", "lean_source": "lemma Pi.isCompact_closure_iff {\u03b9 : Type*} {X : \u03b9 \u2192 Type*} [\u2200 i, TopologicalSpace (X i)]\n    [\u2200 i, R1Space (X i)] {s : Set (\u03a0 i, X i)} :\n    IsCompact (closure s) \u2194 \u2200 i, IsCompact (closure <| eval i '' s) := by\n  simp_rw [\u2190 exists_isCompact_superset_iff, Pi.exists_compact_superset_iff, image_subset_iff]\n\n/-- If `V : \u03b9 \u2192 Set X` is a decreasing family of compact sets then any neighborhood of\n`\u22c2 i, V i` contains some `V i`. This is a version of `exists_subset_nhds_of_isCompact'` where we\ndon't need to assume each `V i` closed because it follows from compactness since `X` is\nassumed to be Hausdorff. -/"}, "right": {"name": "IsCompact.nonempty_sInter_of_directed_nonempty_isCompact_isClosed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {S : Set (Set X)} [hS : Nonempty \u2191S],\n  DirectedOn (fun x x_1 => x \u2287 x_1) S \u2192\n    (\u2200 U \u2208 S, Set.Nonempty U) \u2192 (\u2200 U \u2208 S, IsCompact U) \u2192 (\u2200 U \u2208 S, IsClosed U) \u2192 Set.Nonempty (\u22c2\u2080 S)", "human_argument": "Write the intersection \u22c2\u2080 S as an indexed intersection \u22c2_{U\u2208S} U. Apply the compactness lemma for indexed intersections: the intersection of a directed family (with respect to \u2287) of nonempty compact closed sets is nonempty. The hypotheses give that the family indexed by elements of S is directed and that each member is nonempty, compact and closed, so the lemma applies. Therefore \u22c2\u2080 S is nonempty.", "lean_source": "theorem IsCompact.nonempty_sInter_of_directed_nonempty_isCompact_isClosed\n    {S : Set (Set X)} [hS : Nonempty S] (hSd : DirectedOn (\u00b7 \u2287 \u00b7) S) (hSn : \u2200 U \u2208 S, U.Nonempty)\n    (hSc : \u2200 U \u2208 S, IsCompact U) (hScl : \u2200 U \u2208 S, IsClosed U) : (\u22c2\u2080 S).Nonempty := by\n  rw [sInter_eq_iInter]\n  exact IsCompact.nonempty_iInter_of_directed_nonempty_isCompact_isClosed _\n    (DirectedOn.directed_val hSd) (fun i \u21a6 hSn i i.2) (fun i \u21a6 hSc i i.2) (fun i \u21a6 hScl i i.2)\n\n/-- Cantor's intersection theorem for sequences indexed by `\u2115`:\nthe intersection of a decreasing sequence of nonempty compact closed sets is nonempty. -/"}}, {"pair_id": "study_095", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "DilationEquiv.map_cobounded", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} {F : Type u_3} [inst : PseudoMetricSpace X] [inst_1 : PseudoMetricSpace Y]\n  [inst_2 : DilationEquivClass F X Y] (e : F), Filter.map (\u21d1e) (Bornology.cobounded X) = Bornology.cobounded Y", "human_argument": "The proof shows that a dilation equivalence preserves the cobounded filter. It uses the metric scaling control to send bounded sets to bounded sets and then lifts that boundedness preservation to a statement about the filter at infinity.", "lean_source": "lemma map_cobounded (e : F) : map e (cobounded X) = cobounded Y := by\n  rw [\u2190 Dilation.comap_cobounded e, map_comap_of_surjective (EquivLike.surjective e)]\n\nend PseudoMetricSpace\n\nend DilationEquiv"}, "right": {"name": "DilationEquiv.toHomeomorph_symm", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : PseudoEMetricSpace X] [inst_1 : PseudoEMetricSpace Y] (e : X \u2243\u1d48 Y),\n  Homeomorph.symm (DilationEquiv.toHomeomorph e) = DilationEquiv.toHomeomorph (DilationEquiv.symm e)", "human_argument": "The proof is structural: a dilation equivalence already gives a homeomorphism, and the inverse homeomorphism is obtained by applying the same construction to the inverse equivalence.", "lean_source": "lemma toHomeomorph_symm (e : X \u2243\u1d48 Y) : e.symm.toHomeomorph = e.toHomeomorph.symm :=\n  rfl\n\n@[simp]"}}, {"pair_id": "study_096", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isTopologicalBasis_isClopen", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] [inst_2 : CompactSpace X]\n  [inst_3 : TotallyDisconnectedSpace X], TopologicalSpace.IsTopologicalBasis {s | IsClopen s}", "human_argument": "We show the collection of clopen sets is a basis. Clearly every clopen set is open. Given x in an open U, U is a neighborhood of x, and by the hypothesis on X (compact, Hausdorff, totally disconnected) the neighborhoods of x have a basis of clopen neighborhoods, so there exists a clopen V with x \u2208 V \u2286 U. Hence every open set is a union of clopen sets, so the clopen sets form a topological basis.", "lean_source": "theorem isTopologicalBasis_isClopen : IsTopologicalBasis { s : Set X | IsClopen s } := by\n  apply isTopologicalBasis_of_isOpen_of_nhds fun U (hU : IsClopen U) => hU.2\n  intro x U hxU U_op\n  have : U \u2208 \ud835\udcdd x := IsOpen.mem_nhds U_op hxU\n  rcases (nhds_basis_clopen x).mem_iff.mp this with \u27e8V, \u27e8hxV, hV\u27e9, hVU : V \u2286 U\u27e9\n  use V\n  tauto\n\n/-- Every member of an open set in a compact Hausdorff totally disconnected space\n  is contained in a clopen set contained in the open set. -/"}, "right": {"name": "IsCompact.isSigmaCompact", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {s : Set X}, IsCompact s \u2192 IsSigmaCompact s", "human_argument": "Let s be a compact subset of X. Define a sequence (s_n)_{n\u2208\u2115} by s_n = s for every n; each s_n is compact because s is. The countable union \u22c3_{n\u2208\u2115} s_n equals s, so s is a countable union of compact sets and hence \u03c3-compact.", "lean_source": "lemma IsCompact.isSigmaCompact {s : Set X} (hs : IsCompact s) : IsSigmaCompact s :=\n  \u27e8fun _ => s, fun _ => hs, iUnion_const _\u27e9\n\n/-- The empty set is \u03c3-compact. -/\n@[simp]"}}, {"pair_id": "study_097", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_of_countable_subfamily_closed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  (\u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X),\n      (\u2200 (i : \u03b9), IsClosed (t i)) \u2192 s \u2229 \u22c2 i, t i = \u2205 \u2192 \u2203 u, Set.Countable u \u2227 s \u2229 \u22c2 i \u2208 u, t i = \u2205) \u2192\n    IsLindelof s", "human_argument": "Let U = (U_i)_{i\u2208I} be an open cover of s and set t_i := X \\ U_i, which are closed. Since U covers s we have s \u2229 \u22c2_{i\u2208I} t_i = \u2205, so by the hypothesis there is a countable set J \u2286 I with s \u2229 \u22c2_{i\u2208J} t_i = \u2205. Equivalently s \u2286 \u22c3_{i\u2208J} U_i, so the subfamily (U_i)_{i\u2208J} is a countable subcover of s. Hence s is Lindel\u00f6f.", "lean_source": "theorem isLindelof_of_countable_subfamily_closed\n    (h :\n      \u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X), (\u2200 i, IsClosed (t i)) \u2192 (s \u2229 \u22c2 i, t i) = \u2205 \u2192\n        \u2203 u : Set \u03b9, u.Countable \u2227 (s \u2229 \u22c2 i \u2208 u, t i) = \u2205) :\n    IsLindelof s :=\n  isLindelof_of_countable_subcover fun U hUo hsU \u21a6 by\n    rw [\u2190 disjoint_compl_right_iff_subset, compl_iUnion, disjoint_iff] at hsU\n    rcases h (fun i \u21a6 (U i)\u1d9c) (fun i \u21a6 (hUo _).isClosed_compl) hsU with \u27e8t, ht\u27e9\n    refine \u27e8t, ?_\u27e9\n    rwa [\u2190 disjoint_compl_right_iff_subset, compl_iUnion\u2082, disjoint_iff]\n\n/-- A set `s` is Lindel\u00f6f if and only if\nfor every open cover of `s`, there exists a countable subcover. -/"}, "right": {"name": "coLindelof_le_coclosedLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X], Filter.coLindelof X \u2264 Filter.coclosedLindelof X", "human_argument": "Let X be a topological space. Both the co\u2011Lindel\u00f6f filter and the co\u2011closed Lindel\u00f6f filter are presented as the infimum of a family of filters, and the family used for the co\u2011Lindel\u00f6f filter is a subfamily of the one used for the co\u2011closed Lindel\u00f6f filter. Taking the infimum is monotone in the sense that the infimum over a smaller family is below the infimum over a larger family; concretely, each member of the smaller family equals some member of the larger family and hence is below the larger infimum. Therefore the co\u2011Lindel\u00f6f filter is below the co\u2011closed Lindel\u00f6f filter.", "lean_source": "theorem coLindelof_le_coclosedLindelof : coLindelof X \u2264 coclosedLindelof X :=\n  iInf_mono fun _ => le_iInf fun _ => le_rfl"}}, {"pair_id": "study_098", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Tendsto.isLindelof_insert_range_of_coLindelof", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y} {y : Y},\n  Filter.Tendsto f (Filter.coLindelof X) (nhds y) \u2192 Continuous f \u2192 IsLindelof (insert y (Set.range f))", "human_argument": "The proof studies the range of a sequence or net together with a limiting point. It uses the convergence behavior to control the tail of the range and combines that with co-Lindelof information to show the inserted range remains Lindelof.", "lean_source": "theorem Tendsto.isLindelof_insert_range_of_coLindelof {f : X \u2192 Y} {y}\n    (hf : Tendsto f (coLindelof X) (\ud835\udcdd y)) (hfc : Continuous f) :\n    IsLindelof (insert y (range f)) := by\n  intro l hne _ hle\n  by_cases hy : ClusterPt y l\n  \u00b7 exact \u27e8y, Or.inl rfl, hy\u27e9\n  simp only [clusterPt_iff_nonempty, not_forall, \u2190 not_disjoint_iff_nonempty_inter, not_not] at hy\n  rcases hy with \u27e8s, hsy, t, htl, hd\u27e9\n  rcases mem_coLindelof.1 (hf hsy) with \u27e8K, hKc, hKs\u27e9\n  have : f '' K \u2208 l := by\n    filter_upwards [htl, le_principal_iff.1 hle] with y hyt hyf\n    rcases hyf with (rfl | \u27e8x, rfl\u27e9)\n    exacts [(hd.le_bot \u27e8mem_of_mem_nhds hsy, hyt\u27e9).elim,\n      mem_image_of_mem _ (not_not.1 fun hxK => hd.le_bot \u27e8hKs hxK, hyt\u27e9)]\n  rcases hKc.image hfc (le_principal_iff.2 this) with \u27e8y, hy, hyl\u27e9\n  exact \u27e8y, Or.inr <| image_subset_range _ _ hy, hyl\u27e9\n\n/-- `Filter.coclosedLindelof` is the filter generated by complements to closed Lindelof sets. -/"}, "right": {"name": "IsHereditarilyLindelof.isLindelof_subset", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsHereditarilyLindelof s \u2192 t \u2286 s \u2192 IsLindelof t", "human_argument": "If s is hereditarily Lindel\u00f6f then by definition every subset of s is Lindel\u00f6f. Since t \u2286 s, t is one of those subsets. Hence t is Lindel\u00f6f.", "lean_source": "lemma IsHereditarilyLindelof.isLindelof_subset (hs : IsHereditarilyLindelof s) (ht : t \u2286 s) :\n    IsLindelof t := hs t ht"}}, {"pair_id": "study_099", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.image_of_continuousOn", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 ContinuousOn f s \u2192 IsLindelof (f '' s)", "human_argument": "The proof starts with a Lindelof set in the domain and a map that is continuous on that set. It pulls an open cover of the image back along the map, uses the Lindelof hypothesis to choose a countable subcover in the domain, and then pushes that countable subcover forward to cover the image.", "lean_source": "theorem IsLindelof.image_of_continuousOn {f : X \u2192 Y} (hs : IsLindelof s) (hf : ContinuousOn f s) :\n    IsLindelof (f '' s) := by\n  intro l lne _ ls\n  have : NeBot (l.comap f \u2293 \ud835\udcdf s) :=\n    comap_inf_principal_neBot_of_image_mem lne (le_principal_iff.1 ls)\n  obtain \u27e8x, hxs, hx\u27e9 : \u2203 x \u2208 s, ClusterPt x (l.comap f \u2293 \ud835\udcdf s) := @hs _ this _ inf_le_right\n  haveI := hx.neBot\n  use f x, mem_image_of_mem f hxs\n  have : Tendsto f (\ud835\udcdd x \u2293 (comap f l \u2293 \ud835\udcdf s)) (\ud835\udcdd (f x) \u2293 l) := by\n    convert! (hf x hxs).inf (@tendsto_comap _ _ f l) using 1\n    rw [nhdsWithin]\n    ac_rfl\n  exact this.neBot\n\n/-- A continuous image of a Lindel\u00f6f set is a Lindel\u00f6f set within the codomain. -/"}, "right": {"name": "isLindelof_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [h : LindelofSpace X], IsLindelof Set.univ", "human_argument": "The proof simply invokes the defining Lindelof-space witness for the whole space. There is no real construction: the theorem packages the class assumption into the statement that the universal set is Lindelof.", "lean_source": "theorem isLindelof_univ [h : LindelofSpace X] : IsLindelof (univ : Set X) :=\n  h.isLindelof_univ"}}, {"pair_id": "study_100", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.exists_subseq_bounded_of_cauchySeq", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] (u : \u2115 \u2192 \u03b1),\n  CauchySeq u \u2192\n    \u2200 (b : \u2115 \u2192 \u211d), (\u2200 (n : \u2115), 0 < b n) \u2192 \u2203 f, StrictMono f \u2227 \u2200 (n m : \u2115), m \u2265 f n \u2192 dist (u m) (u (f n)) < b n", "human_argument": "Fix k. Since u is Cauchy, for each k there exists N_k such that whenever m,n \u2265 N_k we have dist(u_m,u_n) < b_k; in particular, for any n \u2265 N_k and any m \u2265 n we have dist(u_m,u_n) < b_k. Choose a strictly increasing map f : \u2115 \u2192 \u2115 with f(k) \u2265 N_k for all k (for instance by simple induction: pick f(0) \u2265 N_0 and thereafter f(k+1) > max(f(k),N_{k+1})). Then for every n and every m \u2265 f(n) both m and f(n) are \u2265 N_n, so dist(u_m,u_{f(n)}) < b_n, as required.", "lean_source": "lemma Metric.exists_subseq_bounded_of_cauchySeq (u : \u2115 \u2192 \u03b1) (hu : CauchySeq u) (b : \u2115 \u2192 \u211d)\n    (hb : \u2200 n, 0 < b n) :\n    \u2203 f : \u2115 \u2192 \u2115, StrictMono f \u2227 \u2200 n, \u2200 m \u2265 f n, dist (u m) (u (f n)) < b n := by\n  rw [cauchySeq_iff] at hu\n  have hu' : \u2200 k, \u2200\u1da0 (n : \u2115) in atTop, \u2200 m \u2265 n, dist (u m) (u n) < b k := by\n    intro k\n    rw [eventually_atTop]\n    obtain \u27e8N, hN\u27e9 := hu (b k) (hb k)\n    exact \u27e8N, fun m hm r hr => hN r (hm.trans hr) m hm\u27e9\n  exact Filter.extraction_forall_of_eventually hu'\n\nend CauchySeq"}, "right": {"name": "IsLindelof.ne_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : NonLindelofSpace X], IsLindelof s \u2192 s \u2260 Set.univ", "human_argument": "Let X be a non\u2011Lindel\u00f6f topological space and s \u2286 X a Lindel\u00f6f subset. If s = X, then the whole space X would be Lindel\u00f6f, contradicting the hypothesis that X is non\u2011Lindel\u00f6f. Hence s \u2260 X.", "lean_source": "theorem IsLindelof.ne_univ [NonLindelofSpace X] (hs : IsLindelof s) : s \u2260 univ := fun h \u21a6\n  nonLindelof_univ X (h \u25b8 hs)"}}]}</script>
  <header>
    <div>
      <h1>PriorProof Rater Packet</h1>
      <div class="meta" id="packetMeta"></div>
    </div>
    <div class="toolbar">
      <button id="prev">Prev</button>
      <span class="status" id="status"></span>
      <button id="next">Next</button>
      <button id="download" class="primary">Download responses</button>
    </div>
  </header>
  <main>
    <p class="meta" id="prompt"></p>
    <div class="grid">
      <section class="side">
        <div class="side-header">
          <div class="side-title" id="leftName"></div>
          <button class="choice" id="chooseLeft">Choose left</button>
        </div>
        <div class="content" id="leftContent"></div>
      </section>
      <section class="side">
        <div class="side-header">
          <div class="side-title" id="rightName"></div>
          <button class="choice" id="chooseRight">Choose right</button>
        </div>
        <div class="content" id="rightContent"></div>
      </section>
    </div>
  </main>
  <script>
    const packet = JSON.parse(document.getElementById('packet').textContent);
    const storageKey = 'priorproof-rater-' + packet.name;
    let idx = 0;
    let responses = JSON.parse(localStorage.getItem(storageKey) || '{}');
    const esc = (s) => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[c]));
    function sideHtml(side) {
      const source = side.lean_source || side.statement || '';
      return `
        <div><div class="label">Statement</div><div class="statement">${esc(side.statement)}</div></div>
        <div><div class="label">Proof narrative</div><div class="argument">${esc(side.human_argument)}</div></div>
        <div><div class="label">Proof source</div><pre>${esc(source)}</pre></div>
      `;
    }
    function render() {
      const pair = packet.pairs[idx];
      document.getElementById('packetMeta').textContent = `${packet.pair_count} pairs`;
      document.getElementById('status').textContent = `${idx + 1} / ${packet.pairs.length}`;
      document.getElementById('prompt').textContent = pair.prompt;
      document.getElementById('leftName').textContent = pair.left.name;
      document.getElementById('rightName').textContent = pair.right.name;
      document.getElementById('leftContent').innerHTML = sideHtml(pair.left);
      document.getElementById('rightContent').innerHTML = sideHtml(pair.right);
      const choice = responses[pair.pair_id]?.choice;
      document.getElementById('chooseLeft').classList.toggle('selected', choice === 'left');
      document.getElementById('chooseRight').classList.toggle('selected', choice === 'right');
    }
    function choose(choice) {
      const pair = packet.pairs[idx];
      responses[pair.pair_id] = {
        pair_id: pair.pair_id,
        choice,
        left: pair.left.name,
        right: pair.right.name,
        recorded_at: new Date().toISOString()
      };
      localStorage.setItem(storageKey, JSON.stringify(responses));
      render();
    }
    document.getElementById('chooseLeft').onclick = () => choose('left');
    document.getElementById('chooseRight').onclick = () => choose('right');
    document.getElementById('prev').onclick = () => { idx = Math.max(0, idx - 1); render(); };
    document.getElementById('next').onclick = () => { idx = Math.min(packet.pairs.length - 1, idx + 1); render(); };
    document.getElementById('download').onclick = () => {
      const rows = Object.values(responses).map(row => JSON.stringify(row)).join('\n') + '\n';
      const blob = new Blob([rows], {type: 'application/jsonl'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'priorproof_rater_responses.jsonl';
      a.click();
      URL.revokeObjectURL(url);
    };
    render();
  </script>
</body>
</html>
