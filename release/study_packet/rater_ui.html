to\u27e9"}}, {"pair_id": "study_035", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Dilation.tendsto_cobounded", "statement": "\u2200 {\u03b1 : Type u_1} {\u03b2 : Type u_2} {F : Type u_4} [inst : PseudoMetricSpace \u03b1] [inst_1 : PseudoMetricSpace \u03b2]\n  [inst_2 : DilationClass F \u03b1 \u03b2] (f : F), Filter.Tendsto (\u21d1f) (Bornology.cobounded \u03b1) (Bornology.cobounded \u03b2)", "human_argument": "By assumption f is a dilation, hence it is antilipschitz: there is a positive constant C with C\u00b7dist(x,y) \u2264 dist(f x,f y) for all x,y. This inequality prevents an unbounded set in \u03b1 from being mapped into a bounded set in \u03b2, equivalently it implies that preimages of bounded sets are bounded, so f sends complements of bounded sets to complements of bounded sets. Therefore f maps the cobounded filter on \u03b1 to the cobounded filter on \u03b2, i.e. Tendsto f (cobounded \u03b1) (cobounded \u03b2).", "lean_source": "lemma tendsto_cobounded : Filter.Tendsto f (cobounded \u03b1) (cobounded \u03b2) :=\n  (Dilation.antilipschitz f).tendsto_cobounded\n\n@[simp]"}, "right": {"name": "IsLindelof.image", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {s : Set X} {f : X \u2192 Y},\n  IsLindelof s \u2192 Continuous f \u2192 IsLindelof (f '' s)", "human_argument": "Let {U_i}_{i\u2208I} be an open cover of f[s] in Y. By continuity each f^{-1}(U_i) is open in X, and these preimages cover s because if x\u2208s then f(x)\u2208f[s] is in some U_i, hence x\u2208f^{-1}(U_i). Since s is Lindel\u00f6f there is a countable subcollection f^{-1}(U_{i_n}) that still covers s, and therefore the corresponding U_{i_n} form a countable subcover of f[s]: if y\u2208f[s] then y=f(x) for some x\u2208s, so x lies in some f^{-1}(U_{i_n}) and thus y\u2208U_{i_n}. Hence f[s] is Lindel\u00f6f.", "lean_source": "theorem IsLindelof.image {f : X \u2192 Y} (hs : IsLindelof s) (hf : Continuous f) :\n    IsLindelof (f '' s) := hs.image_of_continuousOn hf.continuousOn\n\n/-- A filter with the countable intersection property that is finer than the principal filter on\na Lindel\u00f6f set `s` contains any open set that contains all cluster points of `s`. -/"}}, {"pair_id": "study_036", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Infinite.exists_accPt_cofinite_inf_principal_of_subset_isCompact", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s K : Set X},\n  Set.Infinite s \u2192 IsCompact K \u2192 s \u2286 K \u2192 \u2203 x \u2208 K, AccPt x (Filter.cofinite \u2293 Filter.principal s)", "human_argument": "The proof turns an infinite subset of a compact set into a cofinite filter on that subset. It then uses compactness to extract a cluster point and checks that the filter really sees infinitely many points from the subset, giving an accumulation point.", "lean_source": "lemma Set.Infinite.exists_accPt_cofinite_inf_principal_of_subset_isCompact\n    {K : Set X} (hs : s.Infinite) (hK : IsCompact K) (hsub : s \u2286 K) :\n    \u2203 x \u2208 K, AccPt x (cofinite \u2293 \ud835\udcdf s) :=\n  (@hK _ hs.cofinite_inf_principal_neBot (inf_le_right.trans <| principal_mono.2 hsub)).imp\n    fun x hx \u21a6 by rwa [accPt_iff_clusterPt, inf_comm, inf_right_comm,\n      (finite_singleton _).cofinite_inf_principal_compl]"}, "right": {"name": "IsCompact.exists_clusterPt", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {f : Filter X} [inst_1 : Filter.NeBot f], f \u2264 Filter.principal s \u2192 \u2203 x \u2208 s, ClusterPt x f", "human_argument": "The proof applies compactness to a filter that is forced to live inside the compact set. Compactness gives a cluster point, and the principal-set bound shows that the cluster point lies in the original set.", "lean_source": "lemma IsCompact.exists_clusterPt (hs : IsCompact s) {f : Filter X} [NeBot f] (hf : f \u2264 \ud835\udcdf s) :\n    \u2203 x \u2208 s, ClusterPt x f := hs hf"}}, {"pair_id": "study_037", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsCompact s \u2192 IsLindelof s", "human_argument": "The proof turns an arbitrary open cover of a compact set into a finite subcover. Since every finite subcover is countable, compactness immediately implies the Lindelof property.", "lean_source": "theorem IsCompact.isLindelof (hs : IsCompact s) :\n    IsLindelof s := by tauto\n\n/-- A \u03c3-compact set `s` is Lindel\u00f6f -/"}, "right": {"name": "isSigmaCompact_iUnion", "statement": "\u2200 {X : Type u_1} {\u03b9 : Type u_3} [inst : TopologicalSpace X] [inst_1 : Countable \u03b9] (s : \u03b9 \u2192 Set X),\n  (\u2200 (i : \u03b9), IsSigmaCompact (s i)) \u2192 IsSigmaCompact (\u22c3 i, s i)", "human_argument": "The proof handles a countable union of sigma-compact sets. For each member it chooses a countable compact cover, then flattens the two layers of countability into one countable family of compact sets covering the whole union.", "lean_source": "lemma isSigmaCompact_iUnion [Countable \u03b9] (s : \u03b9 \u2192 Set X)\n    (hcomp : \u2200 i, IsSigmaCompact (s i)) : IsSigmaCompact (\u22c3 i, s i) := by\n  -- Choose a decomposition s_i = \u22c3 K_i,j for each i.\n  choose K hcomp hcov using fun i \u21a6 hcomp i\n  -- Then, we have a countable union of countable unions of compact sets, i.e. countably many.\n  have := calc\n    \u22c3 i, s i\n    _ = \u22c3 i, \u22c3 n, (K i n) := by simp_rw [hcov]\n    _ = \u22c3 (i) (n : \u2115), (K.uncurry \u27e8i, n\u27e9) := by rw [Function.uncurry_def]\n    _ = \u22c3 x, K.uncurry x := by rw [\u2190 iUnion_prod']\n  rw [this]\n  exact isSigmaCompact_iUnion_of_isCompact K.uncurry fun x \u21a6 (hcomp x.1 x.2)\n\n/-- Countable unions of \u03c3-compact sets are \u03c3-compact. -/"}}, {"pair_id": "study_038", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "specializes_iff_not_disjoint", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] {x y : X}, x \u2933 y \u2194 \u00acDisjoint (nhds x) (nhds y)", "human_argument": "Assume X is a T1 topological space. By definition x specializes to y means y lies in the closure of {x}, equivalently every neighborhood of y contains x. If x specializes to y then every neighborhood V of y contains x, so for any neighborhood U of x we have U \u2229 V \u2287 {x} \u2260 \u2205; hence the neighborhood filters of x and y are not disjoint. Conversely, if the neighborhood filters are not disjoint then every neighborhood V of y meets every neighborhood U of x; intersecting over all neighborhoods U of x (which in a T1 space equals {x}) shows V meets {x}, so x \u2208 V, and thus y is in the closure of {x}, i.e. x specializes to y.", "lean_source": "theorem specializes_iff_not_disjoint : x \u2933 y \u2194 \u00acDisjoint (\ud835\udcdd x) (\ud835\udcdd y) :=\n  disjoint_nhds_nhds_iff_not_specializes.not_left.symm"}, "right": {"name": "isSigmaCompact_range", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Continuous f \u2192 \u2200 [inst : SigmaCompactSpace X], IsSigmaCompact (Set.range f)", "human_argument": "Let X be \u03c3-compact, so X = \u22c3_{n} K_n with each K_n compact. Then range f = f(X) = \u22c3_{n} f(K_n), since f(X) is the image of the union. Each f(K_n) is compact because a continuous map sends compact sets to compact sets, hence range f is a countable union of compact sets and therefore \u03c3-compact.", "lean_source": "lemma isSigmaCompact_range {f : X \u2192 Y} (hf : Continuous f) [SigmaCompactSpace X] :\n    IsSigmaCompact (range f) :=\n  image_univ \u25b8 isSigmaCompact_univ.image hf\n\n/-- A subset `s` is \u03c3-compact iff `s` (with the subspace topology) is a \u03c3-compact space. -/"}}, {"pair_id": "study_039", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "dense_sInter_of_isOpen", "statement": "\u2200 {\u03b1 : Type u_1} [inst : TopologicalSpace \u03b1] [inst_1 : BaireSpace \u03b1] {S : Set (Set \u03b1)},\n  (\u2200 s \u2208 S, IsOpen s) \u2192 Set.Countable S \u2192 (\u2200 s \u2208 S, Dense s) \u2192 Dense (\u22c2\u2080 S)", "human_argument": "If S is empty then its intersection is the whole space and hence dense. Otherwise, since S is countable we can enumerate it as the range of a sequence f : \u2115 \u2192 Set \u03b1. The hypotheses imply each f(n) is open and dense, so we are in the setting of the Baire property for sequences: a countable intersection of open dense sets indexed by \u2115 is dense. Applying that fact to the sequence f yields that \u22c2\u2080 S is dense.", "lean_source": "theorem dense_sInter_of_isOpen {S : Set (Set X)} (ho : \u2200 s \u2208 S, IsOpen s) (hS : S.Countable)\n    (hd : \u2200 s \u2208 S, Dense s) : Dense (\u22c2\u2080 S) := by\n  rcases S.eq_empty_or_nonempty with h | h\n  \u00b7 simp [h]\n  \u00b7 rcases hS.exists_eq_range h with \u27e8f, rfl\u27e9\n    exact dense_iInter_of_isOpen_nat (forall_mem_range.1 ho) (forall_mem_range.1 hd)\n\n/-- Baire theorem: a countable intersection of dense open sets is dense. Formulated here with\nan index set which is a countable set in any type. -/"}, "right": {"name": "IsCompact.isCompact_isClosed_basis_nhds", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] {x : X} {L : Set X},\n  IsCompact L \u2192 L \u2208 nhds x \u2192 Filter.HasBasis (nhds x) (fun K => K \u2208 nhds x \u2227 IsCompact K \u2227 IsClosed K) fun x => x", "human_argument": "Fix a neighborhood U of x. Using that L is compact and belongs to the neighborhood filter of x, one obtains a compact set K which is a neighborhood of x and is contained in the interior of U. Since the closure of a compact set is compact and closed, cl K is a closed compact neighborhood of x, and by the containment K \u2286 interior U we get cl K \u2286 U. Hence every neighborhood U of x contains a closed compact neighborhood of x, so the neighborhoods of x are generated by sets that are simultaneously neighborhoods of x, compact and closed.", "lean_source": "theorem IsCompact.isCompact_isClosed_basis_nhds {x : X} {L : Set X} (hLc : IsCompact L)\n    (hxL : L \u2208 \ud835\udcdd x) : (\ud835\udcdd x).HasBasis (fun K \u21a6 K \u2208 \ud835\udcdd x \u2227 IsCompact K \u2227 IsClosed K) (\u00b7) :=\n  hasBasis_self.2 fun _U hU \u21a6\n    let \u27e8K, hKx, hKc, hKU\u27e9 := exists_mem_nhds_isCompact_mapsTo_of_isCompact_mem_nhds\n      continuous_id (interior_mem_nhds.2 hU) hLc hxL\n    \u27e8closure K, mem_of_superset hKx subset_closure, \u27e8hKc.closure, isClosed_closure\u27e9,\n      (hKc.closure_subset_of_isOpen isOpen_interior hKU).trans interior_subset\u27e9\n\n/-- In an R\u2081 space, the filters `coclosedCompact` and `cocompact` are equal. -/\n@[simp]"}}, {"pair_id": "study_040", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.closedBall_compl_subset_of_mem_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] {s : Set \u03b1},\n  s \u2208 Filter.cocompact \u03b1 \u2192 \u2200 (c : \u03b1), \u2203 r, (Metric.closedBall c r)\u1d9c \u2286 s", "human_argument": "The proof uses the definition of the cocompact filter and the fact that a closed ball is compact in the available metric context. If a set is eventually outside every compact set, then it is eventually outside the chosen closed ball.", "lean_source": "theorem closedBall_compl_subset_of_mem_cocompact {s : Set \u03b1} (hs : s \u2208 cocompact \u03b1) (c : \u03b1) :\n    \u2203 (r : \u211d), (Metric.closedBall c r)\u1d9c \u2286 s :=\n  IsCobounded.closedBall_compl_subset (cobounded_le_cocompact hs) c"}, "right": {"name": "Metric.cobounded_eq_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] [inst_1 : ProperSpace \u03b1], Bornology.cobounded \u03b1 = Filter.cocompact \u03b1", "human_argument": "The proof proves equality of the cobounded and cocompact filters in a metric setting. One direction turns bounded complements into compact containment data, and the other direction uses metric balls or closed balls to convert compact complements back into boundedness statements.", "lean_source": "theorem Metric.cobounded_eq_cocompact [ProperSpace \u03b1] : cobounded \u03b1 = cocompact \u03b1 := by\n  nontriviality \u03b1; inhabit \u03b1\n  exact cobounded_le_cocompact.antisymm <| (hasBasis_cobounded_compl_closedBall default).ge_iff.2\n    fun _ _ \u21a6 (isCompact_closedBall _ _).compl_mem_cocompact"}}, {"pair_id": "study_041", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.cobounded_eq_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] [inst_1 : ProperSpace \u03b1], Bornology.cobounded \u03b1 = Filter.cocompact \u03b1", "human_argument": "The proof proves equality of the cobounded and cocompact filters in a metric setting. One direction turns bounded complements into compact containment data, and the other direction uses metric balls or closed balls to convert compact complements back into boundedness statements.", "lean_source": "theorem Metric.cobounded_eq_cocompact [ProperSpace \u03b1] : cobounded \u03b1 = cocompact \u03b1 := by\n  nontriviality \u03b1; inhabit \u03b1\n  exact cobounded_le_cocompact.antisymm <| (hasBasis_cobounded_compl_closedBall default).ge_iff.2\n    fun _ _ \u21a6 (isCompact_closedBall _ _).compl_mem_cocompact"}, "right": {"name": "Metric.closedBall_compl_subset_of_mem_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] {s : Set \u03b1},\n  s \u2208 Filter.cocompact \u03b1 \u2192 \u2200 (c : \u03b1), \u2203 r, (Metric.closedBall c r)\u1d9c \u2286 s", "human_argument": "The proof uses the definition of the cocompact filter and the fact that a closed ball is compact in the available metric context. If a set is eventually outside every compact set, then it is eventually outside the chosen closed ball.", "lean_source": "theorem closedBall_compl_subset_of_mem_cocompact {s : Set \u03b1} (hs : s \u2208 cocompact \u03b1) (c : \u03b1) :\n    \u2203 (r : \u211d), (Metric.closedBall c r)\u1d9c \u2286 s :=\n  IsCobounded.closedBall_compl_subset (cobounded_le_cocompact hs) c"}}, {"pair_id": "study_042", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "RegularSpace.of_hasBasis", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] {\u03b9 : X \u2192 Sort u_3} {p : (a : X) \u2192 \u03b9 a \u2192 Prop} {s : (a : X) \u2192 \u03b9 a \u2192 Set X},\n  (\u2200 (a : X), Filter.HasBasis (nhds a) (p a) (s a)) \u2192 (\u2200 (a : X) (i : \u03b9 a), p a i \u2192 IsClosed (s a i)) \u2192 RegularSpace X", "human_argument": "The proof shows regularity from a basis criterion: around each point and open neighborhood, it chooses a basis element whose closure stays inside the neighborhood. That local closed-neighborhood refinement is exactly what regularity needs.", "lean_source": "theorem RegularSpace.of_hasBasis {\u03b9 : X \u2192 Sort*} {p : \u2200 a, \u03b9 a \u2192 Prop} {s : \u2200 a, \u03b9 a \u2192 Set X}\n    (h\u2081 : \u2200 a, (\ud835\udcdd a).HasBasis (p a) (s a)) (h\u2082 : \u2200 a i, p a i \u2192 IsClosed (s a i)) :\n    RegularSpace X :=\n  .of_lift'_closure fun a => (h\u2081 a).lift'_closure_eq_self (h\u2082 a)"}, "right": {"name": "connectedComponent_eq_iInter_isClopen", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] [inst_2 : CompactSpace X] (x : X),\n  connectedComponent x = \u22c2 s, \u2191s", "human_argument": "The proof identifies the connected component of a point as the intersection of all clopen sets containing it. One inclusion uses that connected components cannot cross a clopen separation; the other uses compact Hausdorff zero-dimensional separation machinery to cut away every point outside the component by a clopen set.", "lean_source": "theorem connectedComponent_eq_iInter_isClopen [T2Space X] [CompactSpace X] (x : X) :\n    connectedComponent x = \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, s := by\n  apply Subset.antisymm connectedComponent_subset_iInter_isClopen\n  -- Reduce to showing that the clopen intersection is connected.\n  refine IsPreconnected.subset_connectedComponent ?_ (mem_iInter.2 fun s => s.2.2)\n  -- We do this by showing that any disjoint cover by two closed sets implies\n  -- that one of these closed sets must contain our whole thing.\n  -- To reduce to the case where the cover is disjoint on all of `X` we need that `s` is closed\n  have hs : @IsClosed X _ (\u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, s) :=\n    isClosed_iInter fun s => s.2.1.1\n  rw [isPreconnected_iff_subset_of_fully_disjoint_closed hs]\n  intro a b ha hb hab ab_disj\n  -- Since our space is normal, we get two larger disjoint open sets containing the disjoint\n  -- closed sets. If we can show that our intersection is a subset of any of these we can then\n  -- \"descend\" this to show that it is a subset of either a or b.\n  rcases normal_separation ha hb ab_disj with \u27e8u, v, hu, hv, hau, hbv, huv\u27e9\n  obtain \u27e8s, H\u27e9 : \u2203 s : Set X, IsClopen s \u2227 x \u2208 s \u2227 s \u2286 u \u222a v := by\n    /- Now we find a clopen set `s` around `x`, contained in `u \u222a v`. We utilize the fact that\n    `X \\ u \u222a v` will be compact, so there must be some finite intersection of clopen neighbourhoods\n    of `X` disjoint to it, but a finite intersection of clopen sets is clopen,\n    so we let this be our `s`. -/\n    have H1 := (hu.union hv).isClosed_compl.isCompact.inter_iInter_nonempty\n      (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s) fun s => s.2.1.1\n    rw [\u2190 not_disjoint_iff_nonempty_inter, imp_not_comm, not_forall] at H1\n    obtain \u27e8si, H2\u27e9 :=\n      H1 (disjoint_compl_left_iff_subset.2 <| hab.trans <| union_subset_union hau hbv)\n    refine \u27e8\u22c2 U \u2208 si, Subtype.val U, ?_, ?_, ?_\u27e9\n    \u00b7 exact isClopen_biInter_finset fun s _ => s.2.1\n    \u00b7 exact mem_iInter\u2082.2 fun s _ => s.2.2\n    \u00b7 rwa [\u2190 disjoint_compl_left_iff_subset, disjoint_iff_inter_eq_empty,\n        \u2190 not_nonempty_iff_eq_empty]\n  -- So, we get a disjoint decomposition `s = s \u2229 u \u222a s \u2229 v` of clopen sets. The intersection of all\n  -- clopen neighbourhoods will then lie in whichever of u or v x lies in and hence will be a subset\n  -- of either a or b.\n  \u00b7 have H1 := isClopen_inter_of_disjoint_cover_clopen H.1 H.2.2 hu hv huv\n    rw [union_comm] at H\n    have H2 := isClopen_inter_of_disjoint_cover_clopen H.1 H.2.2 hv hu huv.symm\n    by_cases hxu : x \u2208 u <;> [left; right]\n    -- The x \u2208 u case.\n    \u00b7 suffices \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, \u2191s \u2286 u\n        from Disjoint.left_le_of_le_sup_right hab (huv.mono this hbv)\n      \u00b7 apply Subset.trans _ s.inter_subset_right\n        exact iInter_subset (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s.1)\n          \u27e8s \u2229 u, H1, mem_inter H.2.1 hxu\u27e9\n    -- If x \u2209 u, we get x \u2208 v since x \u2208 u \u222a v. The rest is then like the x \u2208 u case.\n    \u00b7 have h1 : x \u2208 v :=\n        (hab.trans (union_subset_union hau hbv) (mem_iInter.2 fun i => i.2.2)).resolve_left hxu\n      suffices \u22c2 s : { s : Set X // IsClopen s \u2227 x \u2208 s }, \u2191s \u2286 v\n        from (huv.symm.mono this hau).left_le_of_le_sup_left hab\n      \u00b7 refine Subset.trans ?_ s.inter_subset_right\n        exact iInter_subset (fun s : { s : Set X // IsClopen s \u2227 x \u2208 s } => s.1)\n          \u27e8s \u2229 v, H2, mem_inter H.2.1 h1\u27e9\n\n/-- `ConnectedComponents X` is Hausdorff when `X` is Hausdorff and compact -/\n@[stacks 0900 \"The Stacks entry proves profiniteness.\"]"}}, {"pair_id": "study_043", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Finite.isCompact_closure", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R0Space X] {s : Set X}, Set.Finite s \u2192 IsCompact (closure s)", "human_argument": "Work with the bornology on X whose bounded sets are exactly the relatively compact subsets. By the definition of a bornology finite sets are bounded, so s is bounded for this bornology. For this particular bornology one has the equivalence \u201ca set is bounded iff its closure is compact,\u201d hence closure s is compact.", "lean_source": "theorem Set.Finite.isCompact_closure {s : Set X} (hs : s.Finite) : IsCompact (closure s) :=\n  let _ : Bornology X := .relativelyCompact X\n  Bornology.relativelyCompact.isBounded_iff.1 hs.isBounded\n\nend R0Space\n\n/-- A T\u2081 space, also known as a Fr\u00e9chet space, is a topological space\n  where every singleton set is closed. Equivalently, for every pair\n  `x \u2260 y`, there is an open set containing `x` and not `y`. -/"}, "right": {"name": "Set.Infinite.exists_accPt_cofinite_inf_principal", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : CompactSpace X],\n  Set.Infinite s \u2192 \u2203 x, AccPt x (Filter.cofinite \u2293 Filter.principal s)", "human_argument": "Let X be compact and s an infinite subset. Since the whole space is compact and s \u2286 X, we may apply the general fact that any infinite subset of a compact set has an accumulation point for the filter given by the meet of the cofinite filter and the principal filter of s. Hence there exists x which is an accumulation point of the filter cofinite \u2227 principal(s).", "lean_source": "lemma Set.Infinite.exists_accPt_cofinite_inf_principal [CompactSpace X] (hs : s.Infinite) :\n    \u2203 x, AccPt x (cofinite \u2293 \ud835\udcdf s) := by\n  simpa only [mem_univ, true_and]\n    using hs.exists_accPt_cofinite_inf_principal_of_subset_isCompact isCompact_univ s.subset_univ"}}, {"pair_id": "study_044", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_singleton", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {x : X}, IsLindelof {x}", "human_argument": "Let X be a topological space and x \u2208 X, and let {U_i}_{i\u2208I} be an open cover of the singleton {x}. Since {x} \u2286 \u22c3_{i\u2208I} U_i, there exists some index i0 with x \u2208 U_{i0}. The one-element subfamily {U_{i0}} already covers {x}, so {x} admits a countable (indeed finite) subcover and hence is Lindel\u00f6f.", "lean_source": "theorem isLindelof_singleton {x : X} : IsLindelof ({x} : Set X) := fun _ hf _ hfa \u21a6\n  \u27e8x, rfl, ClusterPt.of_le_nhds'\n    (hfa.trans <| by simpa only [principal_singleton] using pure_le_nhds x) hf\u27e9"}, "right": {"name": "Set.InjOn.exists_isOpen_superset", "statement": "\u2200 {X : Type u_3} {Y : Type u_4} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : T2Space Y]\n  {f : X \u2192 Y} {s : Set X},\n  Set.InjOn f s \u2192\n    IsCompact s \u2192\n      (\u2200 x \u2208 s, ContinuousAt f x) \u2192 (\u2200 x \u2208 s, \u2203 u \u2208 nhds x, Set.InjOn f u) \u2192 \u2203 t, IsOpen t \u2227 s \u2286 t \u2227 Set.InjOn f t", "human_argument": "From the hypotheses one obtains a set T which belongs to the neighbourhood filter of s and on which f is injective. By the characterization of being a neighbourhood of a set, T therefore contains an open set U with s \u2286 U \u2286 T. Restricting injectivity from T to the subset U shows that f is injective on U. Hence U is an open superset of s on which f is injective.", "lean_source": "theorem Set.InjOn.exists_isOpen_superset {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y]\n    [T2Space Y] {f : X \u2192 Y} {s : Set X} (inj : InjOn f s) (sc : IsCompact s)\n    (fc : \u2200 x \u2208 s, ContinuousAt f x) (loc : \u2200 x \u2208 s, \u2203 u \u2208 \ud835\udcdd x, InjOn f u) :\n    \u2203 t, IsOpen t \u2227 s \u2286 t \u2227 InjOn f t :=\n  let \u27e8_t, hst, ht\u27e9 := inj.exists_mem_nhdsSet sc fc loc\n  let \u27e8u, huo, hsu, hut\u27e9 := mem_nhdsSet_iff_exists.1 hst\n  \u27e8u, huo, hsu, ht.mono hut\u27e9\n\nsection limUnder\n\nvariable [T2Space X] {f : Filter X}\n\n/-!\n### Properties of `lim` and `limUnder`\n\nIn this section we use explicit `Nonempty X` instances for `lim` and `limUnder`. This way the lemmas\nare useful without a `Nonempty X` instance.\n-/"}}, {"pair_id": "study_045", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "separatedNhds_of_isCompact_isClosed", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : RegularSpace X] {s t : Set X},\n  IsCompact s \u2192 IsClosed t \u2192 Disjoint s t \u2192 SeparatedNhds s t", "human_argument": "Let x \u2208 s. Since t is closed and x \u2209 t, regularity gives an open neighborhood U_x of x whose closure is disjoint from t. The family {U_x : x \u2208 s} covers s, so by compactness pick a finite subcover and let U be the union of those finitely many U_x; then cl(U) is the union of the finitely many cl(U_x) and hence disjoint from t. Therefore V := X \\ cl(U) is an open set containing t, and U and V are disjoint open neighborhoods of s and t, i.e. s and t have separated neighborhoods.", "lean_source": "lemma SeparatedNhds.of_isCompact_isClosed {s t : Set X}\n    (hs : IsCompact s) (ht : IsClosed t) (hst : Disjoint s t) : SeparatedNhds s t := by\n  simpa only [separatedNhds_iff_disjoint, hs.disjoint_nhdsSet_left, disjoint_nhds_nhdsSet,\n    ht.closure_eq, disjoint_left] using hst\n\nend\n\n/-- This technique to witness `HasSeparatingCover` in regular Lindel\u00f6f topological spaces\nwill be used to prove regular Lindel\u00f6f spaces are normal. -/"}, "right": {"name": "isCompact_closure_singleton", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R0Space X] {x : X}, IsCompact (closure {x})", "human_argument": "Let {U_i} be an open cover of cl{x}. Since x \u2208 cl{x}, some U_i contains x. For any y \u2208 cl{x}, the R0 hypothesis makes the specialization relation symmetric, so from y \u2208 cl{x} we get that x specializes to y; but if x specializes to y and U is open with x \u2208 U, then y \u2208 U. Applying this to U_i shows every y \u2208 cl{x} lies in U_i, hence {U_i} already covers cl{x}. Thus every open cover has a finite subcover (a singleton), so cl{x} is compact.", "lean_source": "theorem isCompact_closure_singleton : IsCompact (closure {x}) := by\n  refine isCompact_of_finite_subcover fun U hUo hxU \u21a6 ?_\n  obtain \u27e8i, hi\u27e9 : \u2203 i, x \u2208 U i := mem_iUnion.1 <| hxU <| subset_closure rfl\n  refine \u27e8{i}, fun y hy \u21a6 ?_\u27e9\n  rw [\u2190 specializes_iff_mem_closure, specializes_comm] at hy\n  simpa using hy.mem_open (hUo i) hi"}}, {"pair_id": "study_046", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Inducing.isCompact_preimage'", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Inducing f \u2192 \u2200 {K : Set Y}, IsCompact K \u2192 K \u2286 Set.range f \u2192 IsCompact (f \u207b\u00b9' K)", "human_argument": "The proof uses an inducing map to identify the topology on the source with the topology pulled back from the target. Under that identification, compactness of a target set transfers to compactness of the corresponding preimage.", "lean_source": "lemma Topology.IsInducing.isCompact_preimage' (hf : IsInducing f) {K : Set Y}\n    (hK : IsCompact K) (Kf : K \u2286 range f) : IsCompact (f \u207b\u00b9' K) :=\n  (hf.isCompact_preimage_iff Kf).2 hK\n\n/-- The preimage of a compact set under a closed embedding is a compact set. -/"}, "right": {"name": "Inducing.isSigmaCompact_iff", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y} {s : Set X},\n  Inducing f \u2192 (IsSigmaCompact s \u2194 IsSigmaCompact (f '' s))", "human_argument": "The proof proves both directions of a sigma-compactness equivalence. It transports countable compact covers across an inducing map, converting compact pieces in one space into compact preimages or images in the other and reassembling the countable union.", "lean_source": "lemma Topology.IsInducing.isSigmaCompact_iff {f : X \u2192 Y} {s : Set X}\n    (hf : IsInducing f) : IsSigmaCompact s \u2194 IsSigmaCompact (f '' s) := by\n  constructor\n  \u00b7 exact fun h \u21a6 h.image hf.continuous\n  \u00b7 rintro \u27e8L, hcomp, hcov\u27e9\n    -- Suppose f(s) is \u03c3-compact; we want to show s is \u03c3-compact.\n    -- Write f(s) as a union of compact sets L n, so s = \u22c3 K n with K n := f\u207b\u00b9(L n) \u2229 s.\n    -- Since f is inducing, each K n is compact iff L n is.\n    refine \u27e8fun n \u21a6 f \u207b\u00b9' (L n) \u2229 s, ?_, ?_\u27e9\n    \u00b7 intro n\n      have : f '' (f \u207b\u00b9' (L n) \u2229 s) = L n := by\n        rw [image_preimage_inter, inter_eq_left.mpr]\n        exact (subset_iUnion _ n).trans hcov.le\n      apply hf.isCompact_iff.mpr (this.symm \u25b8 (hcomp n))\n    \u00b7 calc \u22c3 n, f \u207b\u00b9' L n \u2229 s\n        _ = f \u207b\u00b9' (\u22c3 n, L n) \u2229 s := by rw [preimage_iUnion, iUnion_inter]\n        _ = f \u207b\u00b9' (f '' s) \u2229 s := by rw [hcov]\n        _ = s := inter_eq_right.mpr (subset_preimage_image _ _)\n\n/-- If `f : X \u2192 Y` is an embedding, the image `f '' s` of a set `s` is \u03c3-compact\nif and only `s` is \u03c3-compact. -/"}}, {"pair_id": "study_047", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.cobounded_eq_cocompact", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] [inst_1 : ProperSpace \u03b1], Bornology.cobounded \u03b1 = Filter.cocompact \u03b1", "human_argument": "The proof proves equality of the cobounded and cocompact filters in a metric setting. One direction turns bounded complements into compact containment data, and the other direction uses metric balls or closed balls to convert compact complements back into boundedness statements.", "lean_source": "theorem Metric.cobounded_eq_cocompact [ProperSpace \u03b1] : cobounded \u03b1 = cocompact \u03b1 := by\n  nontriviality \u03b1; inhabit \u03b1\n  exact cobounded_le_cocompact.antisymm <| (hasBasis_cobounded_compl_closedBall default).ge_iff.2\n    fun _ _ \u21a6 (isCompact_closedBall _ _).compl_mem_cocompact"}, "right": {"name": "HereditarilyLindelof_LindelofSets", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] [inst_1 : HereditarilyLindelofSpace X] (s : Set X), IsLindelof s", "human_argument": "Let X be hereditarily Lindel\u00f6f and let s \u2286 X. By hypothesis the whole space (the universal subset) carries the hereditary Lindel\u00f6f property, so every subset of the universe is Lindel\u00f6f. In particular, since s \u2286 univ, s is Lindel\u00f6f.", "lean_source": "theorem HereditarilyLindelofSpace.isLindelof [HereditarilyLindelofSpace X] (s : Set X) :\n    IsLindelof s := by\n  apply HereditarilyLindelofSpace.isHereditarilyLindelof_univ\n  exact subset_univ s\n\n@[deprecated (since := \"2026-01-12\")]"}}, {"pair_id": "study_048", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "exists_mem_nhds_isCompact_mapsTo_of_isCompact_mem_nhds", "statement": "\u2200 {X : Type u_3} {Y : Type u_4} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] [inst_2 : R1Space Y]\n  {f : X \u2192 Y} {x : X} {K : Set X} {s : Set Y},\n  Continuous f \u2192 s \u2208 nhds (f x) \u2192 IsCompact K \u2192 K \u2208 nhds x \u2192 \u2203 K \u2208 nhds x, IsCompact K \u2227 Set.MapsTo f K s", "human_argument": "Let A := f[K] \\ interior(s). Since f[K] is compact and interior(s) is open, A is compact. Because A is compact and {f x} is a singleton, we can find disjoint open neighborhoods U of f x and V of A. By continuity the preimage f^{-1}(U) is a neighborhood of x, and f^{-1}(U) \u2229 K is therefore a neighborhood of x contained in K \\ f^{-1}(V), so K \\ f^{-1}(V) is a neighborhood of x; it is compact because it is K minus the open set f^{-1}(V). Finally, if y \u2208 K \\ f^{-1}(V) had f(y) \u2209 s then f(y) \u2208 A \u2286 V, contradicting y \u2209 f^{-1}(V); hence f[K \\ f^{-1}(V)] \u2286 s. Thus L := K \\ f^{-1}(V) is the required compact neighborhood of x with f[L] \u2286 s.", "lean_source": "theorem exists_mem_nhds_isCompact_mapsTo_of_isCompact_mem_nhds\n    {X Y : Type*} [TopologicalSpace X] [TopologicalSpace Y] [R1Space Y] {f : X \u2192 Y} {x : X}\n    {K : Set X} {s : Set Y} (hf : Continuous f) (hs : s \u2208 \ud835\udcdd (f x)) (hKc : IsCompact K)\n    (hKx : K \u2208 \ud835\udcdd x) : \u2203 L \u2208 \ud835\udcdd x, IsCompact L \u2227 MapsTo f L s := by\n  have hc : IsCompact (f '' K \\ interior s) := (hKc.image hf).diff isOpen_interior\n  obtain \u27e8U, V, Uo, Vo, hxU, hV, hd\u27e9 : SeparatedNhds {f x} (f '' K \\ interior s) := by\n    simp_rw [separatedNhds_iff_disjoint, nhdsSet_singleton, hc.disjoint_nhdsSet_right,\n      disjoint_nhds_nhds_iff_not_inseparable]\n    rintro y \u27e8-, hys\u27e9 hxy\n    refine hys <| (hxy.mem_open_iff isOpen_interior).1 ?_\n    rwa [mem_interior_iff_mem_nhds]\n  refine \u27e8K \\ f \u207b\u00b9' V, sdiff_mem hKx ?_, hKc.diff <| Vo.preimage hf, fun y hy \u21a6 ?_\u27e9\n  \u00b7 filter_upwards [hf.continuousAt <| Uo.mem_nhds (hxU rfl)] with x hx\n      using Set.disjoint_left.1 hd hx\n  \u00b7 by_contra hys\n    exact hy.2 (hV \u27e8mem_image_of_mem _ hy.1, notMem_subset interior_subset hys\u27e9)"}, "right": {"name": "ClosedEmbedding.tendsto_coLindelof", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  ClosedEmbedding f \u2192 Filter.Tendsto f (Filter.coLindelof X) (Filter.coLindelof Y)", "human_argument": "The co-Lindel\u00f6f filter on a space has a basis given by complements of Lindel\u00f6f subsets. To prove f sends the co-Lindel\u00f6f filter of X to that of Y, it suffices to check that for every Lindel\u00f6f set K in Y the preimage of its complement lies in the co-Lindel\u00f6f filter on X. But a closed embedding has the property that the preimage of any Lindel\u00f6f subset of Y is Lindel\u00f6f in X, so the complement of that preimage is a basic neighborhood of the co-Lindel\u00f6f filter on X. Hence the inverse image under f of every basic set of the co-Lindel\u00f6f filter on Y belongs to the co-Lindel\u00f6f filter on X, i.e. f tends to the co-Lindel\u00f6f filter.", "lean_source": "theorem Topology.IsClosedEmbedding.tendsto_coLindelof {f : X \u2192 Y} (hf : IsClosedEmbedding f) :\n    Tendsto f (Filter.coLindelof X) (Filter.coLindelof Y) :=\n  hasBasis_coLindelof.tendsto_right_iff.mpr fun _K hK =>\n    (hf.isLindelof_preimage hK).compl_mem_coLindelof\n\n/-- Sets of subtype are Lindel\u00f6f iff the image under a coercion is. -/"}}, {"pair_id": "study_049", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "DilationEquiv.toHomeomorph_symm", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : PseudoEMetricSpace X] [inst_1 : PseudoEMetricSpace Y] (e : X \u2243\u1d48 Y),\n  Homeomorph.symm (DilationEquiv.toHomeomorph e) = DilationEquiv.toHomeomorph (DilationEquiv.symm e)", "human_argument": "The proof is structural: a dilation equivalence already gives a homeomorphism, and the inverse homeomorphism is obtained by applying the same construction to the inverse equivalence.", "lean_source": "lemma toHomeomorph_symm (e : X \u2243\u1d48 Y) : e.symm.toHomeomorph = e.toHomeomorph.symm :=\n  rfl\n\n@[simp]"}, "right": {"name": "DilationEquiv.map_cobounded", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} {F : Type u_3} [inst : PseudoMetricSpace X] [inst_1 : PseudoMetricSpace Y]\n  [inst_2 : DilationEquivClass F X Y] (e : F), Filter.map (\u21d1e) (Bornology.cobounded X) = Bornology.cobounded Y", "human_argument": "The proof shows that a dilation equivalence preserves the cobounded filter. It uses the metric scaling control to send bounded sets to bounded sets and then lifts that boundedness preservation to a statement about the filter at infinity.", "lean_source": "lemma map_cobounded (e : F) : map e (cobounded X) = cobounded Y := by\n  rw [\u2190 Dilation.comap_cobounded e, map_comap_of_surjective (EquivLike.surjective e)]\n\nend PseudoMetricSpace\n\nend DilationEquiv"}}, {"pair_id": "study_050", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.closure", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : WeaklyLocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K : Set X}, IsCompact K \u2192 IsCompact (closure K)", "human_argument": "The proof uses the Hausdorff separation fact that compact sets are closed, or equivalently that the closure of a compact set does not add new noncompact behavior. Once the closure is controlled by the compact set, compactness transfers to the closure.", "lean_source": "protected theorem IsCompact.closure {K : Set X} (hK : IsCompact K) : IsCompact (closure K) := by\n  refine isCompact_of_finite_subcover fun U hUo hKU \u21a6 ?_\n  rcases hK.elim_finite_subcover U hUo (subset_closure.trans hKU) with \u27e8t, ht\u27e9\n  exact \u27e8t, hK.closure_subset_of_isOpen (isOpen_biUnion fun _ _ \u21a6 hUo _) ht\u27e9"}, "right": {"name": "IsClosed.isLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} [inst_1 : LindelofSpace X], IsClosed s \u2192 IsLindelof s", "human_argument": "The proof extends an open cover of a closed subset to a cover of the ambient Lindelof set by adding the open complement. After taking a countable subcover, it removes the complement piece and obtains a countable cover of the closed subset.", "lean_source": "theorem IsClosed.isLindelof [LindelofSpace X] (h : IsClosed s) : IsLindelof s :=\n  isLindelof_univ.of_isClosed_subset h (subset_univ _)\n\n/-- A compact set `s` is Lindel\u00f6f. -/"}}, {"pair_id": "study_051", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsHereditarilyLindelof.isLindelof_subset", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsHereditarilyLindelof s \u2192 t \u2286 s \u2192 IsLindelof t", "human_argument": "If s is hereditarily Lindel\u00f6f then by definition every subset of s is Lindel\u00f6f. Since t \u2286 s, t is one of those subsets. Hence t is Lindel\u00f6f.", "lean_source": "lemma IsHereditarilyLindelof.isLindelof_subset (hs : IsHereditarilyLindelof s) (ht : t \u2286 s) :\n    IsLindelof t := hs t ht"}, "right": {"name": "Tendsto.isLindelof_insert_range_of_coLindelof", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y} {y : Y},\n  Filter.Tendsto f (Filter.coLindelof X) (nhds y) \u2192 Continuous f \u2192 IsLindelof (insert y (Set.range f))", "human_argument": "The proof studies the range of a sequence or net together with a limiting point. It uses the convergence behavior to control the tail of the range and combines that with co-Lindelof information to show the inserted range remains Lindelof.", "lean_source": "theorem Tendsto.isLindelof_insert_range_of_coLindelof {f : X \u2192 Y} {y}\n    (hf : Tendsto f (coLindelof X) (\ud835\udcdd y)) (hfc : Continuous f) :\n    IsLindelof (insert y (range f)) := by\n  intro l hne _ hle\n  by_cases hy : ClusterPt y l\n  \u00b7 exact \u27e8y, Or.inl rfl, hy\u27e9\n  simp only [clusterPt_iff_nonempty, not_forall, \u2190 not_disjoint_iff_nonempty_inter, not_not] at hy\n  rcases hy with \u27e8s, hsy, t, htl, hd\u27e9\n  rcases mem_coLindelof.1 (hf hsy) with \u27e8K, hKc, hKs\u27e9\n  have : f '' K \u2208 l := by\n    filter_upwards [htl, le_principal_iff.1 hle] with y hyt hyf\n    rcases hyf with (rfl | \u27e8x, rfl\u27e9)\n    exacts [(hd.le_bot \u27e8mem_of_mem_nhds hsy, hyt\u27e9).elim,\n      mem_image_of_mem _ (not_not.1 fun hxK => hd.le_bot \u27e8hKs hxK, hyt\u27e9)]\n  rcases hKc.image hfc (le_principal_iff.2 this) with \u27e8y, hy, hyl\u27e9\n  exact \u27e8y, Or.inr <| image_subset_range _ _ hy, hyl\u27e9\n\n/-- `Filter.coclosedLindelof` is the filter generated by complements to closed Lindelof sets. -/"}}, {"pair_id": "study_052", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Set.Infinite.exists_accPt_cofinite_inf_principal_of_subset_isCompact", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s K : Set X},\n  Set.Infinite s \u2192 IsCompact K \u2192 s \u2286 K \u2192 \u2203 x \u2208 K, AccPt x (Filter.cofinite \u2293 Filter.principal s)", "human_argument": "The proof turns an infinite subset of a compact set into a cofinite filter on that subset. It then uses compactness to extract a cluster point and checks that the filter really sees infinitely many points from the subset, giving an accumulation point.", "lean_source": "lemma Set.Infinite.exists_accPt_cofinite_inf_principal_of_subset_isCompact\n    {K : Set X} (hs : s.Infinite) (hK : IsCompact K) (hsub : s \u2286 K) :\n    \u2203 x \u2208 K, AccPt x (cofinite \u2293 \ud835\udcdf s) :=\n  (@hK _ hs.cofinite_inf_principal_neBot (inf_le_right.trans <| principal_mono.2 hsub)).imp\n    fun x hx \u21a6 by rwa [accPt_iff_clusterPt, inf_comm, inf_right_comm,\n      (finite_singleton _).cofinite_inf_principal_compl]"}, "right": {"name": "IsCompact.exists_clusterPt", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {f : Filter X} [inst_1 : Filter.NeBot f], f \u2264 Filter.principal s \u2192 \u2203 x \u2208 s, ClusterPt x f", "human_argument": "The proof applies compactness to a filter that is forced to live inside the compact set. Compactness gives a cluster point, and the principal-set bound shows that the cluster point lies in the original set.", "lean_source": "lemma IsCompact.exists_clusterPt (hs : IsCompact s) {f : Filter X} [NeBot f] (hf : f \u2264 \ud835\udcdf s) :\n    \u2203 x \u2208 s, ClusterPt x f := hs hf"}}, {"pair_id": "study_053", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Inducing.isSigmaCompact_iff", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y} {s : Set X},\n  Inducing f \u2192 (IsSigmaCompact s \u2194 IsSigmaCompact (f '' s))", "human_argument": "The proof proves both directions of a sigma-compactness equivalence. It transports countable compact covers across an inducing map, converting compact pieces in one space into compact preimages or images in the other and reassembling the countable union.", "lean_source": "lemma Topology.IsInducing.isSigmaCompact_iff {f : X \u2192 Y} {s : Set X}\n    (hf : IsInducing f) : IsSigmaCompact s \u2194 IsSigmaCompact (f '' s) := by\n  constructor\n  \u00b7 exact fun h \u21a6 h.image hf.continuous\n  \u00b7 rintro \u27e8L, hcomp, hcov\u27e9\n    -- Suppose f(s) is \u03c3-compact; we want to show s is \u03c3-compact.\n    -- Write f(s) as a union of compact sets L n, so s = \u22c3 K n with K n := f\u207b\u00b9(L n) \u2229 s.\n    -- Since f is inducing, each K n is compact iff L n is.\n    refine \u27e8fun n \u21a6 f \u207b\u00b9' (L n) \u2229 s, ?_, ?_\u27e9\n    \u00b7 intro n\n      have : f '' (f \u207b\u00b9' (L n) \u2229 s) = L n := by\n        rw [image_preimage_inter, inter_eq_left.mpr]\n        exact (subset_iUnion _ n).trans hcov.le\n      apply hf.isCompact_iff.mpr (this.symm \u25b8 (hcomp n))\n    \u00b7 calc \u22c3 n, f \u207b\u00b9' L n \u2229 s\n        _ = f \u207b\u00b9' (\u22c3 n, L n) \u2229 s := by rw [preimage_iUnion, iUnion_inter]\n        _ = f \u207b\u00b9' (f '' s) \u2229 s := by rw [hcov]\n        _ = s := inter_eq_right.mpr (subset_preimage_image _ _)\n\n/-- If `f : X \u2192 Y` is an embedding, the image `f '' s` of a set `s` is \u03c3-compact\nif and only `s` is \u03c3-compact. -/"}, "right": {"name": "Inducing.isCompact_preimage'", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Inducing f \u2192 \u2200 {K : Set Y}, IsCompact K \u2192 K \u2286 Set.range f \u2192 IsCompact (f \u207b\u00b9' K)", "human_argument": "The proof uses an inducing map to identify the topology on the source with the topology pulled back from the target. Under that identification, compactness of a target set transfers to compactness of the corresponding preimage.", "lean_source": "lemma Topology.IsInducing.isCompact_preimage' (hf : IsInducing f) {K : Set Y}\n    (hK : IsCompact K) (Kf : K \u2286 range f) : IsCompact (f \u207b\u00b9' K) :=\n  (hf.isCompact_preimage_iff Kf).2 hK\n\n/-- The preimage of a compact set under a closed embedding is a compact set. -/"}}, {"pair_id": "study_054", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "SigmaCompactSpace_iff_exists_compact_covering", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X],\n  SigmaCompactSpace X \u2194 \u2203 K, (\u2200 (n : \u2115), IsCompact (K n)) \u2227 \u22c3 n, K n = Set.univ", "human_argument": "By definition, X is \u03c3-compact exactly when the whole space is a \u03c3-compact set. Unwinding the definition of \"is \u03c3-compact\" for a set A, it means there exists a sequence K : \u2115 \u2192 Set X of compact subsets whose union equals A. Applying this to A = X (or A = univ) yields the desired equivalence: X is \u03c3-compact iff there exists K with each K n compact and \u22c3\u2099 K n = univ.", "lean_source": "lemma SigmaCompactSpace_iff_exists_compact_covering :\n    SigmaCompactSpace X \u2194 \u2203 K : \u2115 \u2192 Set X, (\u2200 n, IsCompact (K n)) \u2227 \u22c3 n, K n = univ := by\n  rw [\u2190 isSigmaCompact_univ_iff, IsSigmaCompact]"}, "right": {"name": "Pi.isCompact_closure_iff", "statement": "\u2200 {\u03b9 : Type u_4} {\u03c0 : \u03b9 \u2192 Type u_5} [inst : (i : \u03b9) \u2192 TopologicalSpace (\u03c0 i)] [inst_1 : \u2200 (i : \u03b9), T2Space (\u03c0 i)]\n  {s : Set ((i : \u03b9) \u2192 \u03c0 i)}, IsCompact (closure s) \u2194 \u2200 (i : \u03b9), IsCompact (closure (Function.eval i '' s))", "human_argument": "Closure(s) is compact exactly when there exists a compact superset of s, so it suffices to characterize when s sits inside some compact subset of the product. In a product of Hausdorff spaces, s is contained in a product \u220f K_i of compact sets K_i if and only if for each i the projection of s to the i-th factor is contained in K_i, i.e. the image of s under the i-th projection is a subset of K_i. Hence if closure(s) is compact then each projection closure is contained in some compact K_i and so is compact; conversely, if every projection closure is compact then taking K_i = closure(projection_i(s)) gives a product \u220f K_i which is compact and contains s, so closure(s) is compact.", "lean_source": "lemma Pi.isCompact_closure_iff {\u03b9 : Type*} {X : \u03b9 \u2192 Type*} [\u2200 i, TopologicalSpace (X i)]\n    [\u2200 i, R1Space (X i)] {s : Set (\u03a0 i, X i)} :\n    IsCompact (closure s) \u2194 \u2200 i, IsCompact (closure <| eval i '' s) := by\n  simp_rw [\u2190 exists_isCompact_superset_iff, Pi.exists_compact_superset_iff, image_subset_iff]\n\n/-- If `V : \u03b9 \u2192 Set X` is a decreasing family of compact sets then any neighborhood of\n`\u22c2 i, V i` contains some `V i`. This is a version of `exists_subset_nhds_of_isCompact'` where we\ndon't need to assume each `V i` closed because it follows from compactness since `X` is\nassumed to be Hausdorff. -/"}}, {"pair_id": "study_055", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "DilationEquiv.toHomeomorph_symm", "statement": "\u2200 {X : Type u_1} {Y : Type u_2} [inst : PseudoEMetricSpace X] [inst_1 : PseudoEMetricSpace Y] (e : X \u2243\u1d48 Y),\n  Homeomorph.symm (DilationEquiv.toHomeomorph e) = DilationEquiv.toHomeomorph (DilationEquiv.symm e)", "human_argument": "The proof is structural: a dilation equivalence already gives a homeomorphism, and the inverse homeomorphism is obtained by applying the same construction to the inverse equivalence.", "lean_source": "lemma toHomeomorph_symm (e : X \u2243\u1d48 Y) : e.symm.toHomeomorph = e.toHomeomorph.symm :=\n  rfl\n\n@[simp]"}, "right": {"name": "Inducing.isLindelof_preimage", "statement": "\u2200 {X : Type u} {Y : Type v} [inst : TopologicalSpace X] [inst_1 : TopologicalSpace Y] {f : X \u2192 Y},\n  Inducing f \u2192 IsClosed (Set.range f) \u2192 \u2200 {K : Set Y}, IsLindelof K \u2192 IsLindelof (f \u207b\u00b9' K)", "human_argument": "Since f is inducing, the map f: X \u2192 range(f) is a homeomorphism onto its image, so f restricts to a homeomorphism between f\u207b\u00b9(K) and K \u2229 range(f). Hence f\u207b\u00b9(K) is Lindel\u00f6f iff K \u2229 range(f) is. Because range(f) is closed, K \u2229 range(f) is a closed subspace of the Lindel\u00f6f space K, and therefore is Lindel\u00f6f. Consequently f\u207b\u00b9(K) is Lindel\u00f6f.", "lean_source": "theorem Topology.IsInducing.isLindelof_preimage {f : X \u2192 Y} (hf : IsInducing f)\n    (hf' : IsClosed (range f)) {K : Set Y} (hK : IsLindelof K) : IsLindelof (f \u207b\u00b9' K) := by\n  replace hK := hK.inter_right hf'\n  rwa [hf.isLindelof_iff, image_preimage_eq_inter_range]\n\n/-- The preimage of a Lindel\u00f6f set under a closed embedding is a Lindel\u00f6f set. -/"}}, {"pair_id": "study_056", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.diff", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s t : Set X}, IsLindelof s \u2192 IsOpen t \u2192 IsLindelof (s \\ t)", "human_argument": "Since t is open its complement X \\ t is closed, and s \\ t = s \u2229 (X \\ t). Thus s \\ t is a closed subset of s. A closed subset of a Lindel\u00f6f set is Lindel\u00f6f, so s \\ t is Lindel\u00f6f.", "lean_source": "theorem IsLindelof.diff (hs : IsLindelof s) (ht : IsOpen t) : IsLindelof (s \\ t) :=\n  hs.inter_right (isClosed_compl_iff.mpr ht)\n\n/-- A closed subset of a Lindel\u00f6f set is a Lindel\u00f6f set. -/"}, "right": {"name": "SeparationQuotient.dist_mk", "statement": "\u2200 {\u03b1 : Type u} [inst : PseudoMetricSpace \u03b1] (p q : \u03b1),\n  dist (SeparationQuotient.mk p) (SeparationQuotient.mk q) = dist p q", "human_argument": "The distance on the separation quotient is defined by passing to representatives: the distance between the class of p and the class of q is by definition the distance between p and q in the original space. Hence dist(class p, class q) = dist(p,q) immediately. In particular the quotient map sending a point to its class is an isometric embedding.", "lean_source": "theorem SeparationQuotient.dist_mk {\u03b1 : Type u} [PseudoMetricSpace \u03b1] (p q : \u03b1) :\n    dist (mk p) (mk q) = dist p q :=\n  rfl"}}, {"pair_id": "study_057", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "exists_compact_closed_between", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : LocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K U : Set X},\n  IsCompact K \u2192 IsOpen U \u2192 K \u2286 U \u2192 \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U", "human_argument": "The proof uses local compactness to thicken each point of a compact set inside the given open set by a compact neighborhood. A finite compact subcover is chosen, then combined and closed so that it still sits inside the open set while the original compact set lies in its interior.", "lean_source": "theorem exists_compact_closed_between [LocallyCompactSpace X] [RegularSpace X]\n    {K U : Set X} (hK : IsCompact K) (hU : IsOpen U) (h_KU : K \u2286 U) :\n    \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U :=\n  let \u27e8L, L_comp, KL, LU\u27e9 := exists_compact_between hK hU h_KU\n  \u27e8closure L, L_comp.closure, isClosed_closure, KL.trans <| interior_mono subset_closure,\n    L_comp.closure_subset_of_isOpen hU LU\u27e9\n\n/-- In a (possibly non-Hausdorff) locally compact regular space, for every compact set `K`,\n`\ud835\udcdd\u02e2 K` has a basis consisting of closed compact sets. -/"}, "right": {"name": "IsCompact.elim_nhds_subcover_nhdsSet", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {U : X \u2192 Set X}, (\u2200 x \u2208 s, U x \u2208 nhds x) \u2192 \u2203 t, (\u2200 x \u2208 t, x \u2208 s) \u2227 \u22c3 x \u2208 t, U x \u2208 nhdsSet s", "human_argument": "The proof starts with compactness and an open-neighborhood assignment around the compact set. Compactness extracts finitely many of those neighborhoods, and the finite subcover is repackaged as a neighborhood-set cover.", "lean_source": "lemma IsCompact.elim_nhds_subcover_nhdsSet (hs : IsCompact s) {U : X \u2192 Set X}\n    (hU : \u2200 x \u2208 s, U x \u2208 \ud835\udcdd x) : \u2203 t : Finset X, (\u2200 x \u2208 t, x \u2208 s) \u2227 (\u22c3 x \u2208 t, U x) \u2208 \ud835\udcdd\u02e2 s := by\n  let \u27e8t, ht\u27e9 := hs.elim_nhds_subcover_nhdsSet' (fun x _ => U x) hU\n  classical\n  exact \u27e8t.image (\u2191), fun x hx =>\n    let \u27e8y, _, hyx\u27e9 := Finset.mem_image.1 hx\n    hyx \u25b8 y.2,\n    by rwa [Finset.set_biUnion_finset_image]\u27e9"}}, {"pair_id": "study_058", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "SeparationQuotient.t2Space_iff", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X], T2Space (SeparationQuotient X) \u2194 R1Space X", "human_argument": "The proof relates Hausdorffness of the separation quotient to the original separation relation. It reasons through the quotient map, showing that distinct quotient classes can be separated exactly when the original space has the required separation behavior modulo indistinguishability.", "lean_source": "theorem SeparationQuotient.t2Space_iff : T2Space (SeparationQuotient X) \u2194 R1Space X := by\n  simp only [t2Space_iff_disjoint_nhds, Pairwise, surjective_mk.forall\u2082, ne_eq, mk_eq_mk,\n    r1Space_iff_inseparable_or_disjoint_nhds, \u2190 disjoint_comap_iff surjective_mk, comap_mk_nhds_mk,\n    \u2190 or_iff_not_imp_left]"}, "right": {"name": "r0Space_iff", "statement": "\u2200 (X : Type u) [inst : TopologicalSpace X], R0Space X \u2194 Symmetric Specializes", "human_argument": "The proof unfolds the R0 separation condition into the specialization relation. It shows that topologically indistinguishable points have the expected closure behavior, and conversely that the closure behavior recovers the R0 condition.", "lean_source": "@[mk_iff]"}}, {"pair_id": "study_059", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "lindelofSpace_of_countable_subfamily_closed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X],\n  (\u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X),\n      (\u2200 (i : \u03b9), IsClosed (t i)) \u2192 \u22c2 i, t i = \u2205 \u2192 \u2203 u, Set.Countable u \u2227 \u22c2 i \u2208 u, t i = \u2205) \u2192\n    LindelofSpace X", "human_argument": "Assume every family of closed sets with empty intersection has a countable subfamily with empty intersection, and let {U_i}_{i\u2208I} be an open cover of X. The complements t_i := X \\ U_i are closed and their intersection is empty because the U_i cover X. By the hypothesis there is a countable set J \u2286 I such that \u22c2_{j\u2208J} t_j = \u2205, hence the complements {U_j}_{j\u2208J} cover X. Thus every open cover has a countable subcover, so X is Lindel\u00f6f.", "lean_source": "theorem lindelofSpace_of_countable_subfamily_closed\n    (h : \u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X), (\u2200 i, IsClosed (t i)) \u2192 \u22c2 i, t i = \u2205 \u2192\n      \u2203 u : Set \u03b9, u.Countable \u2227 \u22c2 i \u2208 u, t i = \u2205) :\n    LindelofSpace X where\n  isLindelof_univ := isLindelof_of_countable_subfamily_closed fun t => by simpa using h t"}, "right": {"name": "IsLindelof.disjoint_nhdsSet_right", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X} {l : Filter X} [inst_1 : CountableInterFilter l],\n  IsLindelof s \u2192 (Disjoint l (nhdsSet s) \u2194 \u2200 x \u2208 s, Disjoint l (nhds x))", "human_argument": "Let s be Lindel\u00f6f and let l be a filter with the countable intersection property. The corresponding \"left\" statement says that the neighborhood filter of s is disjoint from l if and only if for every x in s the neighborhood filter of x is disjoint from l. Since disjointness is symmetric, this is equivalent to saying l is disjoint from the neighborhood filter of s if and only if for every x in s, l is disjoint from the neighborhood filter of x.", "lean_source": "theorem IsLindelof.disjoint_nhdsSet_right {l : Filter X} [CountableInterFilter l]\n    (hs : IsLindelof s) : Disjoint l (\ud835\udcdd\u02e2 s) \u2194 \u2200 x \u2208 s, Disjoint l (\ud835\udcdd x) := by\n  simpa only [disjoint_comm] using hs.disjoint_nhdsSet_left\n\n/-- For every family of closed sets whose intersection avoids a Lindel\u00f6f set,\nthere exists a countable subfamily whose intersection avoids this Lindel\u00f6f set. -/"}}, {"pair_id": "study_060", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isLindelof_iff_countable_subfamily_closed", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsLindelof s \u2194\n    \u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X),\n      (\u2200 (i : \u03b9), IsClosed (t i)) \u2192 s \u2229 \u22c2 i, t i = \u2205 \u2192 \u2203 u, Set.Countable u \u2227 s \u2229 \u22c2 i \u2208 u, t i = \u2205", "human_argument": "If s is Lindel\u00f6f and (t_i) is a family of closed sets with s \u2229 \u22c2_i t_i = \u2205, then the complements u_i := X \\ t_i are an open cover of s, so by Lindel\u00f6f there is a countable subcover u_i for i in some countable J; taking complements back yields s \u2229 \u22c2_{i\u2208J} t_i = \u2205. Conversely, if every family of closed sets whose intersection misses s has a countable subfamily with the same property, then for any open cover (u_i) of s the closed complements t_i := X \\ u_i satisfy s \u2229 \u22c2_i t_i = \u2205, so some countable subcollection of the u_i already covers s. This establishes the equivalence.", "lean_source": "theorem isLindelof_iff_countable_subfamily_closed :\n    IsLindelof s \u2194 \u2200 {\u03b9 : Type u} (t : \u03b9 \u2192 Set X),\n    (\u2200 i, IsClosed (t i)) \u2192 (s \u2229 \u22c2 i, t i) = \u2205\n    \u2192 \u2203 u : Set \u03b9, u.Countable \u2227 (s \u2229 \u22c2 i \u2208 u, t i) = \u2205 :=\n  \u27e8fun hs \u21a6 hs.elim_countable_subfamily_closed, isLindelof_of_countable_subfamily_closed\u27e9\n\n/-- The empty set is a Lindelof set. -/\n@[simp]"}, "right": {"name": "dense_iInter_of_isOpen", "statement": "\u2200 {\u03b1 : Type u_1} {\u03b2 : Type u_2} [inst : TopologicalSpace \u03b1] [inst_1 : BaireSpace \u03b1] [inst_2 : Encodable \u03b2]\n  {f : \u03b2 \u2192 Set \u03b1}, (\u2200 (s : \u03b2), IsOpen (f s)) \u2192 (\u2200 (s : \u03b2), Dense (f s)) \u2192 Dense (\u22c2 s, f s)", "human_argument": "Since \u03b2 is encodable its family of sets {f s : s \u2208 \u03b2} has countable range, so the family can be viewed as a countable collection of open sets, each of which is dense. A Baire space has the property that any countable intersection of open dense sets is dense. Applying that property to this countable collection yields that the intersection \u22c2 s, f s is dense.", "lean_source": "theorem dense_iInter_of_isOpen [Countable \u03b9] {f : \u03b9 \u2192 Set X} (ho : \u2200 i, IsOpen (f i))\n    (hd : \u2200 i, Dense (f i)) : Dense (\u22c2 s, f s) :=\n  dense_sInter_of_isOpen (forall_mem_range.2 ho) (countable_range _) (forall_mem_range.2 hd)\n\n/-- A set is residual (comeagre) if and only if it includes a dense `G\u03b4` set. -/"}}, {"pair_id": "study_061", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "r0Space_iff", "statement": "\u2200 (X : Type u) [inst : TopologicalSpace X], R0Space X \u2194 Symmetric Specializes", "human_argument": "The proof unfolds the R0 separation condition into the specialization relation. It shows that topologically indistinguishable points have the expected closure behavior, and conversely that the closure behavior recovers the R0 condition.", "lean_source": "@[mk_iff]"}, "right": {"name": "SeparationQuotient.t2Space_iff", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X], T2Space (SeparationQuotient X) \u2194 R1Space X", "human_argument": "The proof relates Hausdorffness of the separation quotient to the original separation relation. It reasons through the quotient map, showing that distinct quotient classes can be separated exactly when the original space has the required separation behavior modulo indistinguishability.", "lean_source": "theorem SeparationQuotient.t2Space_iff : T2Space (SeparationQuotient X) \u2194 R1Space X := by\n  simp only [t2Space_iff_disjoint_nhds, Pairwise, surjective_mk.forall\u2082, ne_eq, mk_eq_mk,\n    r1Space_iff_inseparable_or_disjoint_nhds, \u2190 disjoint_comap_iff surjective_mk, comap_mk_nhds_mk,\n    \u2190 or_iff_not_imp_left]"}}, {"pair_id": "study_062", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.elim_nhds_subcover_nhdsSet'", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192\n    \u2200 (U : (x : X) \u2192 x \u2208 s \u2192 Set X),\n      (\u2200 (x : X) (hx : x \u2208 s), U x hx \u2208 nhds x) \u2192 \u2203 t, \u22c3 x \u2208 t, U \u2191x (_ : \u2191x \u2208 s) \u2208 nhdsSet s", "human_argument": "Let s be compact and for each x\u2208s let U_x be a neighborhood of x. Then int(U_x) is open and still a neighborhood of x, so the family {int(U_x) : x\u2208s} is an open cover of s. By compactness there is a finite subcollection indexed by a finite subset t\u2286s whose interiors cover s. For any point x\u2208s choose y\u2208t with x\u2208int(U_y); then some neighborhood of x is contained in U_y, hence contained in \u22c3_{z\u2208t}U_z. Thus \u22c3_{z\u2208t}U_z is a neighborhood of every point of s, i.e. a neighborhood of s.", "lean_source": "lemma IsCompact.elim_nhds_subcover_nhdsSet' (hs : IsCompact s) (U : \u2200 x \u2208 s, Set X)\n    (hU : \u2200 x hx, U x hx \u2208 \ud835\udcdd x) : \u2203 t : Finset s, (\u22c3 x \u2208 t, U x.1 x.2) \u2208 \ud835\udcdd\u02e2 s := by\n  rcases hs.elim_finite_subcover (fun x : s \u21a6 interior (U x x.2)) (fun _ \u21a6 isOpen_interior)\n    fun x hx \u21a6 mem_iUnion.2 \u27e8\u27e8x, hx\u27e9, mem_interior_iff_mem_nhds.2 <| hU _ _\u27e9 with \u27e8t, hst\u27e9\n  refine \u27e8t, mem_nhdsSet_iff_forall.2 fun x hx \u21a6 ?_\u27e9\n  rcases mem_iUnion\u2082.1 (hst hx) with \u27e8y, hyt, hy\u27e9\n  refine mem_of_superset ?_ (subset_biUnion_of_mem hyt)\n  exact mem_interior_iff_mem_nhds.1 hy"}, "right": {"name": "Isometry.toDilation_ratio", "statement": "\u2200 {\u03b1 : Type u_1} {\u03b2 : Type u_2} [inst : PseudoEMetricSpace \u03b1] [inst_1 : PseudoEMetricSpace \u03b2] {f : \u03b1 \u2192 \u03b2}\n  {hf : Isometry f}, Dilation.ratio (Isometry.toDilation f hf) = 1", "human_argument": "Either every pair of points has extended distance 0 or \u221e, or there exists a pair with a finite nonzero extended distance. In the first (trivial) case the dilation associated to f has ratio 1 by the definition of the trivial dilation. In the second case pick x,y with edist(x,y) neither 0 nor \u221e; since f is an isometry edist(f x,f y)=edist(x,y), so the scaling factor relating these two distances must be 1, and by uniqueness of the dilation ratio we conclude it equals 1. Hence in all cases the dilation ratio of f is 1.", "lean_source": "lemma _root_.Isometry.toDilation_ratio {f : \u03b1 \u2192 \u03b2} {hf : Isometry f} : ratio hf.toDilation = 1 := by\n  by_cases! h : \u2200 x y : \u03b1, edist x y = 0 \u2228 edist x y = \u22a4\n  \u00b7 exact ratio_of_trivial hf.toDilation h\n  \u00b7 obtain \u27e8x, y, h\u2081, h\u2082\u27e9 := h\n    exact ratio_unique h\u2081 h\u2082 (by simp [hf x y]) |>.symm"}}, {"pair_id": "study_063", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsCompact.elim_nhds_subcover_nhdsSet", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsCompact s \u2192 \u2200 {U : X \u2192 Set X}, (\u2200 x \u2208 s, U x \u2208 nhds x) \u2192 \u2203 t, (\u2200 x \u2208 t, x \u2208 s) \u2227 \u22c3 x \u2208 t, U x \u2208 nhdsSet s", "human_argument": "The proof starts with compactness and an open-neighborhood assignment around the compact set. Compactness extracts finitely many of those neighborhoods, and the finite subcover is repackaged as a neighborhood-set cover.", "lean_source": "lemma IsCompact.elim_nhds_subcover_nhdsSet (hs : IsCompact s) {U : X \u2192 Set X}\n    (hU : \u2200 x \u2208 s, U x \u2208 \ud835\udcdd x) : \u2203 t : Finset X, (\u2200 x \u2208 t, x \u2208 s) \u2227 (\u22c3 x \u2208 t, U x) \u2208 \ud835\udcdd\u02e2 s := by\n  let \u27e8t, ht\u27e9 := hs.elim_nhds_subcover_nhdsSet' (fun x _ => U x) hU\n  classical\n  exact \u27e8t.image (\u2191), fun x hx =>\n    let \u27e8y, _, hyx\u27e9 := Finset.mem_image.1 hx\n    hyx \u25b8 y.2,\n    by rwa [Finset.set_biUnion_finset_image]\u27e9"}, "right": {"name": "exists_compact_closed_between", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : LocallyCompactSpace X]\n  [inst_2 : ClosableCompactSubsetOpenSpace X] {K U : Set X},\n  IsCompact K \u2192 IsOpen U \u2192 K \u2286 U \u2192 \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U", "human_argument": "The proof uses local compactness to thicken each point of a compact set inside the given open set by a compact neighborhood. A finite compact subcover is chosen, then combined and closed so that it still sits inside the open set while the original compact set lies in its interior.", "lean_source": "theorem exists_compact_closed_between [LocallyCompactSpace X] [RegularSpace X]\n    {K U : Set X} (hK : IsCompact K) (hU : IsOpen U) (h_KU : K \u2286 U) :\n    \u2203 L, IsCompact L \u2227 IsClosed L \u2227 K \u2286 interior L \u2227 L \u2286 U :=\n  let \u27e8L, L_comp, KL, LU\u27e9 := exists_compact_between hK hU h_KU\n  \u27e8closure L, L_comp.closure, isClosed_closure, KL.trans <| interior_mono subset_closure,\n    L_comp.closure_subset_of_isOpen hU LU\u27e9\n\n/-- In a (possibly non-Hausdorff) locally compact regular space, for every compact set `K`,\n`\ud835\udcdd\u02e2 K` has a basis consisting of closed compact sets. -/"}}, {"pair_id": "study_064", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Subtype.isCompact_iff", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {p : X \u2192 Prop} {s : Set { x // p x }},\n  IsCompact s \u2194 IsCompact (Subtype.val '' s)", "human_argument": "The coercion (inclusion) map from the subspace {x | p(x)} into X is a homeomorphism onto its image. Hence it is continuous, so the image of any compact subset of the subtype is compact in X. Conversely, its inverse (the restriction of the coercion to its image) is continuous, so any compact subset of X lying in the image pulls back to a compact subset of the subtype. Therefore s is compact iff its image in X is compact.", "lean_source": "theorem Subtype.isCompact_iff {p : X \u2192 Prop} {s : Set { x // p x }} :\n    IsCompact s \u2194 IsCompact ((\u2191) '' s : Set X) :=\n  IsEmbedding.subtypeVal.isCompact_iff"}, "right": {"name": "isLindelof_iff_isLindelof_univ", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsLindelof s \u2194 IsLindelof Set.univ", "human_argument": "The subspace s of X is canonically identified with the whole underlying set of the subtype consisting of points of s, via the inclusion map whose image is exactly s. Lindel\u00f6fness is preserved under this identification, because covering properties of s as a subspace coincide with those of the corresponding universal subset of the subtype. Concretely, the image of the whole subtype is s, so s is Lindel\u00f6f if and only if the universal set in the subtype topology is Lindel\u00f6f.", "lean_source": "theorem isLindelof_iff_isLindelof_univ : IsLindelof s \u2194 IsLindelof (univ : Set s) := by\n  rw [Subtype.isLindelof_iff, image_univ, Subtype.range_coe]"}}, {"pair_id": "study_065", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "IsLindelof.elim_countable_subcover_image", "statement": "\u2200 {X : Type u} {\u03b9 : Type u_1} [inst : TopologicalSpace X] {s : Set X} {b : Set \u03b9} {c : \u03b9 \u2192 Set X},\n  IsLindelof s \u2192 (\u2200 i \u2208 b, IsOpen (c i)) \u2192 s \u2286 \u22c3 i \u2208 b, c i \u2192 \u2203 b' \u2286 b, Set.Countable b' \u2227 s \u2286 \u22c3 i \u2208 b', c i", "human_argument": "Let s be Lindel\u00f6f and suppose {c_i}_{i\u2208b} is an open cover of s. View this family as indexed by the subtype of indices in b; it is still an open cover of s, so by the Lindel\u00f6f property there is a countable subset d of that subtype with s \u2286 \u22c3_{i\u2208d} c_i. Put b' := the image of d under the inclusion of the subtype into \u03b9; then b' \u2286 b, b' is countable (image of a countable set), and the union over b' equals the union over d. Hence s \u2286 \u22c3_{i\u2208b'} c_i, as required.", "lean_source": "theorem IsLindelof.elim_countable_subcover_image {b : Set \u03b9} {c : \u03b9 \u2192 Set X} (hs : IsLindelof s)\n    (hc\u2081 : \u2200 i \u2208 b, IsOpen (c i)) (hc\u2082 : s \u2286 \u22c3 i \u2208 b, c i) :\n    \u2203 b', b' \u2286 b \u2227 Set.Countable b' \u2227 s \u2286 \u22c3 i \u2208 b', c i := by\n  simp only [Subtype.forall', biUnion_eq_iUnion] at hc\u2081 hc\u2082\n  rcases hs.elim_countable_subcover (fun i \u21a6 c i : b \u2192 Set X) hc\u2081 hc\u2082 with \u27e8d, hd\u27e9\n  refine \u27e8Subtype.val '' d, by simp, Countable.image hd.1 Subtype.val, ?_\u27e9\n  rw [biUnion_image]\n  exact hd.2\n\n\n/-- A set `s` is Lindel\u00f6f if for every open cover of `s`, there exists a countable subcover. -/"}, "right": {"name": "hasBasis_coclosedLindelof", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X],\n  Filter.HasBasis (Filter.coclosedLindelof X) (fun s => IsClosed s \u2227 IsLindelof s) compl", "human_argument": "The coclosed Lindelof filter is the intersection of the principal filters generated by complements of closed Lindelof sets. In particular the family of complements of closed Lindelof subsets is nonempty because the complement of the empty closed Lindelof set is the whole space. If S and T are closed Lindelof sets then S \u222a T is again closed and Lindelof, and (X \\ S) \u2229 (X \\ T) = X \\ (S \u222a T), so finite intersections of these complements are again of the same form. Thus the complements of closed Lindelof sets form a basis for the coclosed Lindelof filter.", "lean_source": "theorem hasBasis_coclosedLindelof :\n    (Filter.coclosedLindelof X).HasBasis (fun s => IsClosed s \u2227 IsLindelof s) compl := by\n  simp only [Filter.coclosedLindelof, iInf_and']\n  refine hasBasis_biInf_principal' ?_ \u27e8\u2205, isClosed_empty, isLindelof_empty\u27e9\n  rintro s \u27e8hs\u2081, hs\u2082\u27e9 t \u27e8ht\u2081, ht\u2082\u27e9\n  exact \u27e8s \u222a t, \u27e8\u27e8hs\u2081.union ht\u2081, hs\u2082.union ht\u2082\u27e9, compl_subset_compl.2 subset_union_left,\n    compl_subset_compl.2 subset_union_right\u27e9\u27e9"}}, {"pair_id": "study_066", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "specializes_iff_not_disjoint", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : R1Space X] {x y : X}, x \u2933 y \u2194 \u00acDisjoint (nhds x) (nhds y)", "human_argument": "Assume X is a T1 topological space. By definition x specializes to y means y lies in the closure of {x}, equivalently every neighborhood of y contains x. If x specializes to y then every neighborhood V of y contains x, so for any neighborhood U of x we have U \u2229 V \u2287 {x} \u2260 \u2205; hence the neighborhood filters of x and y are not disjoint. Conversely, if the neighborhood filters are not disjoint then every neighborhood V of y meets every neighborhood U of x; intersecting over all neighborhoods U of x (which in a T1 space equals {x}) shows V meets {x}, so x \u2208 V, and thus y is in the closure of {x}, i.e. x specializes to y.", "lean_source": "theorem specializes_iff_not_disjoint : x \u2933 y \u2194 \u00acDisjoint (\ud835\udcdd x) (\ud835\udcdd y) :=\n  disjoint_nhds_nhds_iff_not_specializes.not_left.symm"}, "right": {"name": "isLindelof_iff_LindelofSpace", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X}, IsLindelof s \u2194 LindelofSpace \u2191s", "human_argument": "Open covers of s by sets open in the ambient space are exactly the same thing as open covers of s in the subspace topology, since every subspace-open set is an intersection of an open set of the ambient space with s and conversely any open set of X that meets s gives such an intersection. Thus a countable subcollection of an open cover in one description gives a countable subcollection in the other description. Therefore s is Lindel\u00f6f (as a subset of X) if and only if s, equipped with the subspace topology, is a Lindel\u00f6f space.", "lean_source": "theorem isLindelof_iff_lindelofSpace : IsLindelof s \u2194 LindelofSpace s :=\n  isLindelof_iff_isLindelof_univ.trans isLindelof_univ_iff\n\n@[deprecated (since := \"2026-01-12\")]"}}, {"pair_id": "study_067", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "Metric.exists_isBounded_image_of_tendsto", "statement": "\u2200 {\u03b1 : Type u_3} {\u03b2 : Type u_4} [inst : PseudoMetricSpace \u03b2] {l : Filter \u03b1} {f : \u03b1 \u2192 \u03b2} {x : \u03b2},\n  Filter.Tendsto f l (nhds x) \u2192 \u2203 s \u2208 l, Bornology.IsBounded (f '' s)", "human_argument": "Since f tends to x along l, every neighborhood of x has preimage in l; in particular for some \u03b5>0 the inverse image s := f^{-1}(the open ball B(x,\u03b5)) belongs to l. By definition f(s) \u2286 B(x,\u03b5). In a pseudo-metric space every ball is bounded, so f(s) is bounded. Hence there exists s \u2208 l whose image under f is bounded.", "lean_source": "theorem exists_isBounded_image_of_tendsto {\u03b1 \u03b2 : Type*} [PseudoMetricSpace \u03b2]\n    {l : Filter \u03b1} {f : \u03b1 \u2192 \u03b2} {x : \u03b2} (hf : Tendsto f l (\ud835\udcdd x)) :\n    \u2203 s \u2208 l, IsBounded (f '' s) :=\n  (l.basis_sets.map f).disjoint_iff_left.mp <| (disjoint_nhds_cobounded x).mono_left hf\n\n/-- If a function is continuous within a set `s` at every point of a compact set `k`, then it is\nbounded on some open neighborhood of `k` in `s`. -/"}, "right": {"name": "IsLindelof.elim_nhds_subcover", "statement": "\u2200 {X : Type u} [inst : TopologicalSpace X] {s : Set X},\n  IsLindelof s \u2192 \u2200 (U : X \u2192 Set X), (\u2200 x \u2208 s, U x \u2208 nhds x) \u2192 \u2203 t, Set.Countable t \u2227 (\u2200 x \u2208 t, x \u2208 s) \u2227 s \u2286 \u22c3 x \u2208 t, U x", "human_argument": "Let s be Lindel\u00f6f and suppose each U(x) is a neighborhood of x for x \u2208 s. Applying the same lemma to the family indexed by points of s (viewed as elements of the subtype s) yields a countable set T of subtype-points whose corresponding neighborhoods cover s. Taking t to be the set of underlying points of T (the image of T under the projection to X) gives a countable subset t \u2286 s. Finally, the union over T of the U of the underlying points equals the union over t of the U x, so s is contained in \u22c3_{x\u2208t} U x.", "lean_source": "theorem IsLindelof.elim_nhds_subcover (hs : IsLindelof s) (U : X \u2192 Set X)\n    (hU : \u2200 x \u2208 s, U x \u2208 \ud835\udcdd x) :\n    \u2203 t : Set X, t.Countable \u2227 (\u2200 x \u2208 t, x \u2208 s) \u2227 s \u2286 \u22c3 x \u2208 t, U x := by\n  let \u27e8t, \u27e8htc, htsub\u27e9\u27e9 := hs.elim_nhds_subcover' (fun x _ \u21a6 U x) hU\n  refine \u27e8\u2191t, Countable.image htc Subtype.val, ?_\u27e9\n  constructor\n  \u00b7 intro _\n    simp only [mem_image, Subtype.exists, exists_and_right, exists_eq_right, forall_exists_index]\n    tauto\n  \u00b7 have : \u22c3 x \u2208 t, U \u2191x = \u22c3 x \u2208 Subtype.val '' t, U x := biUnion_image.symm\n    rwa [\u2190 this]\n\n/-- For every nonempty open cover of a Lindel\u00f6f set, there exists a subcover indexed by \u2115. -/"}}, {"pair_id": "study_068", "prompt": "Which proof uses the less standard mathematical route to its result?", "left": {"name": "isSigmaCompact_iUnion_of_isCompact", "statement": "\u2200 {X : Type u_1} {\u03b9 : Type u_3} [inst : TopologicalSpace X] [h\u03b9 : Countable \u03b9] (s : \u03b9 \u2192 Set X),\n  (\u2200 (i : \u03b9), IsCompact (s i)) \u2192 IsSigmaCompact (\u22c3 i, s i)", "human_argument": "If \u03b9 is empty then the union is empty and hence \u03c3-compact. Otherwise, countability of \u03b9 gives a surjection f : \u2115 \u2192 \u03b9; then \u22c3_{i\u2208\u03b9} s_i = \u22c3_{n\u2208\u2115} s_{f(n)}. Each s_{f(n)} is compact by hypothesis, so the union is a countable union of compact sets and therefore \u03c3-compact.", "lean_source": "lemma isSigmaCompact_iUnion_of_isCompact [h\u03b9 : Countable \u03b9] (s : \u03b9 \u2192 Set X)\n    (hcomp : \u2200 i, IsCompact (s i)) : IsSigmaCompact (\u22c3 i, s i) := by\n  rcases isEmpty_or_nonempty \u03b9\n  \u00b7 simp only [iUnion_of_empty, isSigmaCompact_empty]\n  \u00b7 -- If \u03b9 is non-empty, choose a surjection f : \u2115 \u2192 \u03b9, this yields a map \u2115 \u2192 Set X.\n    obtain \u27e8f, hf\u27e9 := countable_iff_exists_surjective.mp h\u03b9\n    exact \u27e8s \u2218 f, fun n \u21a6 hcomp (f n), Function.Surjective.iUnion_comp hf _\u27e9\n\n/-- Countable unions of compact sets are \u03c3-compact. -/"}, "right": {"name": "SeparatedNhds.of_isCompact_isCompact", "statement": "\u2200 {X : Type u_1} [inst : TopologicalSpace X] [inst_1 : T2Space X] {s t : Set X},\n  IsCompact s \u2192 IsCompact t \u2192 Disjoint s t \u2192 SeparatedNhds s t", "human_argument": "In a Hausdorff space the diagonal \u0394 is closed, so its complement is open. Disjointness of s and t means s \u00d7 t \u2286 (X \u00d7 X) \\ \u0394. Applying the tube lemma to the compact sets s and t and the open set (X \u00d7 X) \\ \u0394 yields open neighborhoods U \u2287 s and V \u2287 t with U \u00d7 V \u2286 (X \u00d7 X) \\ \u0394. Hence no point can lie in both U and V (otherwise (p,p) \u2208 U \u00d7 V), so U and V are disjoint neighborhoods of s and t, i.e. s and t admit separated neighborhoods.", "lean_source": "theorem SeparatedNhds.of_isCompact_isCompact [T2Space X] {s t : Set X} (hs : IsCompact s)\n    (ht : IsCompact t) (hst : Disjoint s t) : SeparatedNhds s t := by\n  simp only [SeparatedNhds, prod_subset_compl_diagonal_iff_disjoint.symm] at hst \u22a2\n
